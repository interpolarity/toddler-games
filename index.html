let trainState='building',trainCars=[],trainX=0,trainSpeed=0,trainSmoke=[];
let trainWheelAngle=0,trainChugTimer=0;

function startTrainGame(){
  currentMode='train';particles=[];confetti=[];
  trainState='building';trainCars=[];trainX=0;trainSpeed=0;trainSmoke=[];
  trainWheelAngle=0;trainChugTimer=0;
  instruction.textContent='🚂 Build a Train!';
  updateTrainButtons();
}
function updateTrainButtons(){
  buttonsArea.innerHTML='';
  if(trainState==='done'){
    addBtn('btn-again','🚂','Again!',()=>{initAudio();playPop();startTrainGame()});

    return;
  }
  if(trainState==='driving'){return;}
  // Building state
  const full=trainCars.length>=8;
  if(full)instruction.textContent='🚂 Full! Tap Go!';
  const types=[
    {emoji:'🔴',label:'Red',color:'#e53935'},
    {emoji:'🔵',label:'Blue',color:'#1e88e5'},
    {emoji:'🟢',label:'Green',color:'#43a047'},
    {emoji:'🟡',label:'Yellow',color:'#fdd835'},
    {emoji:'🐄',label:'Animal',color:'#8d6e63',type:'animal'},
    {emoji:'📦',label:'Cargo',color:'#ff8f00',type:'cargo'},
  ];
  types.forEach(t=>{
    addBtn('btn-train',t.emoji,t.label,()=>{
      if(trainCars.length<8){
        trainCars.push({color:t.color,type:t.type||'passenger'});
        playTone(200+trainCars.length*50,0.15,'square',0.1);
        playTone(150,0.1,'triangle',0.08,0.05);
        spawnParticles(W*0.5,H*0.55,5,[t.color,'#fff']);
        instruction.textContent='🚂 '+trainCars.length+' car'+(trainCars.length>1?'s':'')+'!';
        updateTrainButtons();
      }
    },full);
  });
  addBtn('btn-traingo','🚀','Go!',()=>{
    if(trainCars.length>0){
      trainState='driving';trainX=-trainCars.length*(Math.min(W,H)*0.12+4);trainSpeed=0;
      // Whistle
      playTone(800,0.4,'sine',0.15);playTone(1000,0.3,'sine',0.1,0.15);
      instruction.textContent='🚂 Choo choo!';
      updateTrainButtons();
    }
  },trainCars.length===0);

}
function updateTrainGame(dt){
  updateParticles(dt);updateConfetti();
  if(trainState==='driving'){
    trainSpeed=Math.min(trainSpeed+dt*150,W/2.5);
    trainX+=trainSpeed*dt;
    trainWheelAngle+=trainSpeed*dt*0.05;
    trainChugTimer+=dt;
    // Chug sound
    if(trainChugTimer>0.25){trainChugTimer=0;playTone(80+Math.random()*30,0.12,'square',0.04);}
    // Smoke puffs
    const ts2=Math.min(W,H),lw2=ts2*0.16,cw2=ts2*0.12;
    const totalW=lw2+trainCars.length*(cw2+4);
    const cOfs=Math.max(0,(W-totalW)/2);
    const locoScreenX=cOfs+trainCars.length*(cw2+4)+trainX;
    const smokeY=(H>W*1.5?H*0.5:H*0.65)-ts2*0.12*0.5;
    if(Math.random()<0.4){trainSmoke.push({x:locoScreenX+lw2*0.6,y:smokeY,r:3+Math.random()*4,vy:-1-Math.random(),vx:0.5+Math.random(),life:1});}
    for(let i=trainSmoke.length-1;i>=0;i--){const s=trainSmoke[i];s.x+=s.vx;s.y+=s.vy;s.r+=dt*4;s.life-=dt*0.6;if(s.life<=0)trainSmoke.splice(i,1);}
    if(trainX>W+totalW){
      trainState='done';
      instruction.textContent='🎉 '+trainCars.length+' cars!';
      sayNumber(trainCars.length);playJingle();spawnConfetti();
      spawnParticles(W/2,H/2,30,['#f44336','#2196f3','#4caf50','#ffeb3b']);
      updateTrainButtons();
    }
  }
}
function drawTrainGame(){
  // Sky background
  const grd=ctx.createLinearGradient(0,0,0,H);grd.addColorStop(0,'#64b5f6');grd.addColorStop(0.5,'#90caf9');grd.addColorStop(0.7,'#c8e6c9');grd.addColorStop(1,'#a5d6a7');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  // Sun
  ctx.fillStyle='#ffeb3b';ctx.beginPath();ctx.arc(W*0.85,H*0.08,30,0,Math.PI*2);ctx.fill();
  // Clouds
  drawCloud(W*0.15,H*0.1,0.8);drawCloud(W*0.55,H*0.06,0.6);drawCloud(W*0.8,H*0.14,0.7);
  // Train tracks position
  const ty=H>W*1.5?H*0.5:H*0.65;
  // Ground meets tracks
  ctx.fillStyle='#a5d6a7';ctx.fillRect(0,ty-8,W,H-ty+8);
  // Hills
  ctx.fillStyle='#66bb6a';
  ctx.beginPath();ctx.arc(W*0.2,ty,W*0.2,Math.PI,0);ctx.fill();
  ctx.fillStyle='#4caf50';
  ctx.beginPath();ctx.arc(W*0.7,ty,W*0.25,Math.PI,0);ctx.fill();
  // Ties
  ctx.fillStyle='#795548';
  for(let i=0;i<W;i+=20){ctx.fillRect(i,ty-3,12,14);}
  // Rails
  ctx.fillStyle='#bdbdbd';ctx.fillRect(0,ty-2,W,3);ctx.fillRect(0,ty+8,W,3);

  // Smoke
  trainSmoke.forEach(s=>{ctx.globalAlpha=s.life*0.4;ctx.fillStyle='#9e9e9e';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;

  // Draw locomotive + cars
  const ts=Math.min(W,H);const locoW=ts*0.16,locoH=ts*0.12;const carW=ts*0.12,carH=ts*0.09;
  // Building: center on screen. Driving: start from left, cross full screen
  const totalTrainW=locoW+trainCars.length*(carW+4);
  let startX;
  if(trainState==='driving'||trainState==='done'){
    // Locomotive starts at left edge, drives right across full screen
    startX=trainCars.length*(carW+4)+trainX;
  }else{
    const centerOffset=Math.max(0,(W-totalTrainW)/2);
    startX=centerOffset+trainCars.length*(carW+4);
  }
  const baseY=ty-locoH+2;

  // Locomotive
  const lx=startX;
  // Chimney
  ctx.fillStyle='#424242';ctx.fillRect(lx+locoW*0.55,baseY-locoH*0.5,locoW*0.15,locoH*0.5);
  ctx.fillStyle='#616161';ctx.fillRect(lx+locoW*0.5,baseY-locoH*0.55,locoW*0.25,locoH*0.12);
  // Body
  ctx.fillStyle='#37474f';drawRoundRect(lx,baseY,locoW,locoH,6);ctx.fill();
  // Cab
  ctx.fillStyle='#455a64';drawRoundRect(lx+locoW*0.05,baseY-locoH*0.35,locoW*0.4,locoH*0.4,4);ctx.fill();
  // Cab window
  ctx.fillStyle='#bbdefb';drawRoundRect(lx+locoW*0.1,baseY-locoH*0.28,locoW*0.28,locoH*0.22,3);ctx.fill();
  // Cow catcher
  ctx.fillStyle='#c62828';
  ctx.beginPath();ctx.moveTo(lx+locoW,baseY+locoH);ctx.lineTo(lx+locoW+locoW*0.15,baseY+locoH);ctx.lineTo(lx+locoW,baseY+locoH*0.5);ctx.closePath();ctx.fill();
  // Wheels
  const wheelR=locoH*0.18;
  ctx.fillStyle='#212121';
  [lx+locoW*0.2,lx+locoW*0.5,lx+locoW*0.8].forEach(wx=>{
    ctx.beginPath();ctx.arc(wx,baseY+locoH,wheelR,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#9e9e9e';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(wx,baseY+locoH,wheelR*0.5,0,Math.PI*2);ctx.stroke();
    // Rotating spoke
    ctx.beginPath();ctx.moveTo(wx,baseY+locoH);
    ctx.lineTo(wx+Math.cos(trainWheelAngle)*wheelR*0.7,baseY+locoH+Math.sin(trainWheelAngle)*wheelR*0.7);ctx.stroke();
  });

  // Train cars
  trainCars.forEach((car,i)=>{
    const cx=lx-((i+1)*(carW+4));
    const cy=ty-carH+2;
    if(car.type==='animal'){
      // Wooden animal car
      ctx.fillStyle='#a1887f';drawRoundRect(cx,cy,carW,carH,4);ctx.fill();
      ctx.strokeStyle='#795548';ctx.lineWidth=2;
      // Fence lines
      for(let f=0;f<3;f++){const fx=cx+carW*0.15+f*carW*0.3;ctx.beginPath();ctx.moveTo(fx,cy);ctx.lineTo(fx,cy+carH);ctx.stroke();}
      // Animal emoji
      ctx.font=`${Math.max(16,carW*0.4)}px sans-serif`;ctx.textAlign='center';
      ctx.fillText('🐄',cx+carW/2,cy+carH*0.7);ctx.textAlign='left';
    } else if(car.type==='cargo'){
      // Cargo car - open top
      ctx.fillStyle=car.color;drawRoundRect(cx,cy+carH*0.3,carW,carH*0.7,4);ctx.fill();
      // Boxes inside
      ctx.fillStyle='#8d6e63';ctx.fillRect(cx+3,cy+carH*0.15,carW*0.35,carH*0.4);
      ctx.fillStyle='#a1887f';ctx.fillRect(cx+carW*0.4,cy+carH*0.25,carW*0.35,carH*0.35);
      ctx.fillStyle='#6d4c41';ctx.fillRect(cx+carW*0.2,cy+carH*0.05,carW*0.3,carH*0.3);
    } else {
      // Passenger car
      ctx.fillStyle=car.color;drawRoundRect(cx,cy,carW,carH,4);ctx.fill();
      // Windows
      ctx.fillStyle='#bbdefb';
      const wCount=3,ww=carW*0.18,wh=carH*0.35;
      for(let w=0;w<wCount;w++){drawRoundRect(cx+carW*0.1+w*(ww+carW*0.07),cy+carH*0.15,ww,wh,2);ctx.fill();}
    }
    // Wheels for all cars
    const cwR=carH*0.16;ctx.fillStyle='#212121';
    ctx.beginPath();ctx.arc(cx+carW*0.25,cy+carH,cwR,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+carW*0.75,cy+carH,cwR,0,Math.PI*2);ctx.fill();
    // Spoke animation
    ctx.strokeStyle='#9e9e9e';ctx.lineWidth=1.5;
    [cx+carW*0.25,cx+carW*0.75].forEach(wx=>{
      ctx.beginPath();ctx.moveTo(wx,cy+carH);
      ctx.lineTo(wx+Math.cos(trainWheelAngle)*cwR*0.7,cy+carH+Math.sin(trainWheelAngle)*cwR*0.7);ctx.stroke();
    });
    // Coupling
    ctx.fillStyle='#757575';ctx.fillRect(cx+carW,cy+carH*0.4,6,carH*0.2);
  });

  drawParticles(0);drawConfetti();
}

// =============================================
// HIDE & SEEK GAME
// =============================================
const HS_ANIMALS=[{emoji:'🐱',name:'Cat'},{emoji:'🐶',name:'Dog'},{emoji:'🐸',name:'Frog'},{emoji:'🐰',name:'Bunny'},{emoji:'🐻',name:'Bear'},{emoji:'🦊',name:'Fox'}];
let hsState='hiding',hsScore=0,hsRound=0,hsTotalRounds=5,hsAnimalQueue=[];
let hsAnimal=null,hsSpotIdx=0,hsPeekTimer=0,hsPeekPhase=0,hsPeekOffset=0,hsPeekDir=1;
let hsFoundTimer=0,hsFoundBounce=0,hsDoneTimer=0;
let hsSpots=[],hsWobble=[0,0,0,0,0],hsClouds=[];

function hsGetSpots(){
  const S=Math.min(W,H);const portrait=H>W*1.5;
  const sw=S*0.17;const sh=sw*1.1;
  // Two rows: 3 back (higher, slightly smaller), 2 front (lower, bigger)
  const backY=portrait?H*0.38:H*0.42;
  const frontY=portrait?H*0.52:H*0.56;
  const spots=[];
  // Back row — 3 spots
  for(let i=0;i<3;i++){spots.push({x:W*0.18+i*W*0.32,y:backY,w:sw*0.85,h:sh*0.85})}
  // Front row — 2 spots
  for(let i=0;i<2;i++){spots.push({x:W*0.28+i*W*0.44,y:frontY,w:sw,h:sh})}
  return spots;
}

function startHideSeekGame(){
  currentMode='hideseek';particles=[];confetti=[];
  hsScore=0;hsRound=0;hsDoneTimer=0;
  // Shuffle animals so each round is unique
  hsAnimalQueue=[...HS_ANIMALS].sort(()=>Math.random()-0.5).slice(0,5);
  hsClouds=[];
  for(let i=0;i<4;i++)hsClouds.push({x:Math.random()*W,y:H*0.04+Math.random()*H*0.12,s:0.5+Math.random()*0.5,vx:0.3+Math.random()*0.3});
  hsWobble=[0,0,0,0,0];
  hsStartRound();
}

function hsStartRound(){
  hsState='hiding';hsPeekTimer=0;hsPeekPhase=0;hsPeekOffset=0;hsFoundTimer=0;hsFoundBounce=0;
  hsSpots=hsGetSpots();
  hsAnimal=hsAnimalQueue[hsRound%hsAnimalQueue.length];
  hsSpotIdx=Math.floor(Math.random()*5);
  hsPeekDir=Math.random()<0.5?-1:1;
  updateHideSeekButtons();
}

function updateHideSeekButtons(){
  buttonsArea.innerHTML='';
  if(hsState==='done'){
    instruction.textContent='You found them all! 🎉';
    addBtn('btn-again','🔄','Again!',()=>{initAudio();startHideSeekGame()});
  }else if(hsState==='found'){
    instruction.textContent='Found '+hsAnimal.emoji+' '+hsAnimal.name+'!';
  }else{
    instruction.textContent='Find the animal! 🔍';
  }
}

function handleHideSeekTap(tx,ty){
  if(hsState!=='hiding'&&hsState!=='peeking')return;
  const sp=hsSpots;if(!sp.length)return;
  // Check each spot
  const hitR=Math.min(W,H)*0.12;
  for(let i=0;i<sp.length;i++){
    const dx=tx-sp[i].x,dy=ty-sp[i].y;
    if(dx*dx+dy*dy<hitR*hitR){
      if(i===hsSpotIdx){
        // Found!
        initAudio();hsState='found';hsFoundTimer=0;hsFoundBounce=0;
        hsScore++;
        playPop();playJingle();
        if(navigator.vibrate)navigator.vibrate(20);
        sayWord(hsAnimal.name+'!');
        spawnParticles(sp[i].x,sp[i].y-sp[i].h*0.5,18,['#ffeb3b','#ff9800','#4caf50','#e91e63'],{vyRange:9,spread:30,maxSize:7});
        spawnConfetti();
        updateHideSeekButtons();
      }else{
        // Wrong spot — wobble
        hsWobble[i]=1;
        playTone(180,0.2,'triangle',0.08);
      }
      return;
    }
  }
}

function updateHideSeekGame(dt){
  // Clouds
  hsClouds.forEach(c=>{c.x+=c.vx*dt*20;if(c.x>W+60)c.x=-60});
  // Wobble decay
  for(let i=0;i<5;i++){if(hsWobble[i]>0)hsWobble[i]=Math.max(0,hsWobble[i]-dt*3);}
  // Recalc spots on resize
  hsSpots=hsGetSpots();

  if(hsState==='hiding'){
    hsPeekTimer+=dt;
    if(hsPeekTimer>1+Math.random()){hsPeekPhase=1;hsState='peeking';hsPeekTimer=0;}
  }else if(hsState==='peeking'){
    hsPeekTimer+=dt;
    const sp=hsSpots[hsSpotIdx];const peekMax=sp.w*0.5;
    if(hsPeekPhase===1){
      // Sliding out
      hsPeekOffset=lerp(hsPeekOffset,hsPeekDir*peekMax,dt*4);
      if(Math.abs(hsPeekOffset)>peekMax*0.9){hsPeekPhase=2;hsPeekTimer=0;}
    }else if(hsPeekPhase===2){
      // Visible — hold
      if(hsPeekTimer>1+Math.random()*0.5){hsPeekPhase=3;hsPeekTimer=0;}
    }else if(hsPeekPhase===3){
      // Sliding back
      hsPeekOffset=lerp(hsPeekOffset,0,dt*4);
      if(Math.abs(hsPeekOffset)<1){hsPeekOffset=0;hsPeekPhase=0;hsState='hiding';hsPeekTimer=0;hsPeekDir=Math.random()<0.5?-1:1;}
    }
  }else if(hsState==='found'){
    hsFoundTimer+=dt;hsFoundBounce+=dt;
    if(hsFoundTimer>1.8){
      hsRound++;
      if(hsRound>=hsTotalRounds){hsState='done';hsDoneTimer=0;playTaDa();spawnConfetti();updateHideSeekButtons();}
      else hsStartRound();
    }
  }else if(hsState==='done'){
    const _prev=hsDoneTimer;hsDoneTimer+=dt;
    if(hsDoneTimer<=7.5&&Math.floor(hsDoneTimer/1.5)>Math.floor(_prev/1.5))spawnConfetti();
  }
  updateParticles(dt);updateConfetti();
}

function hsDrawSpot(i,sp){
  const S=Math.min(W,H);const sw=sp.w;const sh=sp.h;const cx=sp.x;const by=sp.y;
  // Apply wobble
  const wobOfs=hsWobble[i]>0?Math.sin(hsWobble[i]*20)*sw*0.05:0;
  ctx.save();ctx.translate(wobOfs,0);
  if(i===0){
    // Bush
    ctx.fillStyle='#4caf50';ctx.beginPath();ctx.ellipse(cx,by-sh*0.35,sw*0.55,sh*0.45,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#388e3c';
    ctx.beginPath();ctx.arc(cx-sw*0.25,by-sh*0.45,sw*0.18,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+sw*0.2,by-sh*0.5,sw*0.15,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+sw*0.05,by-sh*0.6,sw*0.13,0,Math.PI*2);ctx.fill();
  }else if(i===1){
    // Tree
    const tw=sw*0.18;ctx.fillStyle='#795548';ctx.fillRect(cx-tw/2,by-sh*0.3,tw,sh*0.4);
    ctx.fillStyle='#4caf50';ctx.beginPath();ctx.arc(cx,by-sh*0.55,sw*0.45,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#388e3c';ctx.beginPath();ctx.arc(cx-sw*0.15,by-sh*0.65,sw*0.15,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+sw*0.2,by-sh*0.5,sw*0.13,0,Math.PI*2);ctx.fill();
  }else if(i===2){
    // Rock
    ctx.fillStyle='#9e9e9e';ctx.beginPath();ctx.ellipse(cx,by-sh*0.22,sw*0.5,sh*0.35,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#bdbdbd';ctx.beginPath();ctx.ellipse(cx-sw*0.1,by-sh*0.35,sw*0.2,sh*0.12,0,0,Math.PI*2);ctx.fill();
  }else if(i===3){
    // Box
    const bw=sw*0.8;const bh=sh*0.7;const bx=cx-bw/2;const bt=by-bh;
    ctx.fillStyle='#8d6e63';drawRoundRect(bx,bt,bw,bh,4);ctx.fill();
    ctx.fillStyle='#6d4c41';ctx.fillRect(bx,bt,bw,4);ctx.fillRect(bx,bt+bh-4,bw,4);
    // Tape
    ctx.fillStyle='#d7ccc8';ctx.fillRect(cx-bw*0.15,bt-2,bw*0.3,bh*0.2);
    // Flaps
    ctx.strokeStyle='#5d4037';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(bx+bw*0.1,bt);ctx.lineTo(cx,bt-bh*0.08);ctx.lineTo(bx+bw*0.9,bt);ctx.stroke();
  }else if(i===4){
    // Fence
    const pw=sw*0.2;const ph=sh*0.8;const gap=sw*0.08;const totalFW=pw*3+gap*2;const fx=cx-totalFW/2;
    ctx.fillStyle='#a1887f';
    for(let p=0;p<3;p++){const px=fx+p*(pw+gap);ctx.fillRect(px,by-ph,pw,ph);
      // Plank top point
      ctx.beginPath();ctx.moveTo(px,by-ph);ctx.lineTo(px+pw/2,by-ph-pw*0.3);ctx.lineTo(px+pw,by-ph);ctx.fill();
    }
    // Cross bars
    ctx.fillStyle='#8d6e63';ctx.fillRect(fx-gap,by-ph*0.7,totalFW+gap*2,ph*0.08);
    ctx.fillRect(fx-gap,by-ph*0.35,totalFW+gap*2,ph*0.08);
  }
  ctx.restore();
}

function drawHideSeekGame(){
  // Sky
  const grd=ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#4fc3f7');grd.addColorStop(0.5,'#81d4fa');grd.addColorStop(1,'#c8e6c9');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  // Sun
  const S=Math.min(W,H);
  ctx.fillStyle='#ffeb3b';ctx.beginPath();ctx.arc(W*0.87,H*0.07,S*0.045,0,Math.PI*2);ctx.fill();
  // Clouds
  hsClouds.forEach(c=>drawCloud(c.x,c.y,c.s));
  // Grass — covers both levels
  const backY=hsSpots.length?hsSpots[0].y:H*0.42;
  ctx.fillStyle='#66bb6a';ctx.fillRect(0,backY,W,H-backY);
  ctx.fillStyle='#4caf50';ctx.fillRect(0,backY,W,6);
  // Draw spots
  const sp=hsSpots;
  for(let i=0;i<sp.length;i++) hsDrawSpot(i,sp[i]);
  // Draw peeking animal (clipped)
  if(hsState==='hiding'||hsState==='peeking'){
    const s=sp[hsSpotIdx];const fontSize=S*0.08;
    if(Math.abs(hsPeekOffset)>1){
      ctx.save();
      // Clip: only show part outside the spot bounding area
      const clipX=hsPeekDir>0?s.x+s.w*0.3:-9999;const clipW=hsPeekDir>0?W:s.x-s.w*0.3+9999;
      if(hsPeekDir<0){
        ctx.beginPath();ctx.rect(0,0,s.x-s.w*0.3,H);ctx.clip();
      }else{
        ctx.beginPath();ctx.rect(s.x+s.w*0.3,0,W,H);ctx.clip();
      }
      ctx.font=fontSize+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(hsAnimal.emoji,s.x+hsPeekOffset,s.y-s.h*0.35);
      ctx.restore();
    }
  }
  // Draw found animal bouncing up
  if(hsState==='found'){
    const s=sp[hsSpotIdx];const fontSize=S*0.12;
    const bounceY=Math.sin(hsFoundBounce*6)*S*0.03;
    const riseY=Math.min(hsFoundTimer*2,1)*s.h*0.8;
    ctx.font=fontSize+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(hsAnimal.emoji,s.x,s.y-s.h*0.3-riseY+bounceY);
  }
  // Done state — show all animals dancing
  if(hsState==='done'){
    const fontSize=S*0.09;ctx.font=fontSize+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    for(let i=0;i<Math.min(hsTotalRounds,sp.length);i++){
      const a=HS_ANIMALS[i%HS_ANIMALS.length];
      const bounceY=Math.sin(Date.now()/300+i*1.2)*S*0.02;
      ctx.fillText(a.emoji,sp[i].x,sp[i].y-sp[i].h*0.8+bounceY);
    }
  }
  // Score
  ctx.fillStyle='#fff';ctx.font='bold '+S*0.04+'px sans-serif';ctx.textAlign='right';
  ctx.shadowColor='rgba(0,0,0,0.3)';ctx.shadowBlur=4;
  ctx.fillText('⭐ '+hsScore+'/'+hsTotalRounds,W-12,S*0.06);
  ctx.shadowBlur=0;ctx.textAlign='left';
  drawParticles(0);drawConfetti();
}

// =============================================
// ITSY BITSY SPIDER STORYBOOK
// =============================================
let spiderPage=0,spiderState='waiting',spiderY=0,spiderTargetY=0,spiderTapCount=0;
let spiderClimbTimer=0,spiderWiggle=0,spiderEyeBlink=0;
let spiderRainDrops=[],spiderRainTimer=0,spiderCloudDark=0;
let spiderSunSize=0,spiderSunTarget=0,spiderSunRays=0;
let spiderPuddles=[],spiderAutoTimer=0,spiderPageTimer=0;
let spiderDoneTimer=0,spiderSpoutX=0,spiderSpoutTop=0,spiderSpoutBot=0;
let spiderGroundY=0,spiderLegPhase=0;
const SPIDER_LYRICS=[
  'The itsy bitsy spider climbed up the water spout',
  'Down came the rain and washed the spider out',
  'Out came the sun and dried up all the rain',
  'The itsy bitsy spider climbed up the spout again'
];

function startSpiderGame(){
  currentMode='spider';particles=[];confetti=[];
  spiderPage=0;spiderState='waiting';spiderClimbTimer=0;spiderWiggle=0;
  spiderEyeBlink=0;spiderRainDrops=[];spiderRainTimer=0;spiderCloudDark=0;
  spiderSunSize=0;spiderSunTarget=0;spiderSunRays=0;spiderAutoTimer=0;
  spiderPageTimer=0;spiderDoneTimer=0;spiderLegPhase=0;
  const S=Math.min(W,H);
  spiderSpoutX=W*0.65;
  spiderSpoutTop=H*0.12;
  spiderSpoutBot=H*0.78;
  spiderGroundY=H*0.82;
  spiderY=spiderSpoutBot;
  spiderTargetY=spiderSpoutTop+S*0.08;
  spiderPuddles=[{x:W*0.2,s:1},{x:W*0.45,s:1},{x:W*0.75,s:1}];
  updateSpiderButtons();
}

function updateSpiderButtons(){
  buttonsArea.innerHTML='';
  instruction.textContent='';
  if(spiderState==='done'&&spiderPage===3){
    addBtn('btn-again','🔄','Again',()=>{initAudio();startSpiderGame()});
  }
}

function spiderGoToPage(pg){
  spiderPage=pg;spiderState='waiting';spiderAutoTimer=0;spiderPageTimer=0;spiderTapCount=0;
  const S=Math.min(W,H);
  if(pg===1){
    spiderState='waiting';spiderCloudDark=0;
    spiderRainDrops=[];spiderRainTimer=0;
    spiderY=spiderSpoutTop+S*0.08;
  }else if(pg===2){
    spiderState='waiting';
    spiderSunSize=0;spiderSunTarget=S*0.18;spiderSunRays=0;
    spiderPuddles=[{x:W*0.2,s:5},{x:W*0.45,s:5},{x:W*0.75,s:5}];
  }else if(pg===3){
    spiderState='waiting';
    spiderY=spiderSpoutBot;spiderTargetY=spiderSpoutTop+Math.min(W,H)*0.08;
  }
  updateSpiderButtons();
}

function handleSpiderTap(tx,ty){
  initAudio();
  const S=Math.min(W,H);
  if((spiderPage===0||spiderPage===3)&&spiderState==='waiting'){
    // Each tap moves spider up one step (not auto-climb)
    spiderY-=S*0.06;
    spiderLegPhase+=2;
    playTone(400+spiderTapCount*30,0.08,'sine',0.08);
    spiderTapCount++;
    if(spiderY<=spiderTargetY){
      spiderY=spiderTargetY;spiderState='done';
      if(spiderPage===0){playPop();setTimeout(()=>spiderGoToPage(1),1200)}
      else{playJingle();playTaDa();spawnConfetti();spawnConfetti();spiderDoneTimer=0;updateSpiderButtons()}
    }
  }else if(spiderPage===1){
    // Tap sky area to make rain clouds burst
    spiderTapCount++;
    spiderCloudDark=Math.min(1,spiderTapCount*0.2);
    for(let i=0;i<12;i++){
      spiderRainDrops.push({x:W*0.1+Math.random()*W*0.8,y:H*0.1+Math.random()*H*0.1,vy:3+Math.random()*4,s:2+Math.random()*3});
    }
    playTone(100+Math.random()*80,0.15,'sine',0.06);
    if(navigator.vibrate)navigator.vibrate(15);
    // After 5 taps, spider starts washing down
    if(spiderTapCount>=5&&spiderY<spiderSpoutBot){
      spiderY=Math.min(spiderSpoutBot,spiderY+S*0.08);
    }
    // Advance when spider fully down
    if(spiderY>=spiderSpoutBot&&spiderTapCount>=5){spiderGoToPage(2)}
  }else if(spiderPage===2){
    // Tap to grow sun and dry puddles
    spiderTapCount++;
    spiderSunTarget=Math.min(S*0.25,spiderSunTarget+S*0.02);
    spiderPuddles.forEach(p=>{p.s=Math.max(0,p.s-1)});
    spiderCloudDark=Math.max(0,spiderCloudDark-0.2);
    playTone(500+spiderTapCount*40,0.15,'sine',0.08);
    spawnParticles(W*0.25,H*0.2,4,['#ffeb3b','#fff9c4'],{vyRange:3,spread:15,maxSize:4});
    // Advance when puddles gone (takes ~5 taps since s starts at 5)
    if(spiderPuddles.every(p=>p.s<=0)){spiderGoToPage(3)}
  }
}

function updateSpiderGame(dt){
  updateParticles(dt);updateConfetti();
  const S=Math.min(W,H);
  spiderWiggle+=dt*8;
  spiderEyeBlink+=dt;
  spiderLegPhase+=dt*6;

  // All pages: update rain drops (falling animation only)
  for(let i=spiderRainDrops.length-1;i>=0;i--){
    spiderRainDrops[i].y+=spiderRainDrops[i].vy;
    if(spiderRainDrops[i].y>spiderGroundY)spiderRainDrops.splice(i,1);
  }

  // Page 2: smooth sun size animation + sky brightening timer
  if(spiderPage===2){
    spiderPageTimer+=dt;
    spiderSunSize+=(spiderSunTarget-spiderSunSize)*dt*2;
    spiderSunRays+=dt*2;
  }

  // Done celebration confetti
  if(spiderPage===3&&spiderState==='done'){
    spiderDoneTimer+=dt;
    if(spiderDoneTimer<3&&Math.random()<0.1)spawnConfetti();
  }
}

function drawSpiderGame(){
  const S=Math.min(W,H);

  // Sky gradient - changes based on page
  const skyGrd=ctx.createLinearGradient(0,0,0,H);
  if(spiderPage===1){
    const d=spiderCloudDark;
    skyGrd.addColorStop(0,`rgb(${lerp(135,80,d)},${lerp(206,80,d)},${lerp(235,100,d)})`);
    skyGrd.addColorStop(0.6,`rgb(${lerp(187,120,d)},${lerp(222,120,d)},${lerp(251,140,d)})`);
    skyGrd.addColorStop(1,'#a5d6a7');
  }else if(spiderPage===2){
    const b=Math.min(1,spiderPageTimer*0.3);
    skyGrd.addColorStop(0,`rgb(${lerp(100,135,b)},${lerp(100,206,b)},${lerp(120,250,b)})`);
    skyGrd.addColorStop(0.5,`rgb(${lerp(130,255,b)},${lerp(130,243,b)},${lerp(150,224,b)})`);
    skyGrd.addColorStop(1,`rgb(${lerp(140,165,b)},${lerp(180,214,b)},${lerp(140,167,b)})`);
  }else{
    skyGrd.addColorStop(0,'#87ceeb');skyGrd.addColorStop(0.6,'#bbdefb');skyGrd.addColorStop(1,'#a5d6a7');
  }
  ctx.fillStyle=skyGrd;ctx.fillRect(0,0,W,H);

  // Sun (pages 2,3)
  if(spiderPage>=2){
    const sx=W*0.22,sy=H*0.18;
    const sr=spiderPage===2?spiderSunSize:(S*0.15);
    if(sr>2){
      // Rays
      ctx.save();ctx.translate(sx,sy);
      const rayCount=12;
      for(let i=0;i<rayCount;i++){
        const a=(i/rayCount)*Math.PI*2+spiderSunRays*0.3;
        ctx.fillStyle='rgba(255,235,59,0.25)';
        ctx.beginPath();
        ctx.moveTo(Math.cos(a-0.12)*sr,Math.sin(a-0.12)*sr);
        ctx.lineTo(Math.cos(a)*sr*1.7,Math.sin(a)*sr*1.7);
        ctx.lineTo(Math.cos(a+0.12)*sr,Math.sin(a+0.12)*sr);
        ctx.fill();
      }
      // Sun body gradient
      const sunGrd=ctx.createRadialGradient(0,0,0,0,0,sr);
      sunGrd.addColorStop(0,'#fff9c4');sunGrd.addColorStop(0.5,'#ffeb3b');sunGrd.addColorStop(1,'#f9a825');
      ctx.fillStyle=sunGrd;
      ctx.beginPath();ctx.arc(0,0,sr,0,Math.PI*2);ctx.fill();
      // Sun face
      if(sr>20){
        ctx.fillStyle='#f57f17';
        ctx.beginPath();ctx.arc(-sr*0.25,-sr*0.15,sr*0.08,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(sr*0.25,-sr*0.15,sr*0.08,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(0,sr*0.15,sr*0.2,0,Math.PI);ctx.stroke();
      }
      ctx.restore();
    }
  }

  // Clouds
  if(spiderPage<=2){
    const cd=spiderCloudDark;
    ctx.fillStyle=`rgba(${lerp(255,100,cd)},${lerp(255,100,cd)},${lerp(255,110,cd)},0.85)`;
    ctx.beginPath();
    // Cloud 1
    ctx.arc(W*0.15,H*0.1,25,0,Math.PI*2);ctx.arc(W*0.15+30,H*0.1-12,30,0,Math.PI*2);ctx.arc(W*0.15+60,H*0.1,25,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    // Cloud 2
    ctx.arc(W*0.45,H*0.07,20,0,Math.PI*2);ctx.arc(W*0.45+25,H*0.07-10,25,0,Math.PI*2);ctx.arc(W*0.45+50,H*0.07,20,0,Math.PI*2);
    ctx.fill();
    if(spiderPage===1){
      ctx.beginPath();
      ctx.arc(W*0.75,H*0.12,22,0,Math.PI*2);ctx.arc(W*0.75+28,H*0.12-10,27,0,Math.PI*2);ctx.arc(W*0.75+55,H*0.12,22,0,Math.PI*2);
      ctx.fill();
    }
  }

  // House wall (right side)
  ctx.fillStyle='#8d6e63';
  ctx.fillRect(W*0.55,H*0.08,W*0.5,spiderGroundY-H*0.08);
  // Brick lines
  ctx.strokeStyle='#6d4c41';ctx.lineWidth=1;
  for(let row=0;row<20;row++){
    const by=H*0.08+row*((spiderGroundY-H*0.08)/20);
    ctx.beginPath();ctx.moveTo(W*0.55,by);ctx.lineTo(W,by);ctx.stroke();
    const off=row%2===0?0:W*0.05;
    for(let col=0;col<12;col++){
      const bx=W*0.55+off+col*W*0.1;
      ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx,by+((spiderGroundY-H*0.08)/20));ctx.stroke();
    }
  }

  // Water spout (pipe)
  const pipeW=S*0.04;
  ctx.fillStyle='#90a4ae';
  ctx.fillRect(spiderSpoutX-pipeW/2,spiderSpoutTop,pipeW,spiderSpoutBot-spiderSpoutTop+S*0.02);
  // Pipe highlight
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.fillRect(spiderSpoutX-pipeW/2+2,spiderSpoutTop,pipeW*0.3,spiderSpoutBot-spiderSpoutTop+S*0.02);
  // Pipe rim top
  ctx.fillStyle='#78909c';
  ctx.fillRect(spiderSpoutX-pipeW*0.7,spiderSpoutTop-4,pipeW*1.4,8);
  // Pipe rim bottom
  ctx.fillRect(spiderSpoutX-pipeW*0.7,spiderSpoutBot+S*0.01,pipeW*1.4,8);

  // Ground
  ctx.fillStyle='#66bb6a';
  ctx.fillRect(0,spiderGroundY,W,H-spiderGroundY);
  // Grass blades
  ctx.strokeStyle='#4caf50';ctx.lineWidth=2;
  for(let i=0;i<30;i++){
    const gx=i*(W/30)+5;
    ctx.beginPath();ctx.moveTo(gx,spiderGroundY);ctx.lineTo(gx+3,spiderGroundY-8-Math.sin(spiderWiggle+i)*3);ctx.stroke();
  }

  // Rain drops
  ctx.fillStyle='#42a5f5';
  spiderRainDrops.forEach(r=>{
    ctx.beginPath();ctx.ellipse(r.x,r.y,r.s*0.5,r.s,0,0,Math.PI*2);ctx.fill();
  });

  // Puddles
  if(spiderPage>=1){
    spiderPuddles.forEach(p=>{
      if(p.s>0.01){
        ctx.fillStyle='rgba(66,165,245,0.4)';
        ctx.beginPath();ctx.ellipse(p.x,spiderGroundY+4,30*p.s,6*p.s,0,0,Math.PI*2);ctx.fill();
      }
    });
  }

  // Draw spider
  drawCuteSpider(spiderSpoutX,spiderY,S*0.04);

  // Lyric text at top
  ctx.save();
  // Big lyric text — wraps across lines
  const lyric=SPIDER_LYRICS[spiderPage];
  const fontSize=Math.max(20,S*0.06);
  ctx.font=`bold ${fontSize}px sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='top';
  // Word-wrap
  const words=lyric.split(' ');let lines=[];let line='';
  words.forEach(w=>{const test=line?line+' '+w:w;if(ctx.measureText(test).width>W*0.85){lines.push(line);line=w}else{line=test}});
  if(line)lines.push(line);
  const lineH=fontSize*1.3;const startY=H*0.08;
  lines.forEach((l,i)=>{
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillText(l,W/2+2,startY+i*lineH+2);
    ctx.fillStyle='#fff';ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=8;
    ctx.fillText(l,W/2,startY+i*lineH);ctx.shadowBlur=0;
  });
  ctx.textBaseline='alphabetic';
  ctx.textAlign='left';
  ctx.restore();

  // "The End!" text
  if(spiderPage===3&&spiderState==='done'){
    ctx.save();
    ctx.font=`bold ${S*0.1}px sans-serif`;ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillText('The End!',W/2+3,H*0.45+3);
    ctx.fillStyle='#ffeb3b';ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=8;
    ctx.fillText('The End!',W/2,H*0.45);
    ctx.shadowBlur=0;ctx.textAlign='left';
    ctx.restore();
  }

  // Tap hint — always at bottom center, below the action
  const hints=['👆 Tap to climb!','☁️ Tap for rain!','☀️ Tap for sun!','👆 Tap to climb!'];
  if(spiderState==='waiting'||spiderState==='done'){
    const pulse=0.6+Math.sin(spiderWiggle*1.5)*0.3;
    ctx.globalAlpha=spiderState==='done'?0:pulse;
    ctx.font=`bold ${S*0.04}px sans-serif`;ctx.textAlign='center';
    ctx.fillStyle='#fff';ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=4;
    ctx.fillText(hints[spiderPage],W*0.35,H*0.75);
    ctx.shadowBlur=0;
    ctx.textAlign='left';ctx.globalAlpha=1;
  }

  drawParticles(0);drawConfetti();
}

function drawCuteSpider(sx,sy,radius){
  const r=radius;
  const wigX=Math.sin(spiderWiggle)*r*0.15;
  const climbing=(spiderState==='animating'&&(spiderPage===0||spiderPage===3));

  ctx.save();ctx.translate(sx+wigX,sy);

  // Legs (4 on each side)
  ctx.strokeStyle='#4e342e';ctx.lineWidth=Math.max(2,r*0.12);ctx.lineCap='round';
  for(let side=-1;side<=1;side+=2){
    for(let i=0;i<4;i++){
      const spread=(i-1.5)*0.5; // wider vertical spread
      const legLen=r*1.6;
      const baseY=(-0.6+i*0.45)*r;
      const kneeX=side*r*0.9;
      const kneeY=baseY-r*0.2+(climbing?Math.sin(spiderLegPhase+i*1.2+side)*r*0.15:0);
      const tipX=side*r*1.8+(climbing?Math.sin(spiderLegPhase+i*1.2)*r*0.2:0);
      const tipY=baseY+r*0.3+(climbing?Math.sin(spiderLegPhase+i*1.2+side+1)*r*0.2:0);
      ctx.beginPath();
      ctx.moveTo(side*r*0.35,baseY);
      ctx.quadraticCurveTo(kneeX,kneeY,tipX,tipY);
      ctx.stroke();
    }
  }

  // Body (round, dark)
  const bodyGrd=ctx.createRadialGradient(0,0,0,0,0,r);
  bodyGrd.addColorStop(0,'#5d4037');bodyGrd.addColorStop(0.7,'#3e2723');bodyGrd.addColorStop(1,'#212121');
  ctx.fillStyle=bodyGrd;
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();

  // Head (slightly overlapping top)
  const headR=r*0.6;
  const headY=-r*0.7;
  const headGrd=ctx.createRadialGradient(0,headY,0,0,headY,headR);
  headGrd.addColorStop(0,'#5d4037');headGrd.addColorStop(1,'#3e2723');
  ctx.fillStyle=headGrd;
  ctx.beginPath();ctx.arc(0,headY,headR,0,Math.PI*2);ctx.fill();

  // Eyes (big, friendly)
  const eyeSpacing=headR*0.45;
  const eyeY=headY-headR*0.1;
  const eyeR=headR*0.35;
  const blinkClose=(Math.floor(spiderEyeBlink*0.7)%8===0)?0.15:1;
  // White of eye
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(-eyeSpacing,eyeY,eyeR,eyeR*blinkClose,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(eyeSpacing,eyeY,eyeR,eyeR*blinkClose,0,0,Math.PI*2);ctx.fill();
  // Pupil
  if(blinkClose>0.5){
    ctx.fillStyle='#212121';
    ctx.beginPath();ctx.arc(-eyeSpacing+eyeR*0.1,eyeY,eyeR*0.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(eyeSpacing+eyeR*0.1,eyeY,eyeR*0.5,0,Math.PI*2);ctx.fill();
    // Highlight
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(-eyeSpacing-eyeR*0.1,eyeY-eyeR*0.2,eyeR*0.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(eyeSpacing-eyeR*0.1,eyeY-eyeR*0.2,eyeR*0.2,0,Math.PI*2);ctx.fill();
  }

  // Cute smile
  ctx.strokeStyle='#fff';ctx.lineWidth=Math.max(1,r*0.07);ctx.lineCap='round';
  ctx.beginPath();ctx.arc(0,headY+headR*0.2,headR*0.25,0.2,Math.PI-0.2);ctx.stroke();

  // Rosy cheeks
  ctx.fillStyle='rgba(244,67,54,0.2)';
  ctx.beginPath();ctx.arc(-eyeSpacing-eyeR*0.3,eyeY+eyeR*0.7,eyeR*0.35,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(eyeSpacing+eyeR*0.3,eyeY+eyeR*0.7,eyeR*0.35,0,Math.PI*2);ctx.fill();

  ctx.restore();
}

// BLENDER / JUICE GAME
// =============================================
const BLEND_FRUITS=[
  {id:'strawberry',emoji:'🍓',label:'Strawberry',color:[255,50,50]},
  {id:'banana',emoji:'🍌',label:'Banana',color:[255,230,80]},
  {id:'blueberry',emoji:'🫐',label:'Blueberry',color:[80,80,200]},
  {id:'orange',emoji:'🍊',label:'Orange',color:[255,160,40]},
  {id:'apple',emoji:'🍏',label:'Apple',color:[120,200,80]},
  {id:'grape',emoji:'🍇',label:'Grape',color:[150,50,180]},
  {id:'milk',emoji:'🥛',label:'Milk',color:[255,255,255],btn:'btn-milk'},
];
let blendPhase='adding'; // 'adding','blending','done'
let blendFruits=[]; // {x,y,vx,vy,emoji,color,radius}
let blendTimer=0,blendBladeAngle=0,blendVibX=0,blendVibY=0;
let blendJuiceColor=[200,200,200],blendJuiceFill=0,blendWaveT=0;
let blendParticlesInner=[];
let blendHumPlaying=false,blendHumTimer=0;
let blendCups=[],blendPourTarget=-1,blendPourLevel=0,blendPourStreamT=0,blendTiltAngle=0;
let blendMilkCount=0;

function startBlendGame(){
  currentMode='blend';particles=[];confetti=[];
  blendPhase='adding';blendFruits=[];blendTimer=0;
  blendBladeAngle=0;blendVibX=0;blendVibY=0;
  blendJuiceColor=[200,200,200];blendJuiceFill=0;blendWaveT=0;
  blendParticlesInner=[];blendHumPlaying=false;blendHumTimer=0;
  blendCups=[];blendPourTarget=-1;blendPourLevel=0;blendPourStreamT=0;blendTiltAngle=0;blendMilkCount=0;
  instruction.textContent='';
  updateBlendButtons();
}

function updateBlendButtons(){
  buttonsArea.innerHTML='';instruction.textContent='';
  if(blendPhase==='adding'){
    BLEND_FRUITS.forEach(f=>{
      addBtn(f.btn||'btn-blend',f.emoji,f.label,()=>{
        initAudio();
        if(f.id==='milk'){
          if(blendMilkCount>=5)return;
          blendMilkCount++;
          const pb=blendGetJarBounds();
          spawnParticles(W/2+(Math.random()-0.5)*pb.topW*0.3,pb.jarY+pb.S*0.02,8,['#fff','#e3f2fd'],{vyRange:4,spread:15,maxSize:5});
          playTone(500,0.15,'sine',0.1);playTone(350,0.2,'sine',0.08,0.1);
        }else{
          if(blendFruits.length>=12)return;
          const S=Math.min(W,H);
          const bx=W*0.5+(Math.random()-0.5)*S*0.15;
          const r=S*0.04;
          blendFruits.push({x:bx,y:H*0.1,vx:(Math.random()-0.5)*60,vy:0,emoji:f.emoji,color:f.color,radius:r,scale:1});
          playPop();playTone(250+Math.random()*100,0.15,'triangle',0.08);
        }
        sayWord(f.label);
        if(navigator.vibrate)navigator.vibrate(15);
        updateBlendButtons();
      },f.id==='milk'?blendMilkCount>=5:blendFruits.length>=12);
    });
    addBtn('btn-blendgo','🔄','Blend!',()=>{
      initAudio();
      blendPhase='blending';blendTimer=0;
      // ascending whirr
      for(let i=0;i<6;i++)playTone(200+i*80,0.25,'sawtooth',0.06,i*0.15);
      updateBlendButtons();
    },blendFruits.length+blendMilkCount<2);
  } else if(blendPhase==='done'){
    addBtn('btn-again','🔄','Again',()=>{initAudio();startBlendGame()});
  }
}

function blendGetJarBounds(){
  const S=Math.min(W,H);
  const portrait=H>W*1.5;
  const topW=S*0.44;
  const botW=S*0.26;
  const jarH=S*0.5;
  const jarCX=W/2;
  const jarY=portrait?H*0.15:H*0.1;
  const baseH=S*0.07;
  const jarW=topW;
  const jarX=jarCX-topW/2;
  return {jarX,jarY,jarW,jarH,baseH,S,portrait,topW,botW,jarCX};
}

function blendJarPath(cx,topW,botW,y,h){
  const r=Math.min(topW,botW)*0.08;
  ctx.beginPath();
  ctx.moveTo(cx-topW/2,y);
  ctx.lineTo(cx+topW/2,y);
  ctx.lineTo(cx+botW/2,y+h-r);
  ctx.quadraticCurveTo(cx+botW/2,y+h,cx+botW/2-r,y+h);
  ctx.lineTo(cx-botW/2+r,y+h);
  ctx.quadraticCurveTo(cx-botW/2,y+h,cx-botW/2,y+h-r);
  ctx.lineTo(cx-topW/2,y);
  ctx.closePath();
}

function updateBlendGame(dt){
  updateParticles(dt);updateConfetti();updateFloatingEmojis(dt);
  const b=blendGetJarBounds();
  const jarBot=b.jarY+b.jarH;
  const grav=300;

  if(blendPhase==='adding'||blendPhase==='blending'){
    blendFruits.forEach(f=>{
      f.vy+=grav*dt;
      if(blendPhase==='blending'){
        // centripetal swirl toward center
        const cx=W/2,cy=b.jarY+b.jarH*0.5;
        f.vx+=(cx-f.x)*2*dt;
        f.vy+=(cy-f.y)*2*dt;
        f.vx+=Math.cos(blendBladeAngle*3)*80*dt;
        f.vy+=Math.sin(blendBladeAngle*3)*80*dt;
      }
      f.x+=f.vx*dt;f.y+=f.vy*dt;
      // bounce off cone-shaped jar walls
      const fy=Math.max(b.jarY,Math.min(f.y,b.jarY+b.jarH));
      const wt=(fy-b.jarY)/b.jarH;
      const wAtY=b.topW+(b.botW-b.topW)*wt;
      const lAtY=b.jarCX-wAtY/2+b.S*0.02;
      const rAtY=b.jarCX+wAtY/2-b.S*0.02;
      if(f.x-f.radius<lAtY){f.x=lAtY+f.radius;f.vx=Math.abs(f.vx)*0.8}
      if(f.x+f.radius>rAtY){f.x=rAtY-f.radius;f.vx=-Math.abs(f.vx)*0.8}
      // bounce off bottom
      if(f.y+f.radius>jarBot-b.baseH*0.3){f.y=jarBot-b.baseH*0.3-f.radius;f.vy*=-0.5;f.vx*=0.8}
      // bounce off top (lid during blending)
      if(f.y-f.radius<b.jarY+b.S*0.03){f.y=b.jarY+b.S*0.03+f.radius;f.vy=Math.abs(f.vy)*0.5}
    });
    // fruit-fruit collision
    for(let i=0;i<blendFruits.length;i++){
      for(let j=i+1;j<blendFruits.length;j++){
        const a=blendFruits[i],bb=blendFruits[j];
        const dx=bb.x-a.x,dy=bb.y-a.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        const minD=a.radius+bb.radius;
        if(dist<minD&&dist>0.1){
          const nx=dx/dist,ny=dy/dist;
          const overlap=(minD-dist)/2;
          a.x-=nx*overlap;a.y-=ny*overlap;
          bb.x+=nx*overlap;bb.y+=ny*overlap;
          a.vx-=nx*30;a.vy-=ny*30;
          bb.vx+=nx*30;bb.vy+=ny*30;
        }
      }
    }
  }

  if(blendPhase==='blending'){
    blendTimer+=dt;blendBladeAngle+=dt*15;
    // vibration
    blendVibX=(Math.random()-0.5)*3;blendVibY=(Math.random()-0.5)*3;
    // shrink fruits
    blendFruits.forEach(f=>{f.scale=Math.max(0,1-blendTimer*0.5)});
    // hum sound (play periodic low tone)
    if(!blendHumPlaying&&blendTimer<2){
      blendHumPlaying=true;blendHumTimer=0;
      playTone(120,0.4,'triangle',0.06);
      playTone(140,0.4,'sawtooth',0.04,0.05);
    }
    if(blendHumPlaying){blendHumTimer+=dt;if(blendHumTimer>=0.35)blendHumPlaying=false;}
    // inner swirl particles
    if(Math.random()<0.3){
      const avg=blendGetAvgColor();
      blendParticlesInner.push({
        x:W/2+(Math.random()-0.5)*b.botW*0.7,
        y:b.jarY+b.jarH*0.3+Math.random()*b.jarH*0.4,
        vx:(Math.random()-0.5)*50,vy:(Math.random()-0.5)*50,
        life:1,r:`rgb(${avg[0]},${avg[1]},${avg[2]})`
      });
    }
    for(let i=blendParticlesInner.length-1;i>=0;i--){
      const p=blendParticlesInner[i];
      p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt*1.2;
      if(p.life<=0)blendParticlesInner.splice(i,1);
    }
    // transition to pouring
    if(blendTimer>=2.2){
      blendPhase='pouring';blendTimer=0;
      blendJuiceColor=blendGetAvgColor();
      blendPourLevel=1;blendPourTarget=-1;blendPourStreamT=0;
      blendParticlesInner=[];
      const pb=blendGetJarBounds();
      const cS=pb.S,cupW=cS*0.12,cupH=cS*0.14;
      const cupY=pb.jarY+pb.jarH+pb.baseH*1.3+cS*0.06;
      const gap=cS*0.2;
      blendCups=[
        {x:W/2-gap-cupW/2,y:cupY,w:cupW,h:cupH,fill:0},
        {x:W/2-cupW/2,y:cupY,w:cupW,h:cupH,fill:0},
        {x:W/2+gap-cupW/2,y:cupY,w:cupW,h:cupH,fill:0}
      ];
      playTone(400,0.2,'triangle',0.08);
      if(navigator.vibrate)navigator.vibrate(20);
      updateBlendButtons();
    }
  }

  if(blendPhase==='pouring'){
    blendTimer+=dt;blendWaveT+=dt*3;
    // Tilt jar toward active cup
    let tiltTarget=0;
    if(blendPourTarget>=0){
      const cupCX=blendCups[blendPourTarget].x+blendCups[blendPourTarget].w/2;
      const diff=cupCX-W/2;
      const sign=diff>=0?1:-1;
      tiltTarget=sign*Math.max(0.15,Math.min(0.25,Math.abs(diff)/(Math.min(W,H)*0.25)*0.25));
    }
    blendTiltAngle+=(tiltTarget-blendTiltAngle)*Math.min(1,dt*5);
    if(blendPourTarget>=0&&blendPourLevel>0){
      const cup=blendCups[blendPourTarget];
      const maxPC=1/blendCups.length;
      const pourRate=0.45*dt;
      const room=maxPC-cup.fill;
      const amt=Math.min(pourRate,blendPourLevel,room);
      blendPourLevel-=amt;cup.fill+=amt;
      blendPourStreamT+=dt*12;
      if(!blendHumPlaying){blendHumPlaying=true;blendHumTimer=0;playTone(180+Math.random()*40,0.15,'triangle',0.04)}
      if(blendHumPlaying){blendHumTimer+=dt;if(blendHumTimer>=0.14)blendHumPlaying=false}
      if(cup.fill>=maxPC-0.005){
        cup.fill=maxPC;blendPourTarget=-1;blendPourStreamT=0;
        playPop();spawnFloatingEmoji(cup.x+cup.w/2,cup.y,'\u{1F60B}');
        if(navigator.vibrate)navigator.vibrate(15);
      }
    }
    const allCupsFull=blendCups.length>0&&blendCups.every(c=>c.fill>=1/blendCups.length-0.005);
    if(blendPourLevel<=0.01||allCupsFull){
      blendPourLevel=0;blendPourTarget=-1;
      blendPhase='done';blendTimer=0;
      playJingle();spawnConfetti();
      if(navigator.vibrate)navigator.vibrate(30);
      updateBlendButtons();
    }
  }

  if(blendPhase==='done'){
    blendTimer+=dt;blendWaveT+=dt*3;
    blendTiltAngle*=0.9;
    if(blendTimer<3&&Math.random()<0.1)spawnConfetti();
  }
}

function blendGetAvgColor(){
  const n=blendFruits.length+blendMilkCount;
  if(n===0)return[200,200,200];
  let r=0,g=0,bl=0;
  blendFruits.forEach(f=>{r+=f.color[0];g+=f.color[1];bl+=f.color[2]});
  r+=blendMilkCount*255;g+=blendMilkCount*255;bl+=blendMilkCount*255;
  return[Math.round(r/n),Math.round(g/n),Math.round(bl/n)];
}

function handleBlendTap(mx,my){
  if(blendPhase!=='pouring')return;
  for(let i=0;i<blendCups.length;i++){
    const c=blendCups[i];
    const maxPC=1/blendCups.length;
    if(c.fill>=maxPC-0.005)continue;
    if(mx>=c.x-15&&mx<=c.x+c.w+15&&my>=c.y-25&&my<=c.y+c.h+25){
      blendPourTarget=i;blendPourStreamT=0;
      initAudio();playTone(300,0.1,'triangle',0.06);
      return;
    }
  }
}

function drawBlendGame(){
  ctx.globalAlpha=1;
  const S=Math.min(W,H);
  // Background gradient
  const bgGrd=ctx.createLinearGradient(0,0,0,H);
  bgGrd.addColorStop(0,'#e1bee7');bgGrd.addColorStop(0.5,'#f3e5f5');bgGrd.addColorStop(1,'#fce4ec');
  ctx.fillStyle=bgGrd;ctx.fillRect(0,0,W,H);

  const jb=blendGetJarBounds();
  const ox=blendPhase==='blending'?blendVibX:0;
  const oy=blendPhase==='blending'?blendVibY:0;
  const {topW,botW,jarCX,jarH,baseH}=jb;
  const jarY=jb.jarY+oy,cx=jarCX+ox;

  // Blender base (connects to cone bottom)
  ctx.fillStyle='#424242';
  drawRoundRect(cx-botW/2-S*0.03,jarY+jarH-baseH*0.3,botW+S*0.06,baseH+S*0.02,S*0.02);
  ctx.fill();
  ctx.fillStyle='#616161';
  drawRoundRect(cx-botW/2-S*0.07,jarY+jarH+baseH*0.5,botW+S*0.14,baseH*0.6,S*0.02);
  ctx.fill();
  // Button on base
  ctx.fillStyle='#e53935';
  ctx.beginPath();ctx.arc(cx,jarY+jarH+baseH*0.8,S*0.018,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ef5350';
  ctx.beginPath();ctx.arc(cx-S*0.004,jarY+jarH+baseH*0.76,S*0.006,0,Math.PI*2);ctx.fill();

  // Tilt jar for pouring (pivot at jar bottom center)
  const pivotX=cx,pivotY=jarY+jarH;
  ctx.save();
  ctx.translate(pivotX,pivotY);
  ctx.rotate(blendTiltAngle);
  ctx.translate(-pivotX,-pivotY);

  // Glass jar outline + shine (drawn before contents so nothing overlays fruits)
  blendJarPath(cx,topW,botW,jarY,jarH);
  ctx.strokeStyle='rgba(100,181,246,0.5)';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.beginPath();
  const shLt=cx-topW/2+S*0.012;
  ctx.moveTo(shLt,jarY+S*0.02);ctx.lineTo(shLt+S*0.02,jarY+S*0.02);
  const wAt65=topW+(botW-topW)*0.65;
  ctx.lineTo(cx-wAt65/2+S*0.012+S*0.02,jarY+jarH*0.65);
  ctx.lineTo(cx-wAt65/2+S*0.012,jarY+jarH*0.65);
  ctx.closePath();ctx.fill();
  // Rim at top
  ctx.fillStyle='rgba(120,144,156,0.6)';
  drawRoundRect(cx-topW/2-S*0.008,jarY-S*0.012,topW+S*0.016,S*0.02,S*0.008);
  ctx.fill();
  ctx.fillStyle='rgba(144,164,174,0.8)';
  drawRoundRect(cx-topW/2-S*0.004,jarY-S*0.01,topW+S*0.008,S*0.012,S*0.005);
  ctx.fill();

  // Juice fill (pouring phase) — clipped to cone
  if(blendPhase==='pouring'&&blendPourLevel>0){
    const jc=blendJuiceColor;
    const fillH=jarH*0.65*blendPourLevel;
    const fillY=jarY+jarH-fillH-baseH*0.3;
    ctx.save();
    blendJarPath(cx,topW,botW,jarY,jarH);
    ctx.clip();
    ctx.fillStyle=`rgba(${jc[0]},${jc[1]},${jc[2]},0.85)`;
    ctx.fillRect(cx-topW/2,fillY,topW,fillH+baseH);
    // Wave on top
    ctx.fillStyle=`rgba(${Math.min(255,jc[0]+30)},${Math.min(255,jc[1]+30)},${Math.min(255,jc[2]+30)},0.6)`;
    ctx.beginPath();ctx.moveTo(cx-topW/2,fillY);
    for(let wx=0;wx<=topW;wx+=4){
      ctx.lineTo(cx-topW/2+wx,fillY+Math.sin(blendWaveT+wx*0.05)*S*0.01);
    }
    ctx.lineTo(cx+topW/2,fillY+S*0.015);ctx.lineTo(cx-topW/2,fillY+S*0.015);ctx.closePath();ctx.fill();
    ctx.restore();
  }

  // Milk pool rising from bottom
  if(blendMilkCount>0&&blendPhase!=='pouring'&&blendPhase!=='done'){
    const milkAlpha=blendPhase==='blending'?Math.max(0,0.75-blendTimer*0.55):0.75;
    if(milkAlpha>0){
      const milkH=jarH*0.15*blendMilkCount;
      const milkY=jarY+jarH-milkH;
      ctx.save();
      blendJarPath(cx,topW,botW,jarY,jarH);
      ctx.clip();
      ctx.fillStyle=`rgba(255,255,255,${milkAlpha})`;
      ctx.fillRect(cx-topW/2,milkY,topW,milkH+baseH);
      // Gentle wave on milk surface
      ctx.fillStyle=`rgba(220,240,255,${milkAlpha*0.6})`;
      ctx.beginPath();ctx.moveTo(cx-topW/2,milkY);
      for(let wx=0;wx<=topW;wx+=4){ctx.lineTo(cx-topW/2+wx,milkY+Math.sin(blendWaveT*1.5+wx*0.09)*S*0.008)}
      ctx.lineTo(cx+topW/2,milkY+S*0.012);ctx.lineTo(cx-topW/2,milkY+S*0.012);ctx.closePath();ctx.fill();
      ctx.restore();
    }
  }

  // Blades (3D metallic)
  ctx.save();
  ctx.translate(cx,jarY+jarH-baseH*0.3-S*0.02);
  ctx.rotate(blendBladeAngle);
  const hubR=S*0.015,bladeLen=S*0.05,bladeW=S*0.018;
  for(let i=0;i<4;i++){
    ctx.save();ctx.rotate(i*Math.PI/2);
    ctx.beginPath();
    ctx.moveTo(hubR,-bladeW*0.5);
    ctx.lineTo(bladeLen*0.6,-bladeW*0.4);
    ctx.lineTo(bladeLen,-bladeW*0.08);
    ctx.lineTo(bladeLen,bladeW*0.08);
    ctx.lineTo(bladeLen*0.6,bladeW*0.25);
    ctx.lineTo(hubR,bladeW*0.5);
    ctx.closePath();
    const blGrd=ctx.createLinearGradient(0,-bladeW,0,bladeW);
    blGrd.addColorStop(0,'#c8c8c8');blGrd.addColorStop(0.25,'#eaeaea');
    blGrd.addColorStop(0.45,'#ffffff');blGrd.addColorStop(0.55,'#d8d8d8');
    blGrd.addColorStop(0.8,'#a0a0a0');blGrd.addColorStop(1,'#787878');
    ctx.fillStyle=blGrd;ctx.fill();
    ctx.strokeStyle='rgba(100,100,100,0.6)';ctx.lineWidth=0.8;ctx.stroke();
    ctx.restore();
  }
  const hubGrd=ctx.createRadialGradient(0,0,0,0,0,hubR);
  hubGrd.addColorStop(0,'#fff');hubGrd.addColorStop(0.3,'#ddd');
  hubGrd.addColorStop(0.7,'#aaa');hubGrd.addColorStop(1,'#888');
  ctx.fillStyle=hubGrd;ctx.beginPath();ctx.arc(0,0,hubR,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#777';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#666';ctx.beginPath();ctx.arc(0,0,hubR*0.3,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // Fruits inside jar
  ctx.globalAlpha=1;
  if(blendPhase!=='done'){
    blendFruits.forEach(f=>{
      const sz=Math.max(4,f.radius*2*f.scale);
      ctx.font=`${sz}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.globalAlpha=f.scale<0.3?f.scale/0.3:1;
      ctx.fillText(f.emoji,f.x+ox,f.y+oy);
    });
    ctx.globalAlpha=1;
  }

  // Inner swirl particles during blending
  blendParticlesInner.forEach(p=>{
    ctx.globalAlpha=p.life*0.6;ctx.fillStyle=p.r;
    ctx.beginPath();ctx.arc(p.x+ox,p.y+oy,3,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // Lid (during blending only)
  if(blendPhase==='blending'){
    const lidGrd=ctx.createLinearGradient(0,jarY-S*0.035,0,jarY+S*0.005);
    lidGrd.addColorStop(0,'#90a4ae');lidGrd.addColorStop(0.5,'#78909c');lidGrd.addColorStop(1,'#607d8b');
    ctx.fillStyle=lidGrd;
    drawRoundRect(cx-topW/2-S*0.012,jarY-S*0.025,topW+S*0.024,S*0.035,S*0.012);
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;
    drawRoundRect(cx-topW/2-S*0.012,jarY-S*0.025,topW+S*0.024,S*0.035,S*0.012);
    ctx.stroke();
    ctx.fillStyle='#90a4ae';
    drawRoundRect(cx-S*0.015,jarY-S*0.055,S*0.03,S*0.035,S*0.008);
    ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.fillRect(cx-S*0.008,jarY-S*0.05,S*0.006,S*0.02);
  }

  ctx.restore(); // end jar tilt

  // Cups (pouring and done phases)
  if(blendPhase==='pouring'||blendPhase==='done'){
    const jc=blendJuiceColor;
    blendCups.forEach((cup,ci)=>{
      const ctw=cup.w,cbw=cup.w*0.78;
      const cOfsL=(ctw-cbw)/2;
      // Cup body
      ctx.fillStyle='#fff';
      ctx.beginPath();
      ctx.moveTo(cup.x,cup.y);ctx.lineTo(cup.x+ctw,cup.y);
      ctx.lineTo(cup.x+cOfsL+cbw,cup.y+cup.h);ctx.lineTo(cup.x+cOfsL,cup.y+cup.h);
      ctx.closePath();ctx.fill();
      ctx.strokeStyle='#ccc';ctx.lineWidth=1.5;ctx.stroke();
      // Juice in cup
      if(cup.fill>0){
        const maxPC=1/blendCups.length;
        const frac=Math.min(1,cup.fill/maxPC);
        const fH=cup.h*0.88*frac;
        const fY=cup.y+cup.h-fH;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(cup.x,cup.y);ctx.lineTo(cup.x+ctw,cup.y);
        ctx.lineTo(cup.x+cOfsL+cbw,cup.y+cup.h);ctx.lineTo(cup.x+cOfsL,cup.y+cup.h);
        ctx.closePath();ctx.clip();
        ctx.fillStyle=`rgba(${jc[0]},${jc[1]},${jc[2]},0.85)`;
        ctx.fillRect(cup.x,fY,ctw,fH+5);
        ctx.fillStyle=`rgba(${Math.min(255,jc[0]+30)},${Math.min(255,jc[1]+30)},${Math.min(255,jc[2]+30)},0.5)`;
        ctx.beginPath();ctx.moveTo(cup.x,fY);
        for(let wx=0;wx<=ctw;wx+=3){
          ctx.lineTo(cup.x+wx,fY+Math.sin(blendWaveT*2+wx*0.15+ci*2)*S*0.003);
        }
        ctx.lineTo(cup.x+ctw,fY+S*0.006);ctx.lineTo(cup.x,fY+S*0.006);ctx.closePath();ctx.fill();
        ctx.restore();
      }
      // Shine
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.fillRect(cup.x+ctw*0.12,cup.y+cup.h*0.08,ctw*0.1,cup.h*0.5);
      // Handle
      ctx.strokeStyle='#ddd';ctx.lineWidth=Math.max(2,S*0.005);
      ctx.beginPath();
      ctx.arc(cup.x+ctw+S*0.008,cup.y+cup.h*0.38,cup.h*0.18,-0.4,0.4);
      ctx.stroke();
    });
  }

  // Pour stream (from tilted rim to cup)
  if(blendPhase==='pouring'&&blendPourTarget>=0&&blendPourLevel>0){
    const cup=blendCups[blendPourTarget];
    const jc=blendJuiceColor;
    const cupCX=cup.x+cup.w/2;
    const pourSide=cupCX>=cx?1:-1;
    // Rim position rotated by tilt
    const rimDx=pourSide*topW*0.44,rimDy=-jarH;
    const cosT=Math.cos(blendTiltAngle),sinT=Math.sin(blendTiltAngle);
    const sX=pivotX+rimDx*cosT-rimDy*sinT;
    const sY=pivotY+rimDx*sinT+rimDy*cosT;
    const eX=cupCX,eY=cup.y;
    const wobble=Math.sin(blendPourStreamT)*S*0.004;
    ctx.strokeStyle=`rgba(${jc[0]},${jc[1]},${jc[2]},0.9)`;
    ctx.lineWidth=Math.max(4,S*0.014);ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(sX,sY);
    ctx.quadraticCurveTo(sX+(eX-sX)*0.3+wobble,(sY+eY)/2,eX,eY);
    ctx.stroke();
    if(Math.random()<0.3)spawnParticles(eX,eY,2,[`rgb(${jc[0]},${jc[1]},${jc[2]})`],{spread:8,vyRange:3,maxSize:3});
  }

  // Title text
  ctx.font=`bold ${S*0.07}px sans-serif`;ctx.textAlign='center';
  const bTitle=blendPhase==='done'?'Yum! \u{1F9C3}':blendPhase==='pouring'?'Pour! \u{1F964}':'Blend! \u{1F9C3}';
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillText(bTitle,W/2+2,S*0.065+2);
  ctx.fillStyle='#fff';ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=6;
  ctx.fillText(bTitle,W/2,S*0.065);
  ctx.shadowBlur=0;

  // Hint text
  if(blendPhase==='adding'&&blendFruits.length===0){
    const pulse=0.5+Math.sin(Date.now()*0.004)*0.3;
    ctx.globalAlpha=pulse;
    ctx.font=`bold ${S*0.04}px sans-serif`;
    ctx.fillStyle='#7b1fa2';
    ctx.fillText('Add fruits!',W/2,jarY+jarH+jb.baseH+S*0.15);
    ctx.globalAlpha=1;
  }
  if(blendPhase==='pouring'&&blendPourTarget<0){
    const pulse=0.5+Math.sin(Date.now()*0.004)*0.3;
    ctx.globalAlpha=pulse;
    ctx.font=`bold ${S*0.04}px sans-serif`;
    ctx.fillStyle='#7b1fa2';
    ctx.fillText('Tap a cup!',W/2,blendCups.length>0?blendCups[0].y-S*0.03:jarY+jarH+jb.baseH+S*0.15);
    ctx.globalAlpha=1;
  }

  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  drawParticles(0);drawConfetti();drawFloatingEmojis();
}

const CHOP_FOODS=[
  {emoji:'🍎',label:'Apple',color:'#e53935',inside:'#ffcdd2'},
  {emoji:'🍋',label:'Lemon',color:'#fdd835',inside:'#fff9c4'},
  {emoji:'🍊',label:'Orange',color:'#ff9800',inside:'#ffecb3'},
  {emoji:'🍉',label:'Watermelon',color:'#e53935',inside:'#c8e6c9'},
  {emoji:'🥝',label:'Kiwi',color:'#558b2f',inside:'#dcedc8'},
  {emoji:'🍓',label:'Strawberry',color:'#e91e63',inside:'#fce4ec'},
  {emoji:'🥕',label:'Carrot',color:'#ef6c00',inside:'#fff3e0'},
  {emoji:'🌽',label:'Corn',color:'#f9a825',inside:'#fffde7'},
  {emoji:'🥑',label:'Avocado',color:'#33691e',inside:'#f1f8e9'},
  {emoji:'🍌',label:'Banana',color:'#f9a825',inside:'#fffde7'},
  {emoji:'🥦',label:'Broccoli',color:'#2e7d32',inside:'#e8f5e9'},
  {emoji:'🍆',label:'Eggplant',color:'#6a1b9a',inside:'#f3e5f5'},
  {emoji:'🍇',label:'Grapes',color:'#7b1fa2',inside:'#f3e5f5'},
  {emoji:'🥒',label:'Cucumber',color:'#388e3c',inside:'#e8f5e9'},
  {emoji:'🫑',label:'Pepper',color:'#c62828',inside:'#fce4ec'},
  {emoji:'🍑',label:'Peach',color:'#ef9a9a',inside:'#fff9c4'},
  {emoji:'🍒',label:'Cherry',color:'#c62828',inside:'#fce4ec'},
  {emoji:'🥭',label:'Mango',color:'#f57f17',inside:'#fff8e1'},
];
let chopFood=null,chopPhase='waiting',chopTimer=0,chopScore=0;
let chopHalves=[],chopCutAngle=0,chopCutFlash=0,chopHintT=0;
let chopDragging=false,chopDragSX=0,chopDragSY=0,chopDragEX=0,chopDragEY=0;
let chopFoodX=0,chopFoodY=0,chopFoodR=0;
let chopWobble=0,chopWobbleV=0,chopQueue=[];

function startChopGame(){
  currentMode='chop';particles=[];confetti=[];floatingEmojis=[];wobbleAngle=0;wobbleVel=0;
  chopScore=0;chopPhase='waiting';chopTimer=0;chopHalves=[];
  chopCutFlash=0;chopDragging=false;chopWobble=0;chopWobbleV=0;chopQueue=[];chopHintT=0;
  chopNextFood();updateChopButtons();
}
function chopNextFood(){
  if(chopQueue.length===0)chopQueue=[...CHOP_FOODS].sort(()=>Math.random()-0.5);
  chopFood=chopQueue.pop();
  const S=Math.min(W,H);
  const _by=H*(H>W*1.5?0.17:0.2),_bh=S*(H>W*1.5?0.5:0.52);
  chopFoodX=W/2;chopFoodY=_by+_bh*0.52;chopFoodR=S*0.11;
  chopPhase='waiting';chopTimer=0;chopWobble=0;chopWobbleV=0;chopHintT=0;
  sayWord(chopFood.label);
  playTone(440,0.1,'sine',0.08);playTone(550,0.07,'sine',0.06,0.1);
  if(navigator.vibrate)navigator.vibrate(20);
}
function updateChopButtons(){
  buttonsArea.innerHTML='';instruction.textContent='';
  if(chopPhase==='done')addBtn('btn-again','\uD83D\uDD2A','Again!',()=>{initAudio();startChopGame()});
}
function handleChopDragStart(x,y){
  if(chopPhase!=='waiting')return;
  initAudio();chopDragging=true;
  chopDragSX=x;chopDragSY=y;chopDragEX=x;chopDragEY=y;
}
function handleChopDragMove(x,y){
  if(!chopDragging||currentMode!=='chop')return;
  chopDragEX=x;chopDragEY=y;
}
function handleChopDragEnd(x,y){
  if(!chopDragging)return;
  chopDragging=false;
  if(chopPhase!=='waiting')return;
  const ex=x!==undefined?x:chopDragEX,ey=y!==undefined?y:chopDragEY;
  const dx=ex-chopDragSX,dy=ey-chopDragSY;
  const len=Math.sqrt(dx*dx+dy*dy);
  if(len<chopFoodR*0.5)return;
  const dist=Math.abs(dy*(chopFoodX-chopDragSX)-dx*(chopFoodY-chopDragSY))/len;
  if(dist>chopFoodR)return;
  chopDoCut(Math.atan2(dy,dx));
}
function chopDoCut(angle){
  chopPhase='cutting';chopTimer=0;chopCutAngle=angle;chopCutFlash=1;
  chopScore++;
  spawnFloatingEmoji(chopFoodX,chopFoodY-chopFoodR,'\u2702\uFE0F');
  sayWord(chopFood.label);
  playTone(600,0.06,'square',0.08);playTone(400,0.12,'sine',0.1,0.06);
  if(navigator.vibrate)navigator.vibrate([30,10,20]);
  const perpX=-Math.sin(angle),perpY=Math.cos(angle);
  [-1,1].forEach(side=>{
    const spd=90+Math.random()*40;
    chopHalves.push({
      x:chopFoodX+perpX*side*chopFoodR*0.1,y:chopFoodY+perpY*side*chopFoodR*0.1,
      vx:perpX*side*spd+(Math.random()-0.5)*30,vy:perpY*side*spd-80+Math.random()*40,
      rot:0,rotV:side*(0.8+Math.random()*1.5),r:chopFoodR,life:1,
      cutAngle:angle,side:side,emoji:chopFood.emoji,inside:chopFood.inside,color:chopFood.color
    });
  });
  spawnParticles(chopFoodX,chopFoodY,18,[chopFood.color,chopFood.inside,'#fff'],{vyRange:11,spread:45,maxSize:7});
}
function updateChopGame(dt){
  updateParticles(dt);updateConfetti();updateFloatingEmojis(dt);
  chopCutFlash=Math.max(0,chopCutFlash-dt*4);
  if(chopPhase==='waiting'){
    chopHintT+=dt;
    chopWobbleV-=chopWobble*18*dt;chopWobbleV*=0.84;chopWobble+=chopWobbleV;
  }
  if(chopPhase==='cutting'){
    chopTimer+=dt;
    for(let i=chopHalves.length-1;i>=0;i--){
      const h=chopHalves[i];
      h.x+=h.vx*dt;h.y+=h.vy*dt;h.vy+=290*dt;h.rot+=h.rotV*dt;h.life-=dt*1.6;
      if(h.life<=0)chopHalves.splice(i,1);
    }
    if(chopTimer>0.65){
      if(chopScore>=10){
        chopPhase='done';chopTimer=0;playTaDa();spawnConfetti();spawnConfetti();
        if(navigator.vibrate)navigator.vibrate([50,20,50,20,100]);
        updateChopButtons();
      }else chopNextFood();
    }
  }
  if(chopPhase==='done'){chopTimer+=dt;if(chopTimer<3&&Math.random()<0.08)spawnConfetti()}
}
function drawChopGame(){
  ctx.globalAlpha=1;
  const S=Math.min(W,H);
  // Warm kitchen background
  const bgGrd=ctx.createLinearGradient(0,0,0,H);
  bgGrd.addColorStop(0,'#fff8e1');bgGrd.addColorStop(1,'#ffe0b2');
  ctx.fillStyle=bgGrd;ctx.fillRect(0,0,W,H);
  // Cutting board
  const bw=Math.min(W*0.82,S*0.86),bh=S*(H>W*1.5?0.5:0.52);
  const bx=(W-bw)/2,by=H*(H>W*1.5?0.17:0.2);
  ctx.fillStyle='rgba(0,0,0,0.10)';drawRoundRect(bx+5,by+7,bw,bh,S*0.04);ctx.fill();
  const woodGrd=ctx.createLinearGradient(bx,by,bx+bw,by+bh);
  woodGrd.addColorStop(0,'#d4a26a');woodGrd.addColorStop(0.4,'#c08040');
  woodGrd.addColorStop(0.7,'#b87333');woodGrd.addColorStop(1,'#c8905a');
  ctx.fillStyle=woodGrd;drawRoundRect(bx,by,bw,bh,S*0.04);ctx.fill();
  ctx.strokeStyle='rgba(110,60,15,0.14)';ctx.lineWidth=1.5;
  const grng=seededRand(99);
  for(let i=0;i<10;i++){const gy=by+bh*0.07+grng()*bh*0.86;ctx.beginPath();ctx.moveTo(bx+S*0.02,gy+grng()*4-2);ctx.lineTo(bx+bw-S*0.02,gy+grng()*4-2);ctx.stroke()}
  ctx.strokeStyle='rgba(0,0,0,0.10)';ctx.lineWidth=2;drawRoundRect(bx,by,bw,bh,S*0.04);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=2;drawRoundRect(bx+1,by+1,bw-2,bh-2,S*0.04);ctx.stroke();
  // Score
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font=`bold ${S*0.055}px sans-serif`;
  ctx.fillStyle='rgba(100,55,15,0.45)';ctx.fillText('\uD83D\uDD2A '+chopScore,W/2+1,by+S*0.07+1);
  ctx.fillStyle='rgba(100,55,15,0.7)';ctx.fillText('\uD83D\uDD2A '+chopScore,W/2,by+S*0.07);
  // Halves flying — emoji clipped to each half along the cut line
  chopHalves.forEach(h=>{
    ctx.save();ctx.globalAlpha=Math.min(1,h.life);
    ctx.translate(h.x,h.y);ctx.rotate(h.rot);
    // Clip to correct half and fill inside color + emoji
    ctx.save();
    ctx.rotate(h.cutAngle);
    ctx.beginPath();
    if(h.side===1){ctx.rect(-h.r*2,0,h.r*4,h.r*2);}
    else{ctx.rect(-h.r*2,-h.r*2,h.r*4,h.r*2);}
    ctx.clip();
    ctx.rotate(-h.cutAngle);
    ctx.font=`${h.r*1.9}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(h.emoji,0,0);
    ctx.restore();
    // Cut face — thin bright strip at the flat edge
    ctx.save();ctx.rotate(h.cutAngle);
    ctx.fillStyle=h.inside;ctx.fillRect(-h.r,-h.r*0.1,h.r*2,h.r*0.2);
    ctx.fillStyle='rgba(255,255,255,0.55)';ctx.fillRect(-h.r,-h.r*0.025,h.r*2,h.r*0.05);
    ctx.restore();
    ctx.restore();
  });
  ctx.globalAlpha=1;
  // Food on board
  if(chopFood&&chopPhase==='waiting'){
    ctx.save();ctx.translate(chopFoodX,chopFoodY);ctx.rotate(chopWobble*0.1);
    ctx.font=`${chopFoodR*1.9}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(chopFood.emoji,0,0);
    // Dotted cut hint — pulsing dashed line across the food
    const hintAlpha=0.5+0.3*Math.sin(chopHintT*3.5);
    ctx.strokeStyle=`rgba(255,255,255,${hintAlpha})`;ctx.lineWidth=3.5;ctx.lineCap='round';
    ctx.setLineDash([8,7]);
    ctx.beginPath();ctx.moveTo(-chopFoodR*1.25,0);ctx.lineTo(chopFoodR*1.25,0);ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
  // Swipe trail — dashed line
  if(chopDragging&&chopPhase==='waiting'){
    const dx=chopDragEX-chopDragSX,dy=chopDragEY-chopDragSY;
    if(dx*dx+dy*dy>100){
      ctx.save();ctx.strokeStyle='rgba(255,255,255,0.92)';ctx.lineWidth=4;ctx.lineCap='round';
      ctx.setLineDash([10,6]);
      ctx.shadowColor='rgba(255,255,255,0.7)';ctx.shadowBlur=12;
      ctx.beginPath();ctx.moveTo(chopDragSX,chopDragSY);ctx.lineTo(chopDragEX,chopDragEY);ctx.stroke();
      ctx.setLineDash([]);ctx.shadowBlur=0;ctx.restore();
    }
  }
  // Cut flash
  if(chopCutFlash>0){
    ctx.save();ctx.globalAlpha=chopCutFlash;
    ctx.strokeStyle='#fff';ctx.lineWidth=5;ctx.lineCap='round';
    ctx.shadowColor='#fffde7';ctx.shadowBlur=18;
    const fl=chopFoodR*1.6;
    ctx.beginPath();
    ctx.moveTo(chopFoodX-Math.cos(chopCutAngle)*fl,chopFoodY-Math.sin(chopCutAngle)*fl);
    ctx.lineTo(chopFoodX+Math.cos(chopCutAngle)*fl,chopFoodY+Math.sin(chopCutAngle)*fl);
    ctx.stroke();ctx.shadowBlur=0;ctx.restore();
  }
  drawParticles(0);drawConfetti();drawFloatingEmojis();
  // Title
  const title=chopPhase==='done'?'Great job! \uD83C\uDF1F':'Chop! \uD83D\uDD2A';
  ctx.font=`bold ${S*0.07}px sans-serif`;ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillText(title,W/2+2,S*0.065+2);
  ctx.fillStyle='#fff';ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=6;
  ctx.fillText(title,W/2,S*0.065);ctx.shadowBlur=0;ctx.textAlign='left';
}

const SKEW_DANGO=[
  {label:'Dango',color:'#f48fb1',rim:'#c2185b'},
  {label:'Dango',color:'#f9fbe7',rim:'#bdbdbd'},
  {label:'Dango',color:'#a5d6a7',rim:'#2e7d32'},
  {label:'Dango',color:'#ffcc80',rim:'#e65100'},
  {label:'Dango',color:'#ce93d8',rim:'#6a1b9a'},
  {label:'Dango',color:'#90caf9',rim:'#1565c0'},
  {label:'Dango',color:'#fff176',rim:'#f9a825'},
];
const SKEW_KEBAB=[
  {emoji:'\uD83C\uDF45',label:'Tomato',color:'#ef5350',rim:'#b71c1c'},
  {emoji:'\uD83E\uDD69',label:'Meat',color:'#8d6e63',rim:'#4e342e'},
  {emoji:'\uD83E\uDDC5',label:'Onion',color:'#fff9c4',rim:'#f57f17'},
  {emoji:'\uD83C\uDF36\uFE0F',label:'Pepper',color:'#c62828',rim:'#8d0000'},
  {emoji:'\uD83C\uDF44',label:'Mushroom',color:'#bcaaa4',rim:'#5d4037'},
  {emoji:'\uD83E\uDDC0',label:'Cheese',color:'#ffee58',rim:'#f9a825'},
  {emoji:'\uD83E\uDD55',label:'Carrot',color:'#ff8f00',rim:'#e65100'},
  {emoji:'\uD83C\uDF3D',label:'Corn',color:'#ffee58',rim:'#aed581'},
];
const SKEW_TARGET=5;
let skewMode;
let skewPhase,skewTimer,skewScore;
let skewCX,skewTopY,skewTipY;
let skewItems=[],skewDragIdx=-1;

function startSkewGame(){
  currentMode='skewer';particles=[];confetti=[];floatingEmojis=[];wobbleAngle=0;wobbleVel=0;
  skewPhase='playing';skewTimer=0;skewScore=0;skewDragIdx=-1;
  skewMode=Math.random()<0.5?'dango':'kebab';
  const S=Math.min(W,H);
  skewCX=W/2;
  skewTopY=H*(H>W*1.5?0.22:0.18);
  skewTipY=H*(H>W*1.5?0.78:0.80);
  const pool=skewMode==='dango'?SKEW_DANGO:SKEW_KEBAB;
  const foods=[...pool].sort(()=>Math.random()-0.5).slice(0,SKEW_TARGET);
  const portrait=H>W*1.5;
  const p=portrait
    ?[[0.18,0.26],[0.82,0.26],[0.18,0.54],[0.82,0.54],[0.18,0.78]]
    :[[0.14,0.28],[0.86,0.28],[0.14,0.62],[0.86,0.62],[0.14,0.80]];
  skewItems=foods.map((f,i)=>{
    const bx=W*p[i][0],by=H*p[i][1];
    return{x:bx,y:by,homeX:bx,homeY:by,
      bobT:Math.random()*Math.PI*2,bobAmp:S*0.015,bobSpeed:0.8+Math.random()*0.6,
      r:S*0.09,color:f.color,rim:f.rim,label:f.label,emoji:f.emoji||null,
      dragging:false,returning:false,impaled:false};
  });
  updateSkewButtons();
}
function updateSkewButtons(){
  buttonsArea.innerHTML='';instruction.textContent='';
  if(skewPhase==='done')addBtn('btn-again','\uD83C\uDF61','Again!',()=>{initAudio();startSkewGame()});
}
function handleSkewStart(x,y){
  initAudio();
  if(skewPhase!=='playing')return;
  for(let i=0;i<skewItems.length;i++){
    const dx=skewItems[i].x-x,dy=skewItems[i].y-y;
    if(dx*dx+dy*dy<skewItems[i].r*skewItems[i].r*2.8){
      skewDragIdx=i;skewItems[i].dragging=true;skewItems[i].returning=false;return;
    }
  }
}
function handleSkewMove(x,y){
  if(skewDragIdx<0)return;
  const item=skewItems[skewDragIdx];
  if(item.impaled){
    item.x=skewCX;
    item.y=Math.max(skewTopY+item.r,Math.min(skewTipY-item.r,y));
  }else{
    item.x=x;item.y=y;
  }
}
function handleSkewEnd(){
  if(skewDragIdx<0)return;
  const item=skewItems[skewDragIdx];
  item.dragging=false;
  if(!item.impaled){
    const onSkewer=Math.abs(item.x-skewCX)<item.r*2.2&&
      item.y>skewTopY-item.r&&item.y<skewTipY+item.r;
    if(onSkewer&&skewPhase==='playing'){
      item.impaled=true;
      item.x=skewCX;
      item.y=Math.max(skewTopY+item.r,Math.min(skewTipY-item.r,item.y));
      skewScore++;
      spawnParticles(item.x,item.y,14,[item.color,item.rim,'#fff'],{vyRange:8,spread:30,maxSize:6});
      playTone(300+skewScore*70,0.12,'sine',0.1);playTone(500+skewScore*35,0.08,'sine',0.08,0.1);
      if(navigator.vibrate)navigator.vibrate(30);
      if(skewScore>=SKEW_TARGET){
        skewPhase='done';playTaDa();spawnConfetti();spawnConfetti();
        if(navigator.vibrate)navigator.vibrate([50,20,50,20,100]);
        updateSkewButtons();
      }
    }else{item.returning=true;}
  }
  skewDragIdx=-1;
}

function updateSkewGame(dt){
  updateParticles(dt);updateConfetti();updateFloatingEmojis(dt);
  skewTimer+=dt;
  skewItems.forEach(item=>{
    if(item.dragging||item.impaled)return;
    if(item.returning){
      item.x+=(item.homeX-item.x)*Math.min(1,dt*9);
      item.y+=(item.homeY-item.y)*Math.min(1,dt*9);
      if(Math.abs(item.x-item.homeX)<1){item.x=item.homeX;item.y=item.homeY;item.returning=false;}
    }else{
      item.bobT+=item.bobSpeed*dt;
      item.y=item.homeY+Math.sin(item.bobT)*item.bobAmp;
    }
  });
  if(skewPhase==='done'){if(skewTimer<4&&Math.random()<0.07)spawnConfetti();}
}

function drawSkewFoodAt(x,y,r,emoji,color,rim,scale){
  ctx.save();ctx.translate(x,y);
  if(emoji){
    ctx.font=`${r*scale}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(emoji,0,0);
  }else{
    const sr=r*(scale*0.5);
    ctx.fillStyle=color;ctx.beginPath();ctx.arc(0,0,sr,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=rim;ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,sr,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(-sr*0.3,-sr*0.3,sr*0.28,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}
function drawSkewGame(){
  ctx.globalAlpha=1;
  const S=Math.min(W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#fff8e1');bg.addColorStop(1,'#ffe0b2');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Drop zone glow when dragging a free item
  if(skewPhase==='playing'&&skewDragIdx>=0&&!skewItems[skewDragIdx].impaled){
    const gz=ctx.createLinearGradient(skewCX-S*0.15,0,skewCX+S*0.15,0);
    gz.addColorStop(0,'rgba(255,200,50,0)');gz.addColorStop(0.5,'rgba(255,200,50,0.13)');gz.addColorStop(1,'rgba(255,200,50,0)');
    ctx.fillStyle=gz;ctx.fillRect(skewCX-S*0.15,skewTopY,S*0.3,skewTipY-skewTopY);
  }
  // Black metal skewer stick (behind food)
  ctx.save();ctx.lineCap='round';
  ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=10;
  ctx.beginPath();ctx.moveTo(skewCX+2,skewTopY);ctx.lineTo(skewCX+2,skewTipY);ctx.stroke();
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=7;
  ctx.beginPath();ctx.moveTo(skewCX,skewTopY);ctx.lineTo(skewCX,skewTipY);ctx.stroke();
  ctx.strokeStyle='#444';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(skewCX,skewTopY);ctx.lineTo(skewCX,skewTipY);ctx.stroke();
  ctx.restore();
  // Pointed tip at top
  ctx.save();ctx.translate(skewCX,skewTopY);
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(-5,4);ctx.lineTo(5,4);ctx.closePath();ctx.fill();
  ctx.fillStyle='#555';
  ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(-3,2);ctx.lineTo(3,2);ctx.closePath();ctx.fill();
  ctx.restore();
  // Flat base at bottom
  ctx.save();ctx.translate(skewCX,skewTipY);
  ctx.fillStyle='#1a1a1a';ctx.fillRect(-8,-2,16,6);
  ctx.fillStyle='#333';ctx.fillRect(-6,0,12,3);
  ctx.restore();
  // Impaled items on stick (non-dragged)
  const dragItem=skewDragIdx>=0?skewItems[skewDragIdx]:null;
  skewItems.forEach(item=>{
    if(!item.impaled||item===dragItem)return;
    drawSkewFoodAt(item.x,item.y,item.r,item.emoji,item.color,item.rim,2);
  });
  // Floating free items (non-dragged)
  skewItems.forEach(item=>{
    if(item.impaled||item===dragItem)return;
    ctx.save();ctx.translate(item.x,item.y);
    ctx.fillStyle='rgba(0,0,0,0.13)';ctx.beginPath();ctx.arc(item.r*0.12,item.r*0.9,item.r*0.55,0,Math.PI*2);ctx.fill();
    ctx.restore();
    drawSkewFoodAt(item.x,item.y,item.r,item.emoji,item.color,item.rim,2);
  });
  // Dragged item on top
  if(dragItem){
    ctx.shadowColor='rgba(0,0,0,0.35)';ctx.shadowBlur=20;ctx.shadowOffsetY=4;
    drawSkewFoodAt(dragItem.x,dragItem.y,dragItem.r,dragItem.emoji,dragItem.color,dragItem.rim,2.2);
    ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  }
  // Score
  ctx.textAlign='center';ctx.textBaseline='middle';
  const sy=H*(H>W*1.5?0.09:0.08);
  ctx.font=`bold ${S*0.058}px sans-serif`;
  ctx.fillStyle='rgba(100,55,15,0.4)';ctx.fillText('\uD83C\uDF61 '+skewScore+' / '+SKEW_TARGET,W/2+1,sy+1);
  ctx.fillStyle='#5d4037';ctx.fillText('\uD83C\uDF61 '+skewScore+' / '+SKEW_TARGET,W/2,sy);
  drawParticles(0);drawConfetti();drawFloatingEmojis();
  const label=skewMode==='dango'?'Dango! \uD83C\uDF61':'Kebab! \uD83C\uDF62';
  const title=skewPhase==='done'?'Yummy! \uD83C\uDF1F':label;
  ctx.font=`bold ${S*0.07}px sans-serif`;ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillText(title,W/2+2,S*0.065+2);
  ctx.fillStyle='#fff';ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=6;
  ctx.fillText(title,W/2,S*0.065);ctx.shadowBlur=0;ctx.textAlign='left';
}
