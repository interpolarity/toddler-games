// =============================================
// MATCHING GAME
// =============================================
const MATCH_ICONS = [
  {emoji:'🐶',color:'#8d6e63'},{emoji:'🐱',color:'#ff8a65'},{emoji:'🐸',color:'#66bb6a'},
  {emoji:'🦊',color:'#ff7043'},{emoji:'🐼',color:'#90a4ae'},{emoji:'🐷',color:'#f48fb1'},
  {emoji:'🐮',color:'#bcaaa4'},{emoji:'🐵',color:'#a1887f'},
];
let matchCards,matchFlipped,matchMatched,matchLocked,matchTries,matchPairs,matchPeekTimer;
let matchCelebrated,matchNumPairs,matchCols,matchRows;

function startMatchGame(){
  currentMode='match';particles=[];confetti=[];
  // Show difficulty picker
  matchCards=null;
  updateMatchButtons();
}

function startMatchWithPairs(numPairs){
  matchNumPairs=numPairs;
  const total=numPairs*2;
  if(total<=4){matchCols=2;matchRows=2}
  else if(total<=6){matchCols=3;matchRows=2}
  else if(total<=8){matchCols=4;matchRows=2}
  else if(total<=12){matchCols=4;matchRows=3}
  else{matchCols=4;matchRows=4}
  // Pick random icons
  const shuffledIcons=[...MATCH_ICONS];
  for(let i=shuffledIcons.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffledIcons[i],shuffledIcons[j]]=[shuffledIcons[j],shuffledIcons[i]]}
  const icons=shuffledIcons.slice(0,numPairs);
  matchCards=[];
  icons.forEach((ic,i)=>{matchCards.push({id:i,...ic});matchCards.push({id:i,...ic})});
  for(let i=matchCards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[matchCards[i],matchCards[j]]=[matchCards[j],matchCards[i]]}
  matchCards.forEach((c,i)=>{c.idx=i;c.flipped=false;c.matched=false;c.flipAnim=0;c.shakeAnim=0;c.matchAnim=0});
  matchFlipped=[];matchMatched=0;matchLocked=false;matchTries=0;matchPairs=0;
  matchPeekTimer=numPairs<=3?2:2.5;
  matchCelebrated=false;
  updateMatchButtons();
}

function updateMatchButtons(){
  buttonsArea.innerHTML='';
  if(!matchCards){
    // Difficulty picker
    instruction.textContent='How many pairs?';
    addBtn('btn-done','😊','Easy (2)',()=>{initAudio();playPop();startMatchWithPairs(2)});
    addBtn('btn-food','🙂','Med (4)',()=>{initAudio();playPop();startMatchWithPairs(4)});
    addBtn('btn-icecream','😤','Hard (6)',()=>{initAudio();playPop();startMatchWithPairs(6)});
    addBtn('btn-dump','🔥','Max (8)',()=>{initAudio();playPop();startMatchWithPairs(8)});
  }else if(matchMatched>=matchNumPairs){
    instruction.textContent='You did it! 🎉';
    addBtn('btn-again','🔄','Again!',()=>{initAudio();startMatchGame()});
  }else{
    instruction.textContent=matchPeekTimer>0?'Remember them!':'Find the pairs!';
  }
}

function matchTapCard(idx){
  if(!matchCards||matchLocked||matchPeekTimer>0)return;
  const card=matchCards[idx];
  if(card.flipped||card.matched)return;
  initAudio();playFlip();
  card.flipped=true;card.flipAnim=1;
  matchFlipped.push(idx);

  if(matchFlipped.length===2){
    matchLocked=true;matchTries++;
    const a=matchCards[matchFlipped[0]],b=matchCards[matchFlipped[1]];
    if(a.id===b.id){
      // Match!
      setTimeout(()=>{
        a.matched=true;b.matched=true;a.matchAnim=1;b.matchAnim=1;
        matchPairs++;matchMatched++;
        playMatch();
        spawnParticles((getCardX(a.idx)+getCardX(b.idx))/2,(getCardY(a.idx)+getCardY(b.idx))/2,12,
          ['#ffeb3b','#ff9800','#4caf50','#e91e63'],{vyRange:6,spread:40});
        matchFlipped=[];matchLocked=false;
        if(matchMatched>=matchNumPairs){spawnConfetti();playJingle();sayNumber(matchTries);updateMatchButtons()}
      },500);
    }else{
      // No match
      setTimeout(()=>{
        a.shakeAnim=1;b.shakeAnim=1;
        playWrong();
        setTimeout(()=>{a.flipped=false;b.flipped=false;a.shakeAnim=0;b.shakeAnim=0;matchFlipped=[];matchLocked=false},600);
      },700);
    }
  }
}

function getCardX(idx){const cols=matchCols||4,gap=10,cw=(W-gap*(cols+1))/cols;return gap+(idx%cols)*(cw+gap)+cw/2}
function getCardY(idx){const cols=matchCols||4,rows=matchRows||4,gap=10,cw=(W-gap*(cols+1))/cols,ch=Math.min(cw*1.3,(H*0.7-gap*(rows+1))/rows),topOfs=50;return topOfs+gap+Math.floor(idx/cols)*(ch+gap)+ch/2}

function updateMatchGame(dt){
  if(!matchCards){updateParticles(dt);updateConfetti();return}
  if(matchPeekTimer>0){matchPeekTimer-=dt;if(matchPeekTimer<=0){matchCards.forEach(c=>c.flipped=false);updateMatchButtons()}}
  matchCards.forEach(c=>{
    if(c.flipAnim>0)c.flipAnim=Math.max(0,c.flipAnim-dt*4);
    if(c.matchAnim>0)c.matchAnim=Math.max(0,c.matchAnim-dt*2);
  });
  updateParticles(dt);updateConfetti();
}

function drawMatchGame(){
  // Background
  const grd=ctx.createLinearGradient(0,0,0,H);grd.addColorStop(0,'#e8eaf6');grd.addColorStop(1,'#c5cae9');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

  if(!matchCards){drawParticles(0);drawConfetti();return} // difficulty picker shown via buttons

  const cols=matchCols||4,rows=matchRows||4,gap=10;
  const cw=(W-gap*(cols+1))/cols;
  const ch=Math.min(cw*1.3,(H*0.7-gap*(rows+1))/rows);
  const topOfs=50;

  matchCards.forEach((card,i)=>{
    const cx=gap+(i%cols)*(cw+gap);
    const cy=topOfs+gap+Math.floor(i/cols)*(ch+gap);
    const show=card.flipped||card.matched||matchPeekTimer>0;

    // Shake animation
    let sx=0;
    if(card.shakeAnim>0)sx=Math.sin(card.shakeAnim*30)*5;

    // Match glow
    if(card.matchAnim>0){
      ctx.fillStyle='rgba(255,235,59,'+card.matchAnim*0.5+')';
      drawRoundRect(cx-4+sx,cy-4,cw+8,ch+8,16);ctx.fill();
    }

    // Card back or front
    if(show){
      // Front — white with emoji
      ctx.fillStyle=card.matched?'#e8f5e9':'#fff';
      drawRoundRect(cx+sx,cy,cw,ch,12);ctx.fill();
      ctx.strokeStyle=card.matched?'#66bb6a':'#bdbdbd';ctx.lineWidth=3;ctx.stroke();
      // Emoji
      const emojiSize=Math.min(cw,ch)*0.45;
      ctx.font=`${emojiSize}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(card.emoji,cx+cw/2+sx,cy+ch/2);
      ctx.textBaseline='alphabetic';
      // Matched check
      if(card.matched){
        ctx.font=`bold ${emojiSize*0.4}px sans-serif`;
        ctx.fillText('✓',cx+cw-15+sx,cy+18);
      }
    }else{
      // Back — colored with pattern
      ctx.fillStyle='#5c6bc0';
      drawRoundRect(cx+sx,cy,cw,ch,12);ctx.fill();
      ctx.strokeStyle='#3949ab';ctx.lineWidth=3;ctx.stroke();
      // Star pattern
      ctx.fillStyle='rgba(255,255,255,0.15)';
      ctx.font=`${Math.min(cw,ch)*0.3}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('⭐',cx+cw/2+sx,cy+ch/2);
      ctx.textBaseline='alphabetic';
    }
  });

  // Tries counter
  if(matchTries>0){
    ctx.textAlign='right';
    ctx.font='bold 16px sans-serif';ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.fillText('Tries: '+matchTries,W-12,35);
    ctx.textAlign='left';
  }

  // Pairs found
  if(matchPairs>0&&matchMatched<matchNumPairs){
    ctx.textAlign='left';
    ctx.font='bold 16px sans-serif';ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.fillText('Pairs: '+matchPairs+'/'+matchNumPairs,12,35);
  }

  drawParticles(0);drawConfetti();
}

function startPancakeFruits(){

function addPancakeFruit(id){
  pancakeFruits.push(id);pancakeBounceTimer=0.2;
  const f=PANCAKE_FRUITS.find(f=>f.id===id);
  const rng=seededRand(id.length*333+pancakeFruits.length*77);

  // Spread evenly on oval — golden angle for even distribution
  const allFruits=Object.values(pancakeFruitPos).flat();
  const n=allFruits.length;
  const ga=2.399963; // golden angle
  const angle=n*ga,rad=0.35+((n*3)%7)*0.08;
  // Store as unit-circle coords (will be mapped to oval in drawing)
  pancakeFruitPos[id].push({x:Math.cos(angle)*rad,y:Math.sin(angle)*rad});
  if(f){playPop();sayWord(f.label)}
  spawnParticles(W*0.35,H*0.7-getPancakeHeight()-10,6,f?[f.color,'#fff']:['#e91e63'],{vyRange:3,spread:15});

function finishPancake(){
  pancakeTotalLayers=pancakeStack.filter(s=>s==='pancake').length;
  pancakeEatCount=0;pancakeState='pick_char';playPop();updatePancakeButtons();
}
function pancakeDoEat(){
  if(pancakeState!=='eating'||pancakeStack.length<=1||mouthOpenTimer>0.15)return;
  // Each NOM eats one whole pancake layer: all fruits (first time) + syrups above it + the pancake
  // Clear all fruit toppings on first eat
  if(pancakeFruits.length>0){pancakeFruits=[];pancakeFruitPos={}}
  // Pop from top until we remove a pancake (inclusive)
  let ate=false;
  while(pancakeStack.length>1&&!ate){
    const removed=pancakeStack.pop();
    if(removed==='pancake')ate=true;
  }
  pancakeEatCount++;mouthOpenTimer=0.35;
  playChomp(200);
  spawnFlyingFood(W*0.35,H*0.55,pancakeCustomerX,H*0.7-45*1.7,'🥞','#d7a86e');

  spawnFloatingEmoji(pancakeCustomerX,H*0.7-80,'😋');
  if(pancakeStack.length<=1){
    stopAutoEat();pancakeState='done';playJingle();spawnConfetti();
    sayNumber(pancakeEatCount);setTimeout(()=>playTaDa(),600);
    updatePancakeButtons();
  }
}
function getPancakeHeight(){
  const hw=W*0.12;
  let h=0;
  pancakeStack.forEach(id=>{if(id==='plate')return;if(id==='pancake')h+=hw*0.22;else h+=hw*0.08});
  return h;
}
function updatePancakeGame(dt){
  updateAutoEat(dt);
  if(pancakeBounceTimer>0)pancakeBounceTimer=Math.max(0,pancakeBounceTimer-dt);
  wobbleVel+=-wobbleAngle*2.5*dt;wobbleVel*=0.95;wobbleAngle+=wobbleVel;
  if(pancakeState==='customer_walking'){
    pancakeCustomerX=lerp(pancakeCustomerX,W*0.72,dt*4);
    if(Math.abs(pancakeCustomerX-W*0.72)<5){pancakeCustomerX=W*0.72;pancakeState='eating';updatePancakeButtons()}
  }
  if(mouthOpenTimer>0)mouthOpenTimer=Math.max(0,mouthOpenTimer-dt);
  updateParticles(dt);updateConfetti();updateFloatingEmojis(dt);updateFlyingFoods(dt);
}
function drawPancakeGame(){
  ctx.fillStyle='#fff9c4';ctx.fillRect(0,0,W,H);
  const floorY=H*0.7;
  ctx.fillStyle='#ffe0b2';ctx.fillRect(0,floorY,W,H-floorY);
  const ts=30;for(let x=0;x<W;x+=ts)for(let y=floorY;y<H;y+=ts){if((Math.floor(x/ts)+Math.floor(y/ts))%2===0){ctx.fillStyle='#ffcc80';ctx.fillRect(x,y,ts,ts)}}
  ctx.fillStyle='#8d6e63';ctx.fillRect(0,floorY-8,W,12);
  ctx.fillStyle='#a1887f';ctx.fillRect(0,floorY-8,W,4);
  // Plate
  const plateX=W*0.35,plateY=floorY-8;
  ctx.fillStyle='#f5f5f5';ctx.beginPath();ctx.ellipse(plateX,plateY,W*0.16,12,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#e0e0e0';ctx.lineWidth=2;ctx.stroke();

  const stackX=plateX,bunBase=plateY-10;
  const totalH=getPancakeHeight();const topY=bunBase-totalH;
  const camShift=Math.max(0,50-topY);
  const hw=W*0.12; // pancake half-width

  ctx.save();ctx.translate(0,camShift);
  ctx.translate(stackX,bunBase);ctx.rotate(wobbleAngle*(pancakeStack.length*0.02));ctx.translate(-stackX,-bunBase);
  let curY=bunBase;
  const bounce=pancakeBounceTimer>0?Math.sin(pancakeBounceTimer*20)*3:0;

  pancakeStack.forEach((id,idx)=>{
    if(id==='plate')return;
    const isTop=idx===pancakeStack.length-1;
    const lw=wobbleAngle*idx*0.3;
    const bY=curY+(isTop&&pancakeFruits.length===0?bounce:0);
    const bX=stackX+lw;
    if(id==='pancake'){
      // 3D oval pancake — thin, warm, no gaps
      const ph=hw*0.22,side=hw*0.09,ry=hw*0.32;
      // Side band — single filled shape connecting top and bottom ellipses
      const sideCol='#d4a660';
      ctx.fillStyle=sideCol;
      ctx.beginPath();
      ctx.ellipse(bX,bY,hw,ry,0,0,Math.PI); // bottom half-ellipse
      ctx.ellipse(bX,bY-side,hw,ry,0,Math.PI,0,true); // top half-ellipse reversed
      ctx.closePath();ctx.fill();
      // Top surface — warm gradient, drawn on top to cover seam
      let pg=ctx.createRadialGradient(bX-hw*0.15,bY-side-ry*0.15,hw*0.08,bX,bY-side,hw*0.9);
      pg.addColorStop(0,'#f5dfa0');pg.addColorStop(0.35,'#efd48a');pg.addColorStop(0.65,'#e8c878');pg.addColorStop(1,'#dbb06e');
      ctx.fillStyle=pg;
      ctx.beginPath();ctx.ellipse(bX,bY-side,hw,ry,0,0,Math.PI*2);ctx.fill();
      // Soft edge line
      ctx.strokeStyle='rgba(180,140,70,0.25)';ctx.lineWidth=0.8;ctx.stroke();
      // Butter highlight
      ctx.fillStyle='rgba(255,255,230,0.18)';
      ctx.beginPath();ctx.ellipse(bX-hw*0.08,bY-side-ry*0.08,hw*0.35,ry*0.2,-0.15,0,Math.PI*2);ctx.fill();
      curY-=ph;
    }else{
      // Syrup layer with natural drips
      const s=PANCAKE_SYRUPS.find(s=>'syrup_'+s.id===id);
      if(s){
        const sh=hw*0.08,sry=hw*0.3;
        // Main syrup pool on top — matches pancake width
        ctx.fillStyle=s.color;ctx.globalAlpha=0.85;
        ctx.beginPath();ctx.ellipse(bX,bY-sh/2,hw*0.97,sry,0,0,Math.PI*2);ctx.fill();
        // Natural drips — drawn as paths (narrow top, rounded bottom)
        const rng=seededRand(idx*77);
        for(let i=0;i<6;i++){
          const da=-Math.PI*0.1+rng()*Math.PI*1.2;
          const edgeX=bX+Math.cos(da)*hw*0.93;
          const edgeY=bY-sh/2+Math.sin(da)*sry*0.9;
          const dLen=hw*0.1+rng()*hw*0.2;
          const dW=hw*0.025+rng()*hw*0.02;
          // Teardrop path: narrow at top, round at bottom
          ctx.beginPath();
          ctx.moveTo(edgeX-dW*0.4,edgeY);
          ctx.lineTo(edgeX+dW*0.4,edgeY);
          ctx.quadraticCurveTo(edgeX+dW,edgeY+dLen*0.6,edgeX,edgeY+dLen);
          ctx.quadraticCurveTo(edgeX-dW,edgeY+dLen*0.6,edgeX-dW*0.4,edgeY);
          ctx.closePath();ctx.fill();
        }
        ctx.globalAlpha=1;
        // Shine
        ctx.fillStyle='rgba(255,255,255,0.18)';
        ctx.beginPath();ctx.ellipse(bX-hw*0.08,bY-sh/2-sry*0.12,hw*0.3,sry*0.15,0,0,Math.PI*2);ctx.fill();
        curY-=sh;
      }
    }
  });

  // Fruit toppings on top of stack
  // End wobble transform before drawing fruits on top
  ctx.restore();

  // Fruit toppings — drawn OUTSIDE the wobble save/restore to avoid inherited alpha
  if(pancakeFruits.length>0){
    const topSurf2=plateY-10-getPancakeHeight();
    const bncF=pancakeBounceTimer>0?Math.sin(pancakeBounceTimer*20)*3:0;
    const fsz=Math.max(22,hw*0.5);
    ctx.globalAlpha=1;
    ctx.font=`${fsz}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    Object.keys(pancakeFruitPos).forEach(fid=>{
      const f=PANCAKE_FRUITS.find(f=>f.id===fid);if(!f)return;
      const positions=pancakeFruitPos[fid];if(!positions)return;
      positions.forEach(pos=>{
        // Map to pancake oval: x spans full width, y spans oval perspective height
        const fx=stackX+pos.x*hw*0.75;
        const fy=topSurf2+pos.y*hw*0.22+bncF+camShift;
        ctx.globalAlpha=1;
        ctx.fillText(f.emoji,fx,fy);
      });
    });
    ctx.globalAlpha=1;ctx.textAlign='left';ctx.textBaseline='alphabetic';
  }

  // Customer
  if(pancakeState==='customer_walking'||pancakeState==='eating'||pancakeState==='done'){
    drawCustomer(pancakeCustomerX,floorY,mouthOpenTimer>0);
  }
  if((pancakeState==='eating'||pancakeState==='done')&&pancakeEatCount>0){
    drawEatCounter(pancakeEatCount,pancakeTotalLayers);
  }
  drawParticles(0);drawConfetti();drawFloatingEmojis();drawFlyingFoods();
}

  {id:'pepper',emoji:'🫑',label:'Pepper',color:'#43a047',dark:'#2e7d32',type:'topping'},
];
let pizzaState,pizzaToppings,pizzaCutAngles,pizzaSlicesLeft,pizzaTotalSlices;
let pizzaToppingPos,pizzaCustomerX,pizzaEatCount;
let pizzaBakeTimer,pizzaCutAnim,pizzaCutAnimAngle,pizzaSliceSep;

function startPizzaGame(){
  currentMode='pizza';particles=[];confetti=[];
  pizzaState='building';pizzaToppings=['crust'];pizzaCutAngles=[];
  pizzaSlicesLeft=0;pizzaTotalSlices=0;pizzaEatCount=0;

  pizzaBakeTimer=0;pizzaCutAnim=0;pizzaCutAnimAngle=0;pizzaSliceSep=0;
  updatePizzaButtons();
}
function getPizzaSlices(){
  if(pizzaCutAngles.length===0)return[];
  // Each cut is a diameter: angle and angle+PI
  const radii=[];
  pizzaCutAngles.forEach(a=>{let a1=((a%Math.PI*2)+Math.PI*2)%(Math.PI*2);radii.push(a1);radii.push((a1+Math.PI)%(Math.PI*2))});
  radii.sort((a,b)=>a-b);
  // Remove near-duplicates
  const clean=[radii[0]];
  for(let i=1;i<radii.length;i++){if(Math.abs(radii[i]-clean[clean.length-1])>0.05)clean.push(radii[i])}
  const slices=[];
  for(let i=0;i<clean.length;i++){
    const s=clean[i],e=clean[(i+1)%clean.length];
    slices.push({start:s,end:e>s?e:e+Math.PI*2});
  }
  return slices;
}
function updatePizzaButtons(){
  buttonsArea.innerHTML='';
  if(pizzaState==='building'){

    addBtn('btn-done','✅','Done!',()=>{initAudio();finishPizzaCutting()},pizzaCutAngles.length<1);
  }else if(pizzaState==='pick_char'){

    instruction.textContent='Who eats it?';
    CHARACTERS.forEach(c=>addBtn('btn-char',c.emoji,c.label,()=>{initAudio();currentChar=c.id;playPop();pizzaState='customer_walking';pizzaCustomerX=W+80;updatePizzaButtons()}));
  }else if(pizzaState==='eating'){

    instruction.textContent='Tap NOM! 🍕';
    addBtn('btn-nom','😋','NOM!',()=>{initAudio();stopAutoEat();pizzaDoEat()});
    addBtn('btn-go','🍽️','Auto',()=>{initAudio();startAutoEat(()=>pizzaDoEat())});
  }else if(pizzaState==='done'){

    instruction.textContent='Delicious! 🎉';

}
function addPizzaTopping(id){
  pizzaToppings.push(id);
  const t=PIZZA_TOPPINGS.find(t=>t.id===id);
  if(t&&t.type==='topping'){
    // Accumulate positions (allows multiples of same topping)
    const rng=seededRand(id.length*7777+pizzaToppings.length*31);
    const existing=pizzaToppingPos[id]||[];
    const newPos=[];const count=id==='pepperoni'?8:id==='mushroom'?4:id==='olive'?6:5;
    for(let i=0;i<count;i++){
      const idx=existing.length+i;
      // Mushrooms use golden angle for even spread, others use random
      const angle=id==='mushroom'?idx*2.399+rng()*0.3:rng()*Math.PI*2;
      const rFrac=id==='mushroom'?0.25+((idx*3)%5)*0.12:0.15+rng()*0.65;
      newPos.push({angle,rFrac});
    }
    if(!pizzaToppingPos[id])pizzaToppingPos[id]=[];
    pizzaToppingPos[id]=pizzaToppingPos[id].concat(newPos);
  }
  if(id==='sauce'){playTone(200,0.15,'triangle',0.12);playTone(150,0.1,'square',0.08)}
  else if(id==='cheese'){playTone(400,0.12,'sine',0.15);playTone(500,0.1,'sine',0.1)}
  else playPop();
  sayWord(t?t.label:id);
  const cx=W*0.5,cy=H*0.4,R=Math.min(W,H)*0.35;
  spawnParticles(cx,cy,10,t?[t.color,t.dark]:['#ffca28'],{vyRange:5,spread:R*0.6});
  updatePizzaButtons();
}
function startBakePizza(){
  pizzaState='baking';pizzaBakeTimer=0;
  playTone(200,0.5,'sawtooth',0.08);sayWord('Baking!');
  updatePizzaButtons();
}
function handlePizzaTap(tx,ty){
  if(pizzaState!=='cutting')return;
  const cx=W*0.5,cy=H*0.4,R=Math.min(W,H)*0.35;
  const dx=tx-cx,dy=ty-cy,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>R*1.5)return; // too far from pizza
  const angle=Math.atan2(dy,dx);
  // Don't add if too close to existing cut
  const tooClose=pizzaCutAngles.some(a=>{const d=Math.abs(((angle-a+Math.PI*3)%(Math.PI*2))-Math.PI);return d<0.15||Math.abs(d-Math.PI)<0.15});
  if(tooClose)return;
  pizzaCutAngles.push(angle);
  pizzaCutAnim=0.35;pizzaCutAnimAngle=angle;pizzaSliceSep=0;
  playTone(800,0.1,'sine',0.15);playTone(600,0.08,'triangle',0.1);
  initAudio();
  spawnParticles(cx,cy,6,['#fff9c4','#ffca28'],{vyRange:3,spread:20});
  updatePizzaButtons();
}
function finishPizzaCutting(){
  if(pizzaCutAngles.length<1)return;
  const slices=getPizzaSlices();
  pizzaSlicesLeft=slices.length;pizzaTotalSlices=slices.length;pizzaEatCount=0;
  pizzaState='pick_char';playPop();updatePizzaButtons();
}
function pizzaDoEat(){
  if(pizzaState!=='eating'||pizzaSlicesLeft<=0||mouthOpenTimer>0.15)return;
  pizzaEatCount++;pizzaSlicesLeft--;mouthOpenTimer=0.3;
  playChomp(250);
  const cx=W*0.5,cy=H*0.4,mouthY=H*0.7-45*1.7;
  spawnFlyingFood(cx,cy,pizzaCustomerX,mouthY,'🍕',null);
  spawnParticles(cx,cy,6,['#ffca28','#c62828','#f9a825'],{vyRange:4,spread:20});
  spawnFloatingEmoji(pizzaCustomerX,H*0.7-80,'😋');
  if(pizzaSlicesLeft<=0){
    stopAutoEat();pizzaState='done';playJingle();spawnConfetti();
    sayNumber(pizzaEatCount);setTimeout(()=>playTaDa(),600);
    updatePizzaButtons();
  }
}
function updatePizzaGame(dt){
  updateAutoEat(dt);
  if(pizzaState==='baking'){
    pizzaBakeTimer+=dt;
    if(pizzaBakeTimer>=1.5){
      pizzaState='cutting';pizzaBakeTimer=0;
      playTone(523,0.2,'sine',0.15);
      spawnParticles(W*0.5,H*0.4,20,['#ff9800','#ffca28','#fff9c4'],{vyRange:8,spread:40});
      sayWord('Ready!');updatePizzaButtons();
    }
  }
  if(pizzaCutAnim>0)pizzaCutAnim=Math.max(0,pizzaCutAnim-dt);
  if(pizzaCutAngles.length>0&&pizzaState!=='building'&&pizzaState!=='baking'){
    pizzaSliceSep=lerp(pizzaSliceSep,0.04,dt*3);
  }
  if(pizzaState==='customer_walking'){
    pizzaCustomerX=lerp(pizzaCustomerX,W*0.75,dt*4);
    if(Math.abs(pizzaCustomerX-W*0.75)<5){pizzaCustomerX=W*0.75;pizzaState='eating';updatePizzaButtons()}
  }
  if(mouthOpenTimer>0)mouthOpenTimer=Math.max(0,mouthOpenTimer-dt);
  updateParticles(dt);updateConfetti();updateFloatingEmojis(dt);updateFlyingFoods(dt);
}
function drawPizzaGame(){
  // Background — warm kitchen
  ctx.fillStyle='#fff9c4';ctx.fillRect(0,0,W,H);
  const floorY=H*0.7;
  ctx.fillStyle='#ffe0b2';ctx.fillRect(0,floorY,W,H-floorY);
  const ts=30;for(let x=0;x<W;x+=ts)for(let y=floorY;y<H;y+=ts){if((Math.floor(x/ts)+Math.floor(y/ts))%2===0){ctx.fillStyle='#ffcc80';ctx.fillRect(x,y,ts,ts)}}
  ctx.fillStyle='#8d6e63';ctx.fillRect(0,floorY-8,W,12);
  ctx.fillStyle='#a1887f';ctx.fillRect(0,floorY-8,W,4);

  const cx=W*0.5,cy=H*0.4,R=Math.min(W,H)*0.35,innerR=R*0.85;
  // Plate
  ctx.fillStyle='#f5f5f5';ctx.beginPath();ctx.arc(cx,cy,R+15,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#e0e0e0';ctx.lineWidth=2;ctx.stroke();

  const slices=getPizzaSlices();
  if(slices.length>0&&pizzaState!=='building'&&pizzaState!=='baking'&&pizzaState!=='cutting'){
    // Draw freestyle slices
    const sep=pizzaSliceSep;
    for(let i=0;i<slices.length;i++){
      if(i>=pizzaSlicesLeft)continue;
      const sl=slices[i],a0=sl.start,a1=sl.end;
      const mid=(a0+a1)/2,sd=sep*R*0.5;
      const sx=cx+Math.cos(mid)*sd,sy=cy+Math.sin(mid)*sd;
      ctx.save();ctx.beginPath();ctx.moveTo(sx,sy);ctx.arc(sx,sy,R+2,a0+sep*0.3,a1-sep*0.3);ctx.closePath();ctx.clip();
      ctx.fillStyle='#d7a86e';ctx.beginPath();ctx.arc(sx,sy,R,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#c49556';ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle='#ffe0b2';ctx.beginPath();ctx.arc(sx,sy,innerR,0,Math.PI*2);ctx.fill();
      pizzaToppings.forEach(id=>{
        if(id==='crust')return;
        if(id==='sauce'){ctx.fillStyle='#c62828';ctx.beginPath();ctx.arc(sx,sy,innerR-2,0,Math.PI*2);ctx.fill()}
        else if(id==='cheese'){
          ctx.fillStyle='#ffca28';ctx.beginPath();ctx.arc(sx,sy,innerR-2,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#fff9c4';ctx.globalAlpha=0.3;const rng=seededRand(7777);
          for(let j=0;j<8;j++){const a=rng()*Math.PI*2,r=rng()*innerR*0.6;ctx.beginPath();ctx.arc(sx+Math.cos(a)*r,sy+Math.sin(a)*r,4+rng()*8,0,Math.PI*2);ctx.fill()}
          ctx.globalAlpha=1;
        }else{drawPizzaScatter(sx,sy,innerR,id)}
      });
      ctx.restore();
      ctx.strokeStyle='rgba(100,60,20,0.35)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+Math.cos(a0+sep*0.3)*R,sy+Math.sin(a0+sep*0.3)*R);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+Math.cos(a1-sep*0.3)*R,sy+Math.sin(a1-sep*0.3)*R);ctx.stroke();
    }
  }else{
    // Whole pizza
    ctx.fillStyle='rgba(0,0,0,0.08)';ctx.beginPath();ctx.arc(cx+3,cy+3,R,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#d7a86e';ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#c49556';ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle='#ffe0b2';ctx.beginPath();ctx.arc(cx,cy,innerR,0,Math.PI*2);ctx.fill();
    pizzaToppings.forEach(id=>{
      if(id==='crust')return;
      if(id==='sauce'){ctx.fillStyle='#c62828';ctx.beginPath();ctx.arc(cx,cy,innerR-2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8e0000';ctx.globalAlpha=0.2;const rng=seededRand(4242);
        for(let j=0;j<8;j++){const a=rng()*Math.PI*2,r=rng()*innerR*0.6;ctx.beginPath();ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,4+rng()*6,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
      else if(id==='cheese'){ctx.fillStyle='#ffca28';ctx.beginPath();ctx.arc(cx,cy,innerR-2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff9c4';ctx.globalAlpha=0.3;const rng=seededRand(7777);
        for(let j=0;j<8;j++){const a=rng()*Math.PI*2,r=rng()*innerR*0.6;ctx.beginPath();ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,4+rng()*8,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
      else{drawPizzaScatter(cx,cy,innerR,id)}
    });
  }
  // Cutting state: slight white wash + dashed cut lines on full pizza
  if(pizzaState==='cutting'){
    // Light white overlay so cuts show better
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
    // Existing cut lines as dashed lines
    pizzaCutAngles.forEach(a=>{
      ctx.strokeStyle='rgba(60,30,5,0.5)';ctx.lineWidth=3;
      ctx.setLineDash([6,4]);
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(a)*R*0.05,cy+Math.sin(a)*R*0.05);
      ctx.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(a+Math.PI)*R*0.05,cy+Math.sin(a+Math.PI)*R*0.05);
      ctx.lineTo(cx+Math.cos(a+Math.PI)*R,cy+Math.sin(a+Math.PI)*R);
      ctx.stroke();
      ctx.setLineDash([]);
    });
    // Subtle pulsing ring
    const pulse=0.25+0.2*Math.sin(Date.now()/250);
    ctx.strokeStyle=`rgba(255,200,40,${pulse})`;ctx.lineWidth=3;
    ctx.setLineDash([10,6]);
    ctx.beginPath();ctx.arc(cx,cy,R+6,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    // Hint text
    ctx.fillStyle='rgba(0,0,0,0.45)';ctx.font=`bold ${Math.max(14,W*0.035)}px sans-serif`;ctx.textAlign='center';
    ctx.fillText('🔪 Tap to cut!',cx,cy+R+28);ctx.textAlign='left';
  }
  // Bake glow
  if(pizzaState==='baking'){
    const glow=0.2+0.2*Math.sin(pizzaBakeTimer*8);
    ctx.fillStyle=`rgba(255,152,0,${glow})`;ctx.beginPath();ctx.arc(cx,cy,R+20,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(22,W*0.045)}px sans-serif`;ctx.textAlign='center';
    ctx.fillText('🔥 Baking! 🔥',cx,cy+5);ctx.textAlign='left';
  }
  // Knife animation
  if(pizzaCutAnim>0){
    const p=1-pizzaCutAnim/0.4,op=1-p,kl=R*1.3;
    ctx.save();ctx.translate(cx,cy);ctx.rotate(pizzaCutAnimAngle);ctx.globalAlpha=op;
    ctx.strokeStyle='#bbb';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-kl*p,0);ctx.lineTo(kl*p,0);ctx.stroke();
    ctx.fillStyle='#5d4037';ctx.fillRect(kl*p-6,-5,12,10);
    ctx.globalAlpha=1;ctx.restore();
  }
  // Customer
  if(pizzaState==='customer_walking'||pizzaState==='eating'||pizzaState==='done'){
    drawCustomer(pizzaCustomerX,floorY,mouthOpenTimer>0);
  }
  if((pizzaState==='eating'||pizzaState==='done')&&pizzaEatCount>0){
    drawEatCounter(pizzaEatCount,pizzaTotalSlices);
  }
  drawParticles(0);drawConfetti();drawFloatingEmojis();drawFlyingFoods();
}
function drawPizzaScatter(cx,cy,innerR,id){
  const positions=pizzaToppingPos[id];if(!positions)return;
  const sz=innerR*0.09;
  positions.forEach(pos=>{
    const px=cx+Math.cos(pos.angle)*pos.rFrac*innerR;
    const py=cy+Math.sin(pos.angle)*pos.rFrac*innerR;
    if(id==='pepperoni'){
      ctx.fillStyle='#c62828';ctx.beginPath();ctx.arc(px,py,sz,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#8e0000';ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle='#8e0000';ctx.globalAlpha=0.3;ctx.beginPath();ctx.arc(px,py,sz*0.4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    }else if(id==='mushroom'){
      // Mushroom slice — fan shape with visible gills
      const ms=sz*1.8;
      ctx.save();ctx.translate(px,py);ctx.rotate(pos.angle*0.15);
      // Cap — warm cream/tan
      ctx.fillStyle='#f5e6d0';
      ctx.beginPath();ctx.moveTo(-ms*0.7,0);ctx.quadraticCurveTo(-ms*0.6,-ms*0.9,0,-ms);
      ctx.quadraticCurveTo(ms*0.6,-ms*0.9,ms*0.7,0);ctx.closePath();ctx.fill();
      ctx.strokeStyle='#c9a87c';ctx.lineWidth=1;ctx.stroke();
      // Light brown spots on cap
      ctx.fillStyle='rgba(180,140,90,0.2)';
      ctx.beginPath();ctx.arc(-ms*0.2,-ms*0.5,ms*0.15,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ms*0.15,-ms*0.35,ms*0.1,0,Math.PI*2);ctx.fill();
      // Gills
      ctx.strokeStyle='rgba(180,140,90,0.25)';ctx.lineWidth=0.6;
      for(let g=-2;g<=2;g++){ctx.beginPath();ctx.moveTo(g*ms*0.1,0);ctx.lineTo(g*ms*0.2,-ms*0.65);ctx.stroke()}
      // Stem — off-white
      ctx.fillStyle='#faf3eb';
      ctx.fillRect(-ms*0.15,0,ms*0.3,ms*0.35);
      ctx.strokeStyle='#d4b896';ctx.lineWidth=0.6;ctx.strokeRect(-ms*0.15,0,ms*0.3,ms*0.35);
      ctx.restore();
    }else if(id==='olive'){
      ctx.fillStyle='#33691e';ctx.beginPath();ctx.arc(px,py,sz*0.8,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#1b5e20';ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle='#ffca28';ctx.beginPath();ctx.arc(px,py,sz*0.3,0,Math.PI*2);ctx.fill();
    }else if(id==='pepper'){
      ctx.fillStyle='#43a047';ctx.save();ctx.translate(px,py);ctx.rotate(pos.angle);
      ctx.fillRect(-sz,-1.5,sz*2,3);ctx.restore();
    }
  });
}

// Handle canvas taps for match game
canvas.addEventListener('click',e=>{
  if(currentMode==='match')handleMatchTap(e.clientX,e.clientY);
  else if(currentMode==='dig')handleDigTap(e.clientX,e.clientY);
  else if(currentMode==='wreck')handleWreckTap(e.clientX,e.clientY);
  else if(currentMode==='pizza')handlePizzaTap(e.clientX,e.clientY);
});
canvas.addEventListener('touchstart',e=>{
  if(currentMode==='match'){e.preventDefault();handleMatchTap(e.touches[0].clientX,e.touches[0].clientY)}
  else if(currentMode==='dig'){e.preventDefault();handleDigTap(e.touches[0].clientX,e.touches[0].clientY)}
  else if(currentMode==='wreck'){e.preventDefault();handleWreckTap(e.touches[0].clientX,e.touches[0].clientY)}
  else if(currentMode==='pizza'){e.preventDefault();handlePizzaTap(e.touches[0].clientX,e.touches[0].clientY)}
},{passive:false});

function handleDigTap(tx,ty){
  if(digState!=='dig'||truckLoad.length>=MAX_SCOOPS)return;
  for(const mat of Object.keys(PILES)){
    if(pileSizes[mat]<=0.35)continue;
    const cx=W*PILES[mat].xFrac,gy=digGroundY;
    const bw=W*0.11*pileSizes[mat];
    if(tx>cx-bw-W*0.03&&tx<cx+bw+W*0.03&&ty>gy-W*0.12&&ty<gy+10){
      initAudio();digStartDig(mat);return;
    }
  }
}

function handleMatchTap(tx,ty){
  if(!matchCards)return;
  const cols=matchCols||4,rows=matchRows||4,gap=10;
  const cw=(W-gap*(cols+1))/cols;
  const ch=Math.min(cw*1.3,(H*0.7-gap*(rows+1))/rows);
  const topOfs=50;
  for(let i=0;i<matchCards.length;i++){
    const cx=gap+(i%cols)*(cw+gap);
    const cy=topOfs+gap+Math.floor(i/cols)*(ch+gap);
    if(tx>=cx&&tx<=cx+cw&&ty>=cy&&ty<=cy+ch){matchTapCard(i);return}
  }
}

// =============================================
// WRECKING BALL GAME
// =============================================
const WRECK_BLOCKS=[
  {id:'brick', emoji:'🧱',label:'Brick', color:'#c62828',dark:'#8e0000',light:'#ef5350',w:50,h:25},
  {id:'wood',  emoji:'🪵',label:'Wood',  color:'#8d6e63',dark:'#5d4037',light:'#bcaaa4',w:50,h:20},
  {id:'glass', emoji:'🪟',label:'Glass', color:'#90caf9',dark:'#42a5f5',light:'#e3f2fd',w:50,h:18},
  {id:'stone', emoji:'🪨',label:'Stone', color:'#78909c',dark:'#455a64',light:'#b0bec5',w:50,h:28},
];
let wreckState,wreckTower,wreckFlyingBlocks,wreckBallAngle,wreckBallVel,wreckBallReleased;
let wreckBallX,wreckBallY,wreckBallVX,wreckBallVY,wreckGroundY;
let wreckShakeTimer=0,wreckShakeX=0,wreckShakeY=0;
let wreckSmashed=false;

function startWreckGame(){
  currentMode='wreck';particles=[];confetti=[];
  wreckState='building';wreckTower=[];wreckFlyingBlocks=[];
  wreckBallAngle=0.8;wreckBallVel=0;wreckBallReleased=false;
  wreckSmashed=false;wreckShakeTimer=0;
  wreckGroundY=H*0.65;
  updateWreckButtons();
}

function updateWreckButtons(){
  buttonsArea.innerHTML='';
  if(wreckState==='building'){

    instruction.textContent=wreckTower.length===0?'Build a tower!':'Stack higher!';
    WRECK_BLOCKS.forEach(b=>addBtn('btn-food',b.emoji,b.label,()=>{initAudio();addWreckBlock(b.id)}));
    addBtn('btn-dump','💥','Smash!',()=>{initAudio();startSmashing()},wreckTower.length===0);
  }else if(wreckState==='swinging'){

    instruction.textContent='Tap to SMASH!';
    addBtn('btn-dump','💥','SMASH!',()=>{initAudio();releaseWreckBall()});
  }else if(wreckState==='smashing'){
    // No buttons during destruction — nothing to accidentally tap
    instruction.textContent='BOOM! 💥';
  }else if(wreckState==='done'){

    instruction.textContent='Destroyed! 🎉';
    addBtn('btn-again','🔄','Again!',()=>{initAudio();startWreckGame()});
  }
}

function addWreckBlock(id){
  const block=WRECK_BLOCKS.find(b=>b.id===id);
  wreckTower.push({...block,wobble:0});
  wobbleVel+=(Math.random()-0.5)*0.06;
  // Placement sound per block type
  if(id==='brick'){playTone(150,0.12,'square',0.15);playTone(120,0.1,'triangle',0.1)}
  else if(id==='glass'){playTone(900,0.15,'sine',0.1);playTone(1100,0.1,'sine',0.08)}
  else if(id==='stone'){playTone(100,0.15,'triangle',0.2);playTone(80,0.1,'square',0.1)}
  else playPop();
  sayWord(block?block.label:id);
  updateWreckButtons();
}

function startSmashing(){
  if(wreckTower.length===0)return;
  wreckState='swinging';
  wreckBallAngle=0.8;wreckBallVel=0;wreckBallReleased=false;wreckSmashed=false;
  updateWreckButtons();
}

function releaseWreckBall(){
  if(wreckBallReleased)return;
  wreckBallReleased=true;
  // Ball velocity from pendulum
  const craneX=W*0.82,craneY=H*0.08,ropeLen=H*0.35;
  wreckBallX=craneX+Math.sin(wreckBallAngle)*ropeLen;
  wreckBallY=craneY+Math.cos(wreckBallAngle)*ropeLen;
  // Tangential velocity from pendulum — should fly leftward toward tower
  const tangentSpeed=wreckBallVel*ropeLen;
  wreckBallVX=tangentSpeed*Math.cos(wreckBallAngle);
  wreckBallVY=tangentSpeed*Math.sin(wreckBallAngle);
  // If ball isn't heading toward tower, force it left
  if(wreckBallVX>-50){wreckBallVX=-300;wreckBallVY=-50}
  playTone(100,0.3,'square',0.25);
}

function smashTower(){
  if(wreckSmashed)return;
  wreckSmashed=true;wreckState='smashing';
  // Convert tower blocks to flying physics objects
  const towerX=W*0.38;
  let by=wreckGroundY;
  wreckTower.forEach((block,i)=>{
    by-=block.h;
    const impactForce=1.5+i*0.3; // higher blocks fly further
    const dir=wreckBallVX>0?1:-1;
    wreckFlyingBlocks.push({
      x:towerX+(Math.random()-0.5)*20,y:by,
      w:block.w,h:block.h,color:block.color,dark:block.dark,light:block.light,id:block.id,
      vx:dir*(3+Math.random()*6)*impactForce,
      vy:-(4+Math.random()*8+i*1.5),
      rot:0,rotV:(Math.random()-0.5)*0.4,
      life:1,decay:0.008+Math.random()*0.005
    });
    // Shatter particles per block
    const cols=block.id==='glass'?['#e3f2fd','#90caf9','#42a5f5','#fff']:
               block.id==='wood'?['#8d6e63','#a1887f','#d7ccc8','#5d4037']:
               block.id==='brick'?['#c62828','#ef5350','#e57373','#8e0000']:
               ['#78909c','#455a64','#b0bec5','#546e7a'];
    spawnParticles(towerX,by+block.h/2,8,cols,{vyRange:10,vxRange:8,spread:30,maxSize:block.id==='glass'?4:6,shape:block.id==='glass'?'circle':'square',gravity:0.3});
  });
  wreckTower=[];
  // Big impact effects
  wreckShakeTimer=0.5;
  spawnParticles(towerX,wreckGroundY-20,30,['#8d6e63','#a1887f','#6d4c41','#d7ccc8'],{vyRange:12,spread:50,maxSize:5,gravity:0.35}); // dust cloud
  // Crash sound
  playTone(60,0.4,'sawtooth',0.3);
  for(let i=0;i<5;i++)setTimeout(()=>{playTone(80+Math.random()*60,0.15,'square',0.15);playTone(40+Math.random()*30,0.1,'triangle',0.1)},i*80);
  setTimeout(()=>{wreckState='done';playJingle();spawnConfetti();playTaDa();updateWreckButtons()},2000);
  updateWreckButtons();
}

function updateWreckGame(dt){
  wreckGroundY=H*0.65;
  // Wobble
  wobbleVel+=-wobbleAngle*2.5*dt;wobbleVel*=0.95;wobbleAngle+=wobbleVel;
  // Screen shake
  if(wreckShakeTimer>0){wreckShakeTimer-=dt;wreckShakeX=(Math.random()-0.5)*wreckShakeTimer*60;wreckShakeY=(Math.random()-0.5)*wreckShakeTimer*40}else{wreckShakeX=0;wreckShakeY=0}
  // Pendulum swing
  if(wreckState==='swinging'&&!wreckBallReleased){
    const gravity=4.5;
    wreckBallVel-=gravity*Math.sin(wreckBallAngle)*dt;
    wreckBallVel*=0.998; // slight damping
    wreckBallAngle+=wreckBallVel*dt;
  }
  // Released ball physics — keeps moving even after smash
  if(wreckBallReleased){
    wreckBallVY+=600*dt; // gravity
    wreckBallX+=wreckBallVX*dt;
    wreckBallY+=wreckBallVY*dt;
    // Check collision with tower (only before smash)
    if(!wreckSmashed){
      const towerX=W*0.38,towerW=55;
      if(wreckBallX>towerX-towerW&&wreckBallX<towerX+towerW&&wreckBallY>wreckGroundY-wreckTower.length*25-30){
        smashTower();wreckBallVX*=0.3;wreckBallVY=-100; // bounce off impact
      }
    }
    // Ball hit ground — bounce and settle
    if(wreckBallY>wreckGroundY){
      wreckBallY=wreckGroundY;wreckBallVY*=-0.3;wreckBallVX*=0.5;
      if(!wreckSmashed&&wreckTower.length>0){smashTower()}
      else if(!wreckSmashed){wreckSmashed=true;wreckState='done';updateWreckButtons()}
    }
    // Snap back to rope after settling (once moving slowly)
    if(wreckSmashed&&Math.abs(wreckBallVX)<5&&Math.abs(wreckBallVY)<5){
      wreckBallReleased=false;wreckBallAngle=0;wreckBallVel=0;
    }
  }
  // Flying blocks
  for(let i=wreckFlyingBlocks.length-1;i>=0;i--){
    const b=wreckFlyingBlocks[i];
    b.vy+=500*dt;b.x+=b.vx*dt*60;b.y+=b.vy*dt;b.rot+=b.rotV;b.life-=b.decay;
    // Bounce off ground
    if(b.y>wreckGroundY-b.h/2){
      b.y=wreckGroundY-b.h/2;b.vy*=-0.4;b.vx*=0.7;b.rotV*=0.6;
      if(Math.abs(b.vy)>2)playTone(100+Math.random()*80,0.06,'triangle',0.05);
    }
    if(b.life<=0)wreckFlyingBlocks.splice(i,1);
  }
  updateParticles(dt);updateConfetti();
}

function drawWreckGame(){
  wreckGroundY=H*0.65;
  ctx.save();ctx.translate(wreckShakeX,wreckShakeY);
  // Sky
  let grd=ctx.createLinearGradient(0,0,0,wreckGroundY);
  grd.addColorStop(0,'#4fc3f7');grd.addColorStop(1,'#b3e5fc');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,wreckGroundY);
  ctx.fillStyle='#ffeb3b';ctx.beginPath();ctx.arc(W*0.12,H*0.08,30,0,Math.PI*2);ctx.fill();
  drawCloud(W*0.3,H*0.05,0.6);drawCloud(W*0.6,H*0.09,0.5);
  // Ground
  ctx.fillStyle='#8bc34a';ctx.fillRect(0,wreckGroundY-4,W,8);
  grd=ctx.createLinearGradient(0,wreckGroundY+4,0,H);grd.addColorStop(0,'#8d6e63');grd.addColorStop(1,'#5d4037');
  ctx.fillStyle=grd;ctx.fillRect(0,wreckGroundY+4,W,H);

  // Tower
  const towerX=W*0.38;
  let ty=wreckGroundY;
  ctx.save();
  ctx.translate(towerX,wreckGroundY);
  ctx.rotate(wobbleAngle*(wreckTower.length*0.02));
  ctx.translate(-towerX,-wreckGroundY);
  wreckTower.forEach((block,idx)=>{
    ty-=block.h;
    const lw=wobbleAngle*idx*0.5;
    const bx=towerX-block.w/2+lw,by2=ty;
    // Block shadow
    ctx.fillStyle='rgba(0,0,0,0.1)';
    drawRoundRect(bx+2,by2+2,block.w,block.h,3);ctx.fill();
    // Block
    ctx.fillStyle=block.color;
    drawRoundRect(bx,by2,block.w,block.h,3);ctx.fill();
    ctx.strokeStyle=block.dark;ctx.lineWidth=2;ctx.stroke();
    // Highlight
    ctx.fillStyle=block.light;ctx.globalAlpha=0.3;
    ctx.fillRect(bx+3,by2+2,block.w-6,block.h*0.35);
    ctx.globalAlpha=1;
    // Texture
    if(block.id==='brick'){
      ctx.strokeStyle=block.dark;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(bx+block.w*0.5,by2);ctx.lineTo(bx+block.w*0.5,by2+block.h);ctx.stroke();
      ctx.beginPath();ctx.moveTo(bx,by2+block.h*0.5);ctx.lineTo(bx+block.w,by2+block.h*0.5);ctx.stroke();
    }else if(block.id==='wood'){
      ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=1;
      for(let g=0;g<3;g++){ctx.beginPath();ctx.moveTo(bx+5+g*15,by2);ctx.lineTo(bx+5+g*15,by2+block.h);ctx.stroke()}
    }else if(block.id==='glass'){
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.beginPath();ctx.moveTo(bx+5,by2+3);ctx.lineTo(bx+15,by2+3);ctx.lineTo(bx+8,by2+block.h-3);ctx.closePath();ctx.fill();
    }
  });
  ctx.restore();

  // Flying blocks
  wreckFlyingBlocks.forEach(b=>{
    ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.rot);ctx.globalAlpha=b.life;
    ctx.fillStyle=b.color;
    drawRoundRect(-b.w/2,-b.h/2,b.w,b.h,3);ctx.fill();
    ctx.strokeStyle=b.dark;ctx.lineWidth=1.5;ctx.stroke();
    ctx.globalAlpha=1;ctx.restore();
  });

  // Crane
  const craneX=W*0.82,craneTopY=H*0.05;
  // Crane arm
  ctx.fillStyle='#ffa726';
  ctx.fillRect(craneX-5,craneTopY,10,wreckGroundY-craneTopY); // vertical mast
  ctx.fillRect(towerX-20,craneTopY,craneX-towerX+25,8); // horizontal jib
  ctx.strokeStyle='#e65100';ctx.lineWidth=2;
  ctx.strokeRect(craneX-5,craneTopY,10,wreckGroundY-craneTopY);
  ctx.strokeRect(towerX-20,craneTopY,craneX-towerX+25,8);

  // Wrecking ball
  const ropeLen=H*0.35,ballR=W*0.04;
  let ballX,ballY;
  if(!wreckBallReleased){
    ballX=craneX+Math.sin(wreckBallAngle)*ropeLen;
    ballY=craneTopY+4+Math.cos(wreckBallAngle)*ropeLen;
  }else{
    ballX=wreckBallX;ballY=wreckBallY;
  }
  // Rope/chain — always drawn from crane to ball
  ctx.strokeStyle='#616161';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(craneX,craneTopY+4);ctx.lineTo(ballX,ballY);ctx.stroke();
  const links=8;
  for(let i=1;i<links;i++){
    const t=i/links;
    const lx=lerp(craneX,ballX,t),ly=lerp(craneTopY+4,ballY,t);
    ctx.fillStyle=i%2?'#757575':'#616161';
    ctx.beginPath();ctx.arc(lx,ly,2.5,0,Math.PI*2);ctx.fill();
  }
  // Ball
  ctx.fillStyle='#424242';
  ctx.beginPath();ctx.arc(ballX,ballY,ballR,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#212121';ctx.lineWidth=3;ctx.stroke();
  // Ball highlight
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.beginPath();ctx.arc(ballX-ballR*0.25,ballY-ballR*0.25,ballR*0.4,0,Math.PI*2);ctx.fill();
  // Ball ring
  ctx.fillStyle='#616161';
  ctx.beginPath();ctx.arc(ballX,ballY-ballR+3,5,0,Math.PI*2);ctx.fill();

  drawParticles(0);drawConfetti();
  ctx.restore(); // shake
}

// Wreck game tap handler
function handleWreckTap(tx,ty){
  if(wreckState==='swinging'&&!wreckBallReleased){initAudio();releaseWreckBall()}
}

// =============================================
// MAIN LOOP
// =============================================
let lastTime=0;
function gameLoop(ts){
  const dt=Math.min(0.05,(ts-lastTime)/1000);lastTime=ts;
  resize();ctx.clearRect(0,0,W,H);

  if(currentMode==='menu'){drawMenuBg()}
  else if(currentMode==='dig'){updateDigGame(dt);drawDigGame()}
  else if(currentMode==='burger'){updateBurgerGame(dt);drawBurgerGame()}
  else if(currentMode==='icecream'){updateIceCreamGame(dt);drawIceCreamGame()}
  else if(currentMode==='match'){updateMatchGame(dt);drawMatchGame()}
  else if(currentMode==='wreck'){updateWreckGame(dt);drawWreckGame()}
  else if(currentMode==='pancake'){updatePancakeGame(dt);drawPancakeGame()}
  else if(currentMode==='pizza'){updatePizzaGame(dt);drawPizzaGame()}

  requestAnimationFrame(gameLoop);
}

showMenu();
requestAnimationFrame(gameLoop);
</script>
