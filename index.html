<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Toddler Games!</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none;height:100vh;height:100dvh;width:100vw;background:#5d4037;overscroll-behavior:none;-webkit-overflow-scrolling:none;position:fixed;top:0;left:0;right:0;bottom:0}
  canvas{display:block;touch-action:none}
  .buttons-area{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;flex-wrap:wrap;gap:8px;padding:8px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));background:rgba(0,0,0,0.25);z-index:50}
  .game-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:85px;min-height:80px;padding:8px 14px;border:4px solid rgba(0,0,0,0.25);border-radius:18px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,0.3);color:white;text-shadow:1px 1px 2px rgba(0,0,0,0.4);-webkit-tap-highlight-color:transparent;transition:transform 0.1s,box-shadow 0.1s;border-bottom-width:6px}
  .game-btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,0.3)}
  .game-btn .emoji{font-size:32px;line-height:1;margin-bottom:2px}
  .btn-sand{background:linear-gradient(180deg,#ffca28,#f9a825)}.btn-rocks{background:linear-gradient(180deg,#90a4ae,#607d8b)}.btn-water{background:linear-gradient(180deg,#4fc3f7,#0288d1)}
  .btn-go{background:linear-gradient(180deg,#66bb6a,#388e3c);min-width:90px}.btn-dump{background:linear-gradient(180deg,#ff7043,#d84315);min-width:120px;font-size:18px}
  .btn-again{background:linear-gradient(180deg,#ab47bc,#7b1fa2);min-width:140px;font-size:16px}
  .btn-menu{background:linear-gradient(180deg,#78909c,#546e7a);min-width:70px;font-size:12px;min-height:60px}
  .btn-done{background:linear-gradient(180deg,#66bb6a,#2e7d32);min-width:100px;font-size:18px}
  .btn-food{background:linear-gradient(180deg,#ffe0b2,#ffcc80);color:#5d4037;min-width:70px}
  .btn-icecream{background:linear-gradient(180deg,#f8bbd0,#f48fb1);min-width:70px}
  .btn-pizza{background:linear-gradient(180deg,#ff8a65,#e64a19);min-width:70px}
  .btn-nom{background:linear-gradient(180deg,#ff7043,#d84315);min-width:160px;min-height:90px;font-size:24px}
  .btn-nom .emoji{font-size:40px}
  .btn-char{background:linear-gradient(180deg,#ffe082,#f9a825);color:#5d4037;min-width:70px}
  .btn-wash{background:linear-gradient(180deg,#64b5f6,#1565c0);min-width:70px}
  .btn-train{background:linear-gradient(180deg,#78909c,#455a64);min-width:70px}
  .btn-traingo{background:linear-gradient(180deg,#66bb6a,#388e3c);min-width:100px;font-size:18px}
  .btn-blend{background:linear-gradient(180deg,#ce93d8,#7b1fa2);min-width:70px}
  .btn-milk{background:linear-gradient(180deg,#fce4ec,#f8bbd0);color:#880e4f;min-width:70px}
  .btn-blendgo{background:linear-gradient(180deg,#66bb6a,#388e3c);min-width:100px;font-size:18px}
  .game-btn.disabled{opacity:0.35;pointer-events:none;box-shadow:0 3px 0 rgba(0,0,0,0.15)}
  .instruction{position:fixed;top:8px;top:calc(8px + env(safe-area-inset-top,0px));left:50%;transform:translateX(-50%);font-size:clamp(18px,4vw,28px);font-weight:900;color:white;text-shadow:2px 2px 6px rgba(0,0,0,0.5);z-index:60;text-align:center;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
  .menu-btn-fixed{position:fixed;top:8px;top:calc(8px + env(safe-area-inset-top,0px));left:8px;left:calc(8px + env(safe-area-inset-left,0px));z-index:60;display:none;width:44px;height:44px;border-radius:12px;border:3px solid rgba(0,0,0,0.2);background:linear-gradient(180deg,#78909c,#546e7a);color:white;font-size:22px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,0.3);-webkit-tap-highlight-color:transparent;line-height:44px;text-align:center;padding:0}
  .menu-btn-fixed:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,0.3)}
  .menu-grid{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-wrap:wrap;justify-content:center;align-content:flex-start;gap:6px;padding:8px;padding-top:env(safe-area-inset-top,4px);z-index:55;pointer-events:none;overflow-y:auto;background:transparent;visibility:hidden}
  .menu-grid.active{pointer-events:auto;visibility:visible;background:linear-gradient(180deg,#4fc3f7 0%,#81d4fa 40%,#b3e5fc 70%,#c8e6c9 100%)}
.menu-title{width:100%;text-align:center;padding:2px 0 1px;pointer-events:none}
  .menu-title h1{font-size:clamp(22px,5vw,40px);font-weight:900;color:white;text-shadow:3px 3px 8px rgba(0,0,0,0.35);margin:0}
  .menu-title p{font-size:clamp(12px,2.5vw,18px);font-weight:700;color:rgba(255,255,255,0.85);text-shadow:1px 1px 4px rgba(0,0,0,0.3);margin:1px 0 0}
  .menu-card{display:flex;flex-direction:column;align-items:center;justify-content:center;width:calc(33% - 8px);max-width:140px;min-height:72px;border-radius:16px;border:3px solid rgba(0,0,0,0.2);font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,0.25);color:white;text-shadow:1px 1px 3px rgba(0,0,0,0.4);-webkit-tap-highlight-color:transparent;transition:transform 0.1s;border-bottom-width:5px}
  .menu-card:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,0.25)}
  .menu-card .card-emoji{font-size:28px;line-height:1;margin-bottom:2px}
  .menu-card .card-label{font-size:12px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="instruction" id="instruction"></div>
<button class="menu-btn-fixed" id="menuBtnFixed" onclick="initAudio();showMenu()">🏠</button>
<div class="menu-grid" id="menuGrid"></div>
<div class="buttons-area" id="buttonsArea"></div>
<script>window.onerror=function(m,s,l){document.body.style.background='#4fc3f7';document.body.innerHTML='<div style="color:#fff;text-align:center;padding:40px;font-family:sans-serif"><h2>Error</h2><p>'+m+'</p><p>Line: '+l+'</p></div>';return true}</script>
<script>
// =============================================
// SHARED ENGINE
// =============================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const buttonsArea = document.getElementById('buttonsArea');
const instruction = document.getElementById('instruction');
const menuBtnFixed = document.getElementById('menuBtnFixed');
const menuGrid = document.getElementById('menuGrid');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

function lerp(a,b,t){return a+(b-a)*t}
function easeInOut(t){return t<0.5?2*t*t:-1+(4-2*t)*t}
function easeOut(t){return 1-(1-t)*(1-t)}
function seededRand(s){return function(){s=(s*16807)%2147483647;return(s-1)/2147483646}}
function drawRoundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

// Audio
let audioCtx=null,speechUnlocked=false;
function initAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(!speechUnlocked&&window.speechSynthesis){speechUnlocked=true;const u=new SpeechSynthesisUtterance('');u.volume=0;window.speechSynthesis.speak(u)}
}
function playTone(freq,dur,type,vol,delay){
  if(!audioCtx)return;const n=audioCtx.currentTime+(delay||0),o=audioCtx.createOscillator(),g=audioCtx.createGain();
  g.connect(audioCtx.destination);o.type=type||'sine';o.frequency.setValueAtTime(freq,n);
  g.gain.setValueAtTime(vol||0.15,n);g.gain.exponentialRampToValueAtTime(0.01,n+dur);
  o.connect(g);o.start(n);o.stop(n+dur);
}
function playJingle(){[523,659,784,1047].forEach((f,i)=>playTone(f,0.3,'sine',0.12,i*0.12))}
function playPop(){playTone(600+Math.random()*200,0.15,'sine',0.12)}
function playSplat(){playTone(150,0.2,'triangle',0.12);playTone(100,0.25,'square',0.06)}
function playChomp(pitch){const p=pitch||200;playTone(p,0.12,'square',0.1);playTone(p*0.75,0.1,'square',0.08,0.13)}
function playSlurp(pitch){const p=pitch||400;playTone(p,0.3,'sine',0.08);playTone(p*1.5,0.2,'triangle',0.05)}
function playTaDa(){
  if(!audioCtx)return;
  // Ta — short rising chord
  [392,494,587].forEach(f=>{playTone(f,0.15,'sine',0.1)});
  [523,659,784,1047].forEach(f=>{playTone(f,0.5,'sine',0.1,0.2)});playTone(262,0.5,'triangle',0.06,0.2);
}
function playMatch(){playTone(523,0.15,'sine',0.12);playTone(659,0.15,'sine',0.12,0.1);playTone(784,0.2,'sine',0.12,0.2)}
function playWrong(){playTone(200,0.2,'square',0.1);playTone(160,0.25,'square',0.1,0.15)}
function playFlip(){playTone(800,0.08,'sine',0.1)}
let enVoice=null;
function findEnVoice(){
  if(enVoice)return;
  const v=speechSynthesis.getVoices();if(!v.length)return;
  // Prefer native English voices: Samantha (iOS), Google US, any en-US, any en-*
  enVoice=v.find(x=>x.name==='Samantha')||v.find(x=>x.name.includes('Google')&&x.lang.startsWith('en'))
    ||v.find(x=>x.lang==='en-US')||v.find(x=>x.lang.startsWith('en'))||null;
}
if(window.speechSynthesis){if(speechSynthesis.addEventListener)speechSynthesis.addEventListener('voiceschanged',findEnVoice);else if(speechSynthesis.onvoiceschanged!==undefined)speechSynthesis.onvoiceschanged=findEnVoice;findEnVoice()}
function setEnVoice(utt){utt.lang='en-US';findEnVoice();if(enVoice)utt.voice=enVoice}

function sayWord(word){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(word);
  setEnVoice(utt);utt.rate=1.1;utt.pitch=1.5;utt.volume=1;
  window.speechSynthesis.speak(utt);
}

let speechBusy=false;
function sayNumber(n){
  if(!window.speechSynthesis)return;
  // Cancel any pending speech so we stay in sync with the visual number
  window.speechSynthesis.cancel();speechBusy=false;
  const words=['','One!','Two!','Three!','Four!','Five!','Six!','Seven!','Eight!','Nine!','Ten!',
    'Eleven!','Twelve!','Thirteen!','Fourteen!','Fifteen!','Sixteen!','Seventeen!','Eighteen!','Nineteen!','Twenty!'];
  const text=n<=20?(words[n]||n+'!'):(n+'!');
  const utt=new SpeechSynthesisUtterance(text);
  setEnVoice(utt);utt.rate=1.2;utt.pitch=1.4;utt.volume=1;
  utt.onstart=()=>{speechBusy=true};
  utt.onend=()=>{speechBusy=false};
  window.speechSynthesis.speak(utt);
}

// Particles
let particles = [];
function spawnParticles(x,y,count,colors,opts={}){
  if(particles.length>200)return; // cap to prevent lag
  for(let i=0;i<count;i++){
    particles.push({x:x+(Math.random()-0.5)*(opts.spread||20),y,
      vx:(Math.random()-0.5)*(opts.vxRange||8),vy:-(Math.random()*(opts.vyRange||7)+2),
      size:2+Math.random()*(opts.maxSize||5),color:colors[Math.floor(Math.random()*colors.length)],
      life:1,decay:0.015+Math.random()*0.01,gravity:opts.gravity||0.25,
      shape:opts.shape||'circle'});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.vy+=p.gravity;p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(ofsY){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    const py=p.y+(ofsY||0);
    if(p.shape==='square'){ctx.save();ctx.translate(p.x,py);ctx.rotate(p.life*4);ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);ctx.restore()}
    else{ctx.beginPath();ctx.arc(p.x,py,p.size*0.5,0,Math.PI*2);ctx.fill()}
    ctx.globalAlpha=1;
  });
}

// Confetti
let confetti=[];
function spawnConfetti(){
  if(confetti.length>100)return;
  const cols=['#f44336','#e91e63','#9c27b0','#2196f3','#4caf50','#ffeb3b','#ff9800','#00bcd4'];
  for(let i=0;i<50;i++)confetti.push({x:Math.random()*W,y:-20-Math.random()*100,vx:(Math.random()-0.5)*4,vy:Math.random()*3+2,size:6+Math.random()*8,color:cols[Math.floor(Math.random()*cols.length)],rot:Math.random()*6.28,rs:(Math.random()-0.5)*0.15,life:1,decay:0.005+Math.random()*0.005,circ:Math.random()>0.5});
}
function updateConfetti(){for(let i=confetti.length-1;i>=0;i--){const c=confetti[i];c.x+=c.vx;c.y+=c.vy;c.vy+=0.05;c.vx+=(Math.random()-0.5)*0.3;c.rot+=c.rs;c.life-=c.decay;if(c.life<=0||c.y>H)confetti.splice(i,1)}}
function drawConfetti(){confetti.forEach(c=>{ctx.globalAlpha=c.life;ctx.fillStyle=c.color;ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.rot);if(c.circ){ctx.beginPath();ctx.arc(0,0,c.size/2,0,Math.PI*2);ctx.fill()}else ctx.fillRect(-c.size/2,-c.size/4,c.size,c.size/2);ctx.restore();ctx.globalAlpha=1})}

// Floating reaction emojis
let floatingEmojis=[];
function spawnFloatingEmoji(x,y,emoji){
  floatingEmojis.push({x:x+(Math.random()-0.5)*40,y,emoji,life:1,vy:-2-Math.random()*2,vx:(Math.random()-0.5)*1.5});
}
function updateFloatingEmojis(dt){
  for(let i=floatingEmojis.length-1;i>=0;i--){
    const e=floatingEmojis[i];e.y+=e.vy;e.x+=e.vx;e.life-=dt*0.8;
    if(e.life<=0)floatingEmojis.splice(i,1);
  }
}
function drawFloatingEmojis(){
  floatingEmojis.forEach(e=>{
    ctx.globalAlpha=e.life;
    ctx.font=`${28+e.life*12}px sans-serif`;ctx.textAlign='center';
    ctx.fillText(e.emoji,e.x,e.y);
    ctx.globalAlpha=1;ctx.textAlign='left';
  });
}

// Flying food items (shrink and fly to mouth)
let flyingFoods=[];
function spawnFlyingFood(fromX,fromY,toX,toY,emoji,color){
  flyingFoods.push({x:fromX,y:fromY,toX,toY,emoji,color,t:0,dur:0.35});
}
function updateFlyingFoods(dt){
  for(let i=flyingFoods.length-1;i>=0;i--){
    const f=flyingFoods[i];f.t+=dt;
    if(f.t>=f.dur)flyingFoods.splice(i,1);
  }
}
function drawFlyingFoods(){
  flyingFoods.forEach(f=>{
    const t=Math.min(1,f.t/f.dur);
    const et=easeInOut(t);
    const x=lerp(f.x,f.toX,et);
    const y=lerp(f.y,f.toY,et)-Math.sin(t*Math.PI)*40; // arc upward
    const scale=lerp(1,0.15,et);
    ctx.globalAlpha=1-t*0.3;
    ctx.font=`${Math.max(12,32*scale)}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(f.emoji,x,y);
    // Color circle behind if no emoji
    if(f.color){
      ctx.fillStyle=f.color;ctx.globalAlpha=(1-t*0.5)*0.6;
      ctx.beginPath();ctx.arc(x,y,18*scale,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;ctx.textBaseline='alphabetic';ctx.textAlign='left';
  });
}

// Button helper
function addBtn(cls,emoji,label,onclick,disabled){
  const btn=document.createElement('button');
  const isRestart=cls==='btn-again'||label==='Next'||label==='Bulldoze!';
  const delayMs=isRestart?1500:0;
  btn.className=`game-btn ${cls}${disabled||isRestart?' disabled':''}`;
  btn.innerHTML=`<span class="emoji">${emoji}</span>${label}`;
  if(!disabled){
    let enabled=!isRestart;
    const fire=()=>{if(!enabled)return;btn.style.transform='translateY(4px) scale(0.93)';setTimeout(()=>btn.style.transform='',150);onclick()};
    // Drag-tolerant: track start position, fire if finger stays within 30px
    let tx=0,ty=0;
    btn.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];tx=t.clientX;ty=t.clientY},{passive:false});
    btn.addEventListener('touchend',e=>{e.preventDefault();
      if(!e.changedTouches.length)return;const t=e.changedTouches[0];
      if(Math.abs(t.clientX-tx)<30&&Math.abs(t.clientY-ty)<30)fire();
    },{passive:false});
    btn.addEventListener('click',e=>{e.preventDefault();fire()});
    if(isRestart){setTimeout(()=>{enabled=true;btn.classList.remove('disabled')},delayMs)}
  }
  buttonsArea.appendChild(btn);
}

function drawCloud(x,y,s){ctx.fillStyle='rgba(255,255,255,0.85)';ctx.beginPath();ctx.arc(x,y,20*s,0,Math.PI*2);ctx.arc(x+25*s,y-10*s,25*s,0,Math.PI*2);ctx.arc(x+50*s,y,20*s,0,Math.PI*2);ctx.fill()}

// =============================================
// CHARACTER SYSTEM
// =============================================
const CHARACTERS = [
  {id:'purin', emoji:'🍮', label:'Purin'},
  {id:'cat',   emoji:'🐱', label:'Cat'},
  {id:'bear',  emoji:'🐻', label:'Bear'},
  {id:'bunny', emoji:'🐰', label:'Bunny'},
];
let currentChar = 'purin';
let mouthOpenTimer = 0; // for mouth animation on tap
let autoEatFn=null,autoEatTimer=0; // auto-eat system
function startAutoEat(eatFn){autoEatFn=eatFn;autoEatTimer=0}
function stopAutoEat(){autoEatFn=null;autoEatTimer=0}
function updateAutoEat(dt){
  if(!autoEatFn)return;
  autoEatTimer+=dt;
  if(autoEatTimer>=0.45){autoEatTimer=0;autoEatFn()}
}

// =============================================
// CURRENT GAME MODE
// =============================================
let currentMode = 'menu'; // 'menu','dig','burger','icecream','match','wreck'
let wobbleAngle = 0, wobbleVel = 0; // wobbly stack physics

// =============================================
// MENU
// =============================================
function showMenu(){
  currentMode='menu';particles=[];confetti=[];floatingEmojis=[];flyingFoods=[];wobbleAngle=0;wobbleVel=0;mouthOpenTimer=0;stopAutoEat();
  if(window.speechSynthesis)window.speechSynthesis.cancel();speechBusy=false;
  instruction.textContent='';
  buttonsArea.innerHTML='';
  menuBtnFixed.style.display='none';
  menuGrid.classList.add('active');
  menuGrid.innerHTML='<div class="menu-title"><h1>Toddler Games!</h1><p>Pick a game!</p></div>';
  const games=[
    {emoji:'🚜',label:'Dig!',bg:'linear-gradient(180deg,#ffca28,#f9a825)',fn:startDigGame},
    {emoji:'🍽️',label:'Food!',bg:'linear-gradient(180deg,#ffb74d,#e65100)',color:'#fff',fn:showFoodMenu,submenu:true},
    {emoji:'🃏',label:'Match!',bg:'linear-gradient(180deg,#66bb6a,#388e3c)',fn:startMatchGame},
    {emoji:'💥',label:'Smash!',bg:'linear-gradient(180deg,#ff7043,#d84315)',fn:startWreckGame},
    {emoji:'🎨',label:'Splash!',bg:'linear-gradient(180deg,#ce93d8,#8e24aa)',fn:startPaintGame},
    {emoji:'🫧',label:'Bubbles!',bg:'linear-gradient(180deg,#64b5f6,#1976d2)',fn:startBalloonGame},
    {emoji:'✏️',label:'Trace!',bg:'linear-gradient(180deg,#fff176,#f9a825)',color:'#5d4037',fn:startTraceGame},
    {emoji:'🎹',label:'Music!',bg:'linear-gradient(180deg,#ce93d8,#6a1b9a)',fn:startMusicGame},
    {emoji:'🏁',label:'Maze!',bg:'linear-gradient(180deg,#a5d6a7,#2e7d32)',fn:startMazeGame},
    {emoji:'🧱',label:'Build!',bg:'linear-gradient(180deg,#ffcc80,#ff8f00)',color:'#5d4037',fn:startBuildGame},
    {emoji:'🚗',label:'Car Wash!',bg:'linear-gradient(180deg,#64b5f6,#1565c0)',fn:startCarWashGame},
    {emoji:'🚂',label:'Train!',bg:'linear-gradient(180deg,#78909c,#37474f)',fn:startTrainGame},
    {emoji:'🙈',label:'Seek!',bg:'linear-gradient(180deg,#a5d6a7,#388e3c)',fn:startHideSeekGame},
    {emoji:'🕷️',label:'Spider!',bg:'linear-gradient(180deg,#b0bec5,#546e7a)',fn:startSpiderGame},
  ];
  games.forEach(g=>{
    const card=document.createElement('div');
    card.className='menu-card';card.style.background=g.bg;
    if(g.color)card.style.color=g.color;
    card.innerHTML=`<span class="card-emoji">${g.emoji}</span><span class="card-label">${g.label}</span>`;
    const handler=e=>{e.preventDefault();initAudio();playPop();if(g.submenu){g.fn();}else{hideMenu();g.fn();}};

}
