<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Toddler Games!</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none;height:100dvh;width:100vw;background:#5d4037}
  canvas{display:block}
  .buttons-area{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;flex-wrap:wrap;gap:8px;padding:8px;background:rgba(0,0,0,0.25);z-index:50}
  .game-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:85px;min-height:80px;padding:8px 14px;border:4px solid rgba(0,0,0,0.25);border-radius:18px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,0.3);color:white;text-shadow:1px 1px 2px rgba(0,0,0,0.4);-webkit-tap-highlight-color:transparent;transition:transform 0.1s,box-shadow 0.1s;border-bottom-width:6px}
  .game-btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,0.3)}
  .game-btn .emoji{font-size:32px;line-height:1;margin-bottom:2px}
  .btn-sand{background:linear-gradient(180deg,#ffca28,#f9a825)}.btn-rocks{background:linear-gradient(180deg,#90a4ae,#607d8b)}.btn-water{background:linear-gradient(180deg,#4fc3f7,#0288d1)}
  .btn-go{background:linear-gradient(180deg,#66bb6a,#388e3c);min-width:90px}.btn-dump{background:linear-gradient(180deg,#ff7043,#d84315);min-width:120px;font-size:18px}
  .btn-again{background:linear-gradient(180deg,#ab47bc,#7b1fa2);min-width:120px;font-size:18px}
  .btn-menu{background:linear-gradient(180deg,#78909c,#546e7a);min-width:70px;font-size:12px;min-height:60px}
  .btn-done{background:linear-gradient(180deg,#66bb6a,#2e7d32);min-width:100px;font-size:18px}
  .btn-food{background:linear-gradient(180deg,#ffe0b2,#ffcc80);color:#5d4037;min-width:70px}
  .btn-icecream{background:linear-gradient(180deg,#f8bbd0,#f48fb1);min-width:70px}
  .btn-pizza{background:linear-gradient(180deg,#ff8a65,#e64a19);min-width:70px}
  .btn-nom{background:linear-gradient(180deg,#ff7043,#d84315);min-width:160px;min-height:90px;font-size:24px}
  .btn-nom .emoji{font-size:40px}
  .btn-char{background:linear-gradient(180deg,#ffe082,#f9a825);color:#5d4037;min-width:70px}
  .game-btn.disabled{opacity:0.35;pointer-events:none;box-shadow:0 3px 0 rgba(0,0,0,0.15)}
  .instruction{position:fixed;top:8px;left:50%;transform:translateX(-50%);font-size:clamp(18px,4vw,28px);font-weight:900;color:white;text-shadow:2px 2px 6px rgba(0,0,0,0.5);z-index:60;text-align:center;pointer-events:none;white-space:nowrap}
  .menu-btn-fixed{position:fixed;top:8px;left:8px;z-index:60;display:none;width:44px;height:44px;border-radius:12px;border:3px solid rgba(0,0,0,0.2);background:linear-gradient(180deg,#78909c,#546e7a);color:white;font-size:22px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,0.3);-webkit-tap-highlight-color:transparent;line-height:44px;text-align:center;padding:0}
  .menu-btn-fixed:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,0.3)}
  .menu-grid{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-wrap:wrap;justify-content:center;align-content:flex-start;gap:10px;padding:12px;padding-top:calc(40px + env(safe-area-inset-top,8px));z-index:55;pointer-events:none;overflow-y:auto}
  .menu-grid.active{pointer-events:auto}
.menu-card{display:flex;flex-direction:column;align-items:center;justify-content:center;width:calc(45% - 6px);max-width:180px;min-height:100px;border-radius:22px;border:4px solid rgba(0,0,0,0.2);font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,0.25);color:white;text-shadow:1px 1px 3px rgba(0,0,0,0.4);-webkit-tap-highlight-color:transparent;transition:transform 0.1s;border-bottom-width:6px}
  .menu-card:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,0.25)}
  .menu-card .card-emoji{font-size:38px;line-height:1;margin-bottom:3px}
  .menu-card .card-label{font-size:14px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="instruction" id="instruction"></div>
<button class="menu-btn-fixed" id="menuBtnFixed" onclick="initAudio();showMenu()">🏠</button>
<div class="menu-grid" id="menuGrid"></div>
<div class="buttons-area" id="buttonsArea"></div>
<script>
// =============================================
// SHARED ENGINE
// =============================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const buttonsArea = document.getElementById('buttonsArea');
const instruction = document.getElementById('instruction');
const menuBtnFixed = document.getElementById('menuBtnFixed');
const menuGrid = document.getElementById('menuGrid');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

function lerp(a,b,t){return a+(b-a)*t}
function easeInOut(t){return t<0.5?2*t*t:-1+(4-2*t)*t}
function easeOut(t){return 1-(1-t)*(1-t)}
function seededRand(s){return function(){s=(s*16807)%2147483647;return(s-1)/2147483646}}
function drawRoundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

// Audio
let audioCtx=null,speechUnlocked=false;
function initAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(!speechUnlocked&&window.speechSynthesis){speechUnlocked=true;const u=new SpeechSynthesisUtterance('');u.volume=0;window.speechSynthesis.speak(u)}
}
function playTone(freq,dur,type,vol){
  if(!audioCtx)return;const n=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();
  g.connect(audioCtx.destination);o.type=type||'sine';o.frequency.setValueAtTime(freq,n);
  g.gain.setValueAtTime(vol||0.15,n);g.gain.exponentialRampToValueAtTime(0.01,n+dur);
  o.connect(g);o.start(n);o.stop(n+dur);
}
function playJingle(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.3,'sine',0.2),i*120))}
function playPop(){playTone(600+Math.random()*200,0.15,'sine',0.2)}
function playSplat(){playTone(150,0.2,'triangle',0.2);playTone(100,0.25,'square',0.1)}
function playChomp(pitch){const p=pitch||200;playTone(p,0.12,'square',0.15);setTimeout(()=>playTone(p*0.75,0.1,'square',0.12),130)}
function playSlurp(pitch){const p=pitch||400;playTone(p,0.3,'sine',0.12);playTone(p*1.5,0.2,'triangle',0.08)}
function playTaDa(){
  if(!audioCtx)return;
  // Ta — short rising chord
  [392,494,587].forEach(f=>{playTone(f,0.15,'sine',0.15)});
  // Da! — big bright major chord, slightly delayed
  setTimeout(()=>{[523,659,784,1047].forEach(f=>{playTone(f,0.5,'sine',0.18)});playTone(262,0.5,'triangle',0.12)},200);
}
function playMatch(){playTone(523,0.15,'sine',0.2);setTimeout(()=>playTone(659,0.15,'sine',0.2),100);setTimeout(()=>playTone(784,0.2,'sine',0.2),200)}
function playWrong(){playTone(200,0.2,'square',0.1);setTimeout(()=>playTone(160,0.25,'square',0.1),150)}
function playFlip(){playTone(800,0.08,'sine',0.1)}
function sayWord(word){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(word);
  utt.lang='en-US';utt.rate=1.1;utt.pitch=1.5;utt.volume=1;
  window.speechSynthesis.speak(utt);
}

let speechBusy=false;
function sayNumber(n){
  if(!window.speechSynthesis)return;
  // Cancel any pending speech so we stay in sync with the visual number
  window.speechSynthesis.cancel();speechBusy=false;
  const words=['','One!','Two!','Three!','Four!','Five!','Six!','Seven!','Eight!','Nine!','Ten!',
    'Eleven!','Twelve!','Thirteen!','Fourteen!','Fifteen!','Sixteen!','Seventeen!','Eighteen!','Nineteen!','Twenty!'];
  const text=n<=20?(words[n]||n+'!'):(n+'!');
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='en-US';utt.rate=1.2;utt.pitch=1.4;utt.volume=1;
  utt.onstart=()=>{speechBusy=true};
  utt.onend=()=>{speechBusy=false};
  window.speechSynthesis.speak(utt);
}

// Particles
let particles = [];
function spawnParticles(x,y,count,colors,opts={}){
  for(let i=0;i<count;i++){
    particles.push({x:x+(Math.random()-0.5)*(opts.spread||20),y,
      vx:(Math.random()-0.5)*(opts.vxRange||8),vy:-(Math.random()*(opts.vyRange||7)+2),
      size:2+Math.random()*(opts.maxSize||5),color:colors[Math.floor(Math.random()*colors.length)],
      life:1,decay:0.015+Math.random()*0.01,gravity:opts.gravity||0.25,
      shape:opts.shape||'circle'});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.vy+=p.gravity;p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(ofsY){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    const py=p.y+(ofsY||0);
    if(p.shape==='square'){ctx.save();ctx.translate(p.x,py);ctx.rotate(p.life*4);ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);ctx.restore()}
    else{ctx.beginPath();ctx.arc(p.x,py,p.size*0.5,0,Math.PI*2);ctx.fill()}
    ctx.globalAlpha=1;
  });
}

// Confetti
let confetti=[];
function spawnConfetti(){
  const cols=['#f44336','#e91e63','#9c27b0','#2196f3','#4caf50','#ffeb3b','#ff9800','#00bcd4'];
  for(let i=0;i<50;i++)confetti.push({x:Math.random()*W,y:-20-Math.random()*100,vx:(Math.random()-0.5)*4,vy:Math.random()*3+2,size:6+Math.random()*8,color:cols[Math.floor(Math.random()*cols.length)],rot:Math.random()*6.28,rs:(Math.random()-0.5)*0.15,life:1,decay:0.005+Math.random()*0.005,circ:Math.random()>0.5});
}
function updateConfetti(){for(let i=confetti.length-1;i>=0;i--){const c=confetti[i];c.x+=c.vx;c.y+=c.vy;c.vy+=0.05;c.vx+=(Math.random()-0.5)*0.3;c.rot+=c.rs;c.life-=c.decay;if(c.life<=0||c.y>H)confetti.splice(i,1)}}
function drawConfetti(){confetti.forEach(c=>{ctx.globalAlpha=c.life;ctx.fillStyle=c.color;ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.rot);if(c.circ){ctx.beginPath();ctx.arc(0,0,c.size/2,0,Math.PI*2);ctx.fill()}else ctx.fillRect(-c.size/2,-c.size/4,c.size,c.size/2);ctx.restore();ctx.globalAlpha=1})}

// Floating reaction emojis
let floatingEmojis=[];
function spawnFloatingEmoji(x,y,emoji){
  floatingEmojis.push({x:x+(Math.random()-0.5)*40,y,emoji,life:1,vy:-2-Math.random()*2,vx:(Math.random()-0.5)*1.5});
}
function updateFloatingEmojis(dt){
  for(let i=floatingEmojis.length-1;i>=0;i--){
    const e=floatingEmojis[i];e.y+=e.vy;e.x+=e.vx;e.life-=dt*0.8;
    if(e.life<=0)floatingEmojis.splice(i,1);
  }
}
function drawFloatingEmojis(){
  floatingEmojis.forEach(e=>{
    ctx.globalAlpha=e.life;
    ctx.font=`${28+e.life*12}px sans-serif`;ctx.textAlign='center';
    ctx.fillText(e.emoji,e.x,e.y);
    ctx.globalAlpha=1;ctx.textAlign='left';
  });
}

// Flying food items (shrink and fly to mouth)
let flyingFoods=[];
function spawnFlyingFood(fromX,fromY,toX,toY,emoji,color){
  flyingFoods.push({x:fromX,y:fromY,toX,toY,emoji,color,t:0,dur:0.35});
}
function updateFlyingFoods(dt){
  for(let i=flyingFoods.length-1;i>=0;i--){
    const f=flyingFoods[i];f.t+=dt;
    if(f.t>=f.dur)flyingFoods.splice(i,1);
  }
}
function drawFlyingFoods(){
  flyingFoods.forEach(f=>{
    const t=Math.min(1,f.t/f.dur);
    const et=easeInOut(t);
    const x=lerp(f.x,f.toX,et);
    const y=lerp(f.y,f.toY,et)-Math.sin(t*Math.PI)*40; // arc upward
    const scale=lerp(1,0.15,et);
    ctx.globalAlpha=1-t*0.3;
    ctx.font=`${Math.max(12,32*scale)}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(f.emoji,x,y);
    // Color circle behind if no emoji
    if(f.color){
      ctx.fillStyle=f.color;ctx.globalAlpha=(1-t*0.5)*0.6;
      ctx.beginPath();ctx.arc(x,y,18*scale,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;ctx.textBaseline='alphabetic';ctx.textAlign='left';
  });
}

// Button helper
function addBtn(cls,emoji,label,onclick,disabled){
  const btn=document.createElement('button');btn.className=`game-btn ${cls}${disabled?' disabled':''}`;
  btn.innerHTML=`<span class="emoji">${emoji}</span>${label}`;
  if(!disabled){
    const handler=e=>{e.preventDefault();btn.style.transform='translateY(4px) scale(0.93)';setTimeout(()=>btn.style.transform='',150);onclick()};
    btn.addEventListener('click',handler);
  }
  buttonsArea.appendChild(btn);
}

function drawCloud(x,y,s){ctx.fillStyle='rgba(255,255,255,0.85)';ctx.beginPath();ctx.arc(x,y,20*s,0,Math.PI*2);ctx.arc(x+25*s,y-10*s,25*s,0,Math.PI*2);ctx.arc(x+50*s,y,20*s,0,Math.PI*2);ctx.fill()}

// =============================================
// CHARACTER SYSTEM
// =============================================
const CHARACTERS = [
  {id:'purin', emoji:'🍮', label:'Purin'},
  {id:'cat',   emoji:'🐱', label:'Cat'},
  {id:'bear',  emoji:'🐻', label:'Bear'},
  {id:'bunny', emoji:'🐰', label:'Bunny'},
];
let currentChar = 'purin';
let mouthOpenTimer = 0; // for mouth animation on tap
let autoEatFn=null,autoEatTimer=0; // auto-eat system
function startAutoEat(eatFn){autoEatFn=eatFn;autoEatTimer=0}
function stopAutoEat(){autoEatFn=null;autoEatTimer=0}
function updateAutoEat(dt){
  if(!autoEatFn)return;
  autoEatTimer+=dt;
  if(autoEatTimer>=0.45){autoEatTimer=0;autoEatFn()}
}

// =============================================
// CURRENT GAME MODE
// =============================================
let currentMode = 'menu'; // 'menu','dig','burger','icecream','match','wreck'
let wobbleAngle = 0, wobbleVel = 0; // wobbly stack physics

// =============================================
// MENU
// =============================================
function showMenu(){
  currentMode='menu';particles=[];confetti=[];stopAutoEat();
  if(window.speechSynthesis)window.speechSynthesis.cancel();speechBusy=false;
  instruction.textContent='Pick a game!';
  buttonsArea.innerHTML='';
  menuBtnFixed.style.display='none';
  menuGrid.classList.add('active');
  menuGrid.innerHTML='';
  const games=[
    {emoji:'🚜',label:'Dig!',bg:'linear-gradient(180deg,#ffca28,#f9a825)',fn:startDigGame},
    {emoji:'🍔',label:'Burger!',bg:'linear-gradient(180deg,#ffe0b2,#d7a86e)',color:'#5d4037',fn:startBurgerGame},
    {emoji:'🍦',label:'Ice Cream!',bg:'linear-gradient(180deg,#f8bbd0,#f48fb1)',fn:startIceCreamGame},
    {emoji:'🥞',label:'Pancake!',bg:'linear-gradient(180deg,#ffe0b2,#d7a86e)',color:'#5d4037',fn:startPancakeGame},
    {emoji:'🍕',label:'Pizza!',bg:'linear-gradient(180deg,#ff8a65,#e64a19)',fn:startPizzaGame},
    {emoji:'🃏',label:'Match!',bg:'linear-gradient(180deg,#66bb6a,#388e3c)',fn:startMatchGame},
    {emoji:'💥',label:'Smash!',bg:'linear-gradient(180deg,#ff7043,#d84315)',fn:startWreckGame},
  ];
  games.forEach(g=>{
    const card=document.createElement('div');
    card.className='menu-card';card.style.background=g.bg;
    if(g.color)card.style.color=g.color;
    card.innerHTML=`<span class="card-emoji">${g.emoji}</span><span class="card-label">${g.label}</span>`;
    const handler=e=>{e.preventDefault();initAudio();playPop();hideMenu();g.fn()};
    card.addEventListener('click',handler);card.addEventListener('touchstart',handler,{passive:false});
    menuGrid.appendChild(card);
  });
}
function hideMenu(){
  menuGrid.classList.remove('active');menuGrid.innerHTML='';
  menuBtnFixed.style.display='block';
}

function drawMenuBg(){
  // Sky
  const grd=ctx.createLinearGradient(0,0,0,H);grd.addColorStop(0,'#4fc3f7');grd.addColorStop(0.5,'#81d4fa');grd.addColorStop(0.7,'#b3e5fc');grd.addColorStop(1,'#a5d6a7');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  // Sun
  ctx.fillStyle='#ffeb3b';ctx.beginPath();ctx.arc(W*0.85,H*0.1,35,0,Math.PI*2);ctx.fill();
  drawCloud(W*0.1,H*0.08,0.8);drawCloud(W*0.5,H*0.12,0.6);
  // Title
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(28,W*0.06)}px sans-serif`;ctx.textAlign='center';
  ctx.shadowColor='rgba(0,0,0,0.3)';ctx.shadowBlur=8;
  ctx.fillText('🎮 Toddler Games! 🎮',W/2,H*0.35);
  ctx.shadowBlur=0;
  ctx.font=`${Math.max(18,W*0.03)}px sans-serif`;
  ctx.fillText('Pick a game below!',W/2,H*0.43);
}

// =============================================
// EXCAVATOR GAME (preserved from before)
// =============================================
const MAX_SCOOPS=5;
const DIG_MAT={
  sand:{color:'#f9a825',dark:'#e68a00',light:'#ffe082',emoji:'🏖️',label:'Sand'},
  rocks:{color:'#78909c',dark:'#546e7a',light:'#b0bec5',emoji:'🪨',label:'Rocks'},
  water:{color:'#29b6f6',dark:'#0288d1',light:'#81d4fa',emoji:'💧',label:'Water'},
};
const PILES={sand:{xFrac:0.15},rocks:{xFrac:0.40},water:{xFrac:0.65}};
let digState,truckLoad,dumpHoleLayers,pileSizes;
let excX,excTargetX,excStartX,excArmAngle,excStickAngle,excBucketAngle,excBucketMat,excAnimPhase,excAnimTime;
let screenShakeX=0,screenShakeY=0,screenShakeTimer=0;
let excRecoil=0;
let truckX,truckBedAngle,truckBedTargetAngle;
let digTarget,animDuration,animCallback;
let driveTime,driveStartTruckX,driveStartExcX,driveTargetTruckX;
let dumpTime,dumpPhase,dumpParticleTimer;
let dumpDrainProgress=0,dumpStreamTimer=0,dumpTotalToDump=0;
let digGroundY;
let dumpRocks=[],holeRocks=[];

function makeRockVerts(radius){
  const pts=5+Math.floor(Math.random()*3);
  const v=[];
  for(let i=0;i<pts;i++){const a=(i/pts)*Math.PI*2,d=radius*(0.6+Math.random()*0.4);v.push({x:Math.cos(a)*d,y:Math.sin(a)*d})}
  return v;
}
function spawnDumpRock(x,y,targetX){
  const r=W*0.005+Math.random()*W*0.008;
  const cols=['#78909c','#546e7a','#90a4ae','#455a64','#607d8b'];
  dumpRocks.push({x,y,vx:(targetX-x)*0.01+(Math.random()-0.5)*2,vy:-1-Math.random()*3,
    radius:r,rotation:Math.random()*Math.PI*2,rotVel:(Math.random()-0.5)*8,bounceCount:0,
    verts:makeRockVerts(r),color:cols[Math.floor(Math.random()*cols.length)],
    highlight:cols[Math.floor(Math.random()*cols.length)],settled:false,life:1,alpha:1});
}
function updateDumpRocks(dt){
  const gy=digGroundY,holeX=W*0.85,holeHW=W*0.13;
  for(let i=dumpRocks.length-1;i>=0;i--){
    const r=dumpRocks[i];
    if(r.settled){r.life-=dt*0.8;r.alpha=Math.max(0,r.life);if(r.life<=0){dumpRocks.splice(i,1)}continue}
    r.vy+=550*dt;r.x+=r.vx*60*dt;r.y+=r.vy*dt;r.rotation+=r.rotVel*dt;
    // Ground bounce
    if(r.y+r.radius>gy){
      r.y=gy-r.radius;r.vy*=-0.35;r.vx*=0.75;r.rotVel*=0.7;r.bounceCount++;
      if(r.bounceCount<=3)playTone(50+Math.random()*80,0.06,'square',0.08);
      if(r.bounceCount>=5)r.vx+=(holeX-r.x)*0.08;
      if(r.bounceCount>=10||Math.abs(r.vy)<0.5&&Math.abs(r.vx)<0.3){r.settled=true;r.life=0.6}
    }
    // Reached hole
    if(r.x>holeX-holeHW&&r.x<holeX+holeHW&&r.y>gy-15){
      r.settled=true;r.life=0.4;
      spawnParticles(r.x,gy,3,['#78909c','#546e7a'],{vyRange:3,spread:8,maxSize:3});
    }
  }
}
function drawDumpRocks(){
  dumpRocks.forEach(r=>{
    ctx.save();ctx.translate(r.x,r.y);ctx.rotate(r.rotation);ctx.globalAlpha=r.alpha;
    // Rock body
    ctx.fillStyle=r.color;ctx.beginPath();
    r.verts.forEach((v,i)=>{if(i===0)ctx.moveTo(v.x,v.y);else ctx.lineTo(v.x,v.y)});
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=1.5;ctx.stroke();
    // Highlight
    ctx.fillStyle=r.highlight;ctx.globalAlpha=r.alpha*0.35;
    ctx.beginPath();ctx.arc(-r.radius*0.2,-r.radius*0.2,r.radius*0.35,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.restore();
  });
}

function startDigGame(){
  const fromMenu=currentMode!=='dig';
  currentMode='dig';particles=[];confetti=[];dumpRocks=[];
  digState='dig';truckLoad=[];
  if(fromMenu){pileSizes={sand:1,rocks:1,water:1};dumpHoleLayers=[];holeRocks=[]}
  if(!pileSizes)pileSizes={sand:1,rocks:1,water:1};
  if(!dumpHoleLayers)dumpHoleLayers=[];
  excArmAngle=0;excStickAngle=0;excBucketAngle=0;excBucketMat=null;excAnimPhase=0;excAnimTime=0;screenShakeTimer=0;
  truckBedAngle=0;digTarget=null;animCallback=null;
  digGroundY=H*0.55;excX=W*0.08;truckX=W*0.62;
  updateDigButtons();
}

function updateDigButtons(){
  buttonsArea.innerHTML='';
  if(digState==='dig'){

    if(truckLoad.length>=MAX_SCOOPS) instruction.textContent="Full! Let's go!";
    else instruction.textContent=truckLoad.length===0?'Tap to dig!':'Keep digging!';
    const full=truckLoad.length>=MAX_SCOOPS;
    ['sand','rocks','water'].forEach(m=>addBtn(`btn-${m}`,DIG_MAT[m].emoji,DIG_MAT[m].label,()=>{if(digState!=='dig')return;initAudio();digStartDig(m)},full));
    addBtn('btn-go','🚛','GO!',()=>{initAudio();digStartDrive()},truckLoad.length===0);
    const anyLow=pileSizes.sand<0.3||pileSizes.rocks<0.3||pileSizes.water<0.3;
    addBtn('btn-again','🔄','Refill',()=>{initAudio();playPop();pileSizes={sand:1,rocks:1,water:1}},!anyLow);
  }else if(digState==='dump'){

    instruction.textContent='Tap to DUMP!';
    addBtn('btn-dump','⬇️','DUMP!',()=>{initAudio();digDoDump()});
  }else if(digState==='celebrate'){

    instruction.textContent='YAY! 🎉';
    addBtn('btn-again','🔄','Again!',()=>{initAudio();startDigGame()});
  }else{
    // Digging/driving/dumping animation — no buttons, nothing to accidentally tap
    instruction.textContent=digState==='drive'?'Vroom! 🚛💨':'Digging...';
  }
}

// Excavator animation
function digAnimateExcTo(tx,dur,cb){excStartX=excX;excTargetX=tx;animDuration=dur;excAnimTime=0;animCallback=cb;excAnimPhase=1}
function digStartDig(mat){
  digState='digging';digTarget={type:mat,x:W*PILES[mat].xFrac};
  playSound_dig(mat);
  const tx=W*PILES[mat].xFrac-W*0.1,dist=Math.abs(excX-tx);
  digAnimateExcTo(tx,Math.max(0.25,Math.min(0.6,dist/400)),()=>{excAnimPhase=2;excAnimTime=0});
  buttonsArea.innerHTML=''; // clear buttons during dig animation
  instruction.textContent=`Digging ${DIG_MAT[mat].label}!`;
}
function digMoveToTruck(){
  const tx=truckX-W*0.18,dist=Math.abs(excX-tx);
  digAnimateExcTo(tx,Math.max(0.3,Math.min(0.7,dist/400)),()=>{excAnimPhase=5;excAnimTime=0});
}
function digStartDrive(){
  if(truckLoad.length===0)return;digState='drive';driveTime=0;
  driveStartTruckX=truckX;driveStartExcX=excX;driveTargetTruckX=W*0.7;
  playSound_dig('honk');updateDigButtons();
}
function digDoDump(){
  if(digState!=='dump')return;digState='dumping';dumpTime=0;dumpPhase=0;dumpParticleTimer=0;
  truckBedTargetAngle=0.5;playSound_dig('dump');updateDigButtons();
}

function updateDigGame(dt){
  digGroundY=H*0.55;
  // Piles slowly regrow
  ['sand','rocks','water'].forEach(t=>{if(pileSizes[t]<1)pileSizes[t]=Math.min(1,pileSizes[t]+dt*0.04)});
  // Screen shake
  if(screenShakeTimer>0){screenShakeTimer-=dt;screenShakeX=(Math.random()-0.5)*screenShakeTimer*40;screenShakeY=(Math.random()-0.5)*screenShakeTimer*25}else{screenShakeX=0;screenShakeY=0}
  // Excavator recoil spring-back
  if(Math.abs(excRecoil)>0.1){excRecoil*=Math.pow(0.05,dt)}else{excRecoil=0}
  // Excavator movement
  if(excAnimPhase===1){excAnimTime+=dt;const t=Math.min(1,excAnimTime/animDuration);excX=lerp(excStartX,excTargetX,easeInOut(t));if(t>=1){excX=excTargetX;excAnimPhase=0;if(animCallback){const cb=animCallback;animCallback=null;cb()}}}
  // Phase 2: Boom lowers, stick extends down
  else if(excAnimPhase===2){excAnimTime+=dt;const t=Math.min(1,excAnimTime/0.35);
    excArmAngle=lerp(0,0.5,easeInOut(t));excStickAngle=lerp(0,0.7,easeInOut(t));excBucketAngle=lerp(0,0.3,easeInOut(t));
    if(t>=1){excAnimPhase=3;excAnimTime=0}}
  // Phase 3: Bucket curls to scoop — IMPACT! particles + shake
  else if(excAnimPhase===3){excAnimTime+=dt;const t=Math.min(1,excAnimTime/0.25);
    excBucketAngle=lerp(0.3,1.2,easeInOut(t));
    if(t>=0.3&&excAnimTime<0.15+dt*2&&digTarget){
      // Impact! Big particle burst + screen shake + recoil + sound
      screenShakeTimer=0.4;excRecoil=-W*0.012;
      const px=digTarget.x,py=digGroundY;
      const mt=digTarget.type,m=DIG_MAT[mt];
      const cols=mt==='rocks'?['#78909c','#546e7a','#90a4ae','#455a64','#b0bec5']:mt==='water'?[m.color,m.light,'#fff','#81d4fa']:[m.color,m.light,m.dark,'#ffe082'];
      spawnParticles(px,py,mt==='rocks'?40:25,cols,{vyRange:14,spread:35,maxSize:mt==='rocks'?12:6,shape:mt==='rocks'?'square':'circle',gravity:0.35});
      // Extra dirt particles
      spawnParticles(px,py,10,['#8d6e63','#6d4c41','#a1887f'],{vyRange:8,spread:25,maxSize:4});
      // Dust cloud — large, slow, low-alpha
      spawnParticles(px,py,8,['#d7ccc8','#bcaaa4','#a1887f'],{vyRange:4,spread:40,maxSize:18,gravity:0.05});
      // Large debris rocks for rocks material
      if(mt==='rocks'){for(let dr=0;dr<5;dr++){
        const dr_r=W*0.004+Math.random()*W*0.006;
        particles.push({x:px+(Math.random()-0.5)*20,y:py-5,
          vx:(Math.random()-0.5)*6,vy:-3-Math.random()*5,
          size:dr_r,color:cols[Math.floor(Math.random()*cols.length)],
          life:1,decay:0.02,gravity:0.4,shape:'square'});
      }}
      pileSizes[digTarget.type]=Math.max(0.35,pileSizes[digTarget.type]-0.12);
      playSound_dig(digTarget.type);
    }
    if(t>=1){excAnimPhase=4;excAnimTime=0}}
  // Phase 4: Lift up with material
  else if(excAnimPhase===4){excAnimTime+=dt;const t=Math.min(1,excAnimTime/0.4);
    excArmAngle=lerp(0.5,-0.3,easeInOut(t));excStickAngle=lerp(0.7,-0.2,easeInOut(t));excBucketAngle=lerp(1.2,0.4,easeInOut(t));
    excBucketMat=digTarget?digTarget.type:null;
    // Dripping particles while lifting
    if(Math.random()<0.3&&excBucketMat){const m=DIG_MAT[excBucketMat];spawnParticles(excX+W*0.08,digGroundY-W*0.05,2,[m.color,m.dark],{vyRange:2,spread:8,maxSize:3,gravity:0.4})}
    if(t>=1){excAnimPhase=0;excAnimTime=0;digMoveToTruck()}}
  // Phase 5: Drop into truck
  else if(excAnimPhase===5){excAnimTime+=dt;const t=Math.min(1,excAnimTime/0.35);
    excArmAngle=lerp(-0.3,0.15,easeInOut(t));excStickAngle=lerp(-0.2,0.3,easeInOut(t));excBucketAngle=lerp(0.4,1.5,easeInOut(t));
    if(t>=0.5&&excBucketMat){truckLoad.push(excBucketMat);
      playTone(300,0.12,'triangle',0.2);playTone(200,0.15,'square',0.1);
      spawnParticles(truckX,digGroundY-W*0.08,12,[DIG_MAT[excBucketMat].color,DIG_MAT[excBucketMat].light,DIG_MAT[excBucketMat].dark],{vyRange:6,spread:15});
      screenShakeTimer=0.1;excBucketMat=null}
    if(t>=1){excAnimPhase=6;excAnimTime=0}}
  // Phase 6: Return to neutral
  else if(excAnimPhase===6){excAnimTime+=dt;const t=Math.min(1,excAnimTime/0.3);
    excArmAngle=lerp(0.15,0,easeInOut(t));excStickAngle=lerp(0.3,0,easeInOut(t));excBucketAngle=lerp(1.5,0,easeInOut(t));
    if(t>=1){excAnimPhase=0;digState='dig';updateDigButtons()}}
  // Drive
  if(digState==='drive'){driveTime+=dt;const t=Math.min(1,driveTime/1.5);truckX=lerp(driveStartTruckX,driveTargetTruckX,easeInOut(t));excX=lerp(driveStartExcX,-120,easeInOut(t));if(t>=1){truckX=driveTargetTruckX;digState='dump';updateDigButtons()}}
  // Dump
  if(digState==='dumping'){dumpTime+=dt;
    if(dumpPhase===0){// Tilt bed up
      const t=Math.min(1,dumpTime/0.6);truckBedAngle=lerp(0,truckBedTargetAngle,easeInOut(t));
      if(t>=1){truckBedAngle=truckBedTargetAngle;dumpPhase=1;dumpTime=0;dumpDrainProgress=0;dumpTotalToDump=truckLoad.length;dumpStreamTimer=0}}
    else if(dumpPhase===1){// Continuous pour — stream particles from truck to hole
      const pourSpeed=1.8; // full drain in ~totalToDump/pourSpeed seconds
      dumpDrainProgress+=dt*pourSpeed;dumpStreamTimer+=dt;
      // Spawn streaming particles every frame
      const holeX=W*0.85;
      const ds=W*0.002,bedEnd=75*ds;
      // Pour from where bed's open end meets ground level
      const pourX=truckX+bedEnd*Math.cos(truckBedAngle);
      const pourY=digGroundY-ds*5;
      if(truckLoad.length>0){
        const m=truckLoad[truckLoad.length-1],mat=DIG_MAT[m];
        if(m==='rocks'){
          // Spawn rolling rocks
          for(let ri=0;ri<2;ri++){if(Math.random()<0.5)spawnDumpRock(pourX+(Math.random()-0.5)*8,pourY,holeX)}
          // Gravel dust alongside
          if(Math.random()<0.4){const cols=['#78909c','#546e7a','#90a4ae'];
            particles.push({x:pourX+(Math.random()-0.5)*10,y:pourY,vx:(holeX-pourX)*0.012+(Math.random()-0.5)*2,vy:Math.random()*2+1,size:1+Math.random()*2,color:cols[Math.floor(Math.random()*cols.length)],life:1,decay:0.03,gravity:0.35,shape:'square'});}
        }else{
          const cols=[mat.color,mat.dark,mat.light];
          for(let i=0;i<(m==='water'?5:3);i++){
            particles.push({x:pourX+(Math.random()-0.5)*10,y:pourY,
              vx:(holeX-pourX)*0.015+(Math.random()-0.5)*2,
              vy:Math.random()*2+1,
              size:2+Math.random()*4,
              color:cols[Math.floor(Math.random()*cols.length)],
              life:1,decay:0.018+Math.random()*0.01,gravity:0.3,
              shape:m==='water'?'circle':'circle'});
          }
        }
        // Pop a layer when enough has drained
        if(dumpDrainProgress>=1){dumpDrainProgress-=1;
          const popped=truckLoad.pop();dumpHoleLayers.push(popped);
          // Add visual rocks to hole for rock layers
          if(popped==='rocks'){const hx=W*0.85,hw=W*0.13,hh=H*0.15;
            const fillFrac=Math.min(0.85,holeRocks.length/(MAX_SCOOPS*5));
            const fillTop=digGroundY+hh-4-(hh-14)*fillFrac;
            for(let ri=0;ri<5;ri++){const rr=2+Math.random()*4;
              holeRocks.push({x:hx-hw*0.5+Math.random()*hw*1.0,y:fillTop+Math.random()*8,
                radius:rr,verts:makeRockVerts(rr),color:['#78909c','#546e7a','#90a4ae','#455a64','#607d8b'][Math.floor(Math.random()*5)],
                rotation:Math.random()*Math.PI*2});
            }}
          screenShakeTimer=0.08;
          // Sound per material
          if(popped==='rocks')playTone(80+Math.random()*40,0.12,'square',0.15);
          else if(popped==='water')playTone(500+Math.random()*300,0.1,'sine',0.08);
          else playTone(200+Math.random()*100,0.1,'triangle',0.1);
        }
      }
      // Continuous rumble sound
      if(dumpStreamTimer>0.25&&truckLoad.length>0){dumpStreamTimer=0;playTone(60+Math.random()*30,0.2,'triangle',0.08)}
      if(truckLoad.length===0&&dumpDrainProgress>0.3){dumpPhase=2;dumpTime=0}
    }
    else if(dumpPhase===2){// Lower bed back
      const t=Math.min(1,dumpTime/0.4);truckBedAngle=lerp(truckBedTargetAngle,0,easeInOut(t));
      if(t>=1){truckBedAngle=0;digState='celebrate';playJingle();spawnConfetti();updateDigButtons()}}
  }
  updateDumpRocks(dt);updateParticles(dt);updateConfetti();
}

function drawDigGame(){
  digGroundY=H*0.55;
  ctx.save();
  ctx.translate(screenShakeX,screenShakeY);
  // Sky
  let grd=ctx.createLinearGradient(0,0,0,digGroundY);grd.addColorStop(0,'#4fc3f7');grd.addColorStop(0.7,'#81d4fa');grd.addColorStop(1,'#b3e5fc');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,digGroundY);
  ctx.fillStyle='#ffeb3b';ctx.beginPath();ctx.arc(W*0.88,H*0.06,25,0,Math.PI*2);ctx.fill();
  drawCloud(W*0.1,H*0.04,0.7);drawCloud(W*0.5,H*0.07,0.5);
  // Ground
  ctx.fillStyle='#8bc34a';ctx.fillRect(0,digGroundY-6,W,12);
  grd=ctx.createLinearGradient(0,digGroundY+6,0,H);grd.addColorStop(0,'#8d6e63');grd.addColorStop(0.3,'#6d4c41');grd.addColorStop(1,'#4e342e');
  ctx.fillStyle=grd;ctx.fillRect(0,digGroundY+6,W,H-digGroundY);
  // Piles — bigger, spread across width
  Object.keys(PILES).forEach(type=>{
    const xc=W*PILES[type].xFrac,m=DIG_MAT[type],sz=pileSizes[type];
    const bw=W*0.11*sz,bh=W*0.09*sz,py=digGroundY;
    if(type==='sand'){ctx.fillStyle=m.color;ctx.beginPath();ctx.moveTo(xc-bw,py+4);ctx.quadraticCurveTo(xc,py-bh*1.2,xc+bw,py+4);ctx.fill();
      ctx.fillStyle=m.light;ctx.globalAlpha=0.4;ctx.beginPath();ctx.moveTo(xc-bw*0.4,py);ctx.quadraticCurveTo(xc,py-bh*0.8,xc+bw*0.2,py);ctx.fill();ctx.globalAlpha=1}
    else if(type==='rocks'){const rng2=seededRand(77);
      [[-0.35,-0.15,0.34],[0.25,-0.1,0.28],[0,-0.48,0.26],[-0.12,-0.05,0.22],[0.15,-0.32,0.2],[0.05,-0.18,0.18],[-0.25,-0.38,0.16]].forEach(([dx,dy,r])=>{
        const rx=xc+bw*dx,ry=py+bh*dy,rr=bw*r;
        const rockCols=['#546e7a','#5d6d7e','#455a64','#607d8b','#6d7f8b'];
        ctx.fillStyle=rockCols[Math.floor(rng2()*rockCols.length)];
        // Natural stone — rounded polygon with moderate bumps
        const pts=6;const vx2=[],vy2=[];
        for(let p=0;p<pts;p++){const a=(p/pts)*Math.PI*2+(rng2()-0.5)*0.2,d=rr*(0.7+rng2()*0.3);
          vx2.push(rx+Math.cos(a)*d);vy2.push(ry+Math.sin(a)*d)}
        ctx.beginPath();ctx.moveTo((vx2[pts-1]+vx2[0])/2,(vy2[pts-1]+vy2[0])/2);
        for(let p=0;p<pts;p++){const nx=(vx2[p]+vx2[(p+1)%pts])/2,ny=(vy2[p]+vy2[(p+1)%pts])/2;
          ctx.quadraticCurveTo(vx2[p],vy2[p],nx,ny)}
        ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;ctx.stroke();
        // Soft highlight
        ctx.fillStyle=m.light;ctx.globalAlpha=0.2;
        ctx.beginPath();ctx.arc(rx-rr*0.15,ry-rr*0.2,rr*0.3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1})}
    else{ctx.fillStyle=m.color;ctx.globalAlpha=0.7;ctx.beginPath();ctx.ellipse(xc,py+2,bw,bh*0.35,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
      // Waves
      const t=Date.now()/500;ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;
      for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(xc+(i-1)*bw*0.4,py+Math.sin(t+i)*2,bw*0.15,0.2,Math.PI-0.2);ctx.stroke()}}
    ctx.font=`${Math.max(24,W*0.06)}px sans-serif`;ctx.textAlign='center';
    ctx.fillText(DIG_MAT[type].emoji,xc,py-W*0.09-10);
  });
  // Dump hole — bigger
  const hx=W*0.85,hw=W*0.13,hh=H*0.15;
  ctx.fillStyle='#3e2723';ctx.beginPath();ctx.moveTo(hx-hw,digGroundY+6);ctx.lineTo(hx-hw+10,digGroundY+hh);ctx.lineTo(hx+hw-10,digGroundY+hh);ctx.lineTo(hx+hw,digGroundY+6);ctx.closePath();ctx.fill();
  ctx.fillStyle='#7cb342';ctx.beginPath();ctx.ellipse(hx,digGroundY+6,hw+5,10,0,0,Math.PI*2);ctx.fill();
  if(dumpHoleLayers.length>0){const ml=10,lh=(hh-12)/ml,vl=dumpHoleLayers.slice(-ml);
    ctx.save();ctx.beginPath();ctx.moveTo(hx-hw+2,digGroundY+8);ctx.lineTo(hx-hw+12,digGroundY+hh-2);ctx.lineTo(hx+hw-12,digGroundY+hh-2);ctx.lineTo(hx+hw-2,digGroundY+8);ctx.clip();
    // Draw non-rock layers sorted: sand at bottom, water on top
    const nonRock=[];vl.forEach((mat,i)=>{if(mat!=='rocks')nonRock.push({mat,i})});
    nonRock.sort((a,b)=>(a.mat==='water'?1:0)-(b.mat==='water'?1:0));
    nonRock.forEach((nr,di)=>{const ly=digGroundY+hh-(di+1)*lh;drawDigMaterialFill(hx-hw,ly,hw*2,lh+1,nr.mat,5000+nr.i*251)});
    // Draw accumulated rocks as individual boulders
    holeRocks.forEach(r=>{
      ctx.fillStyle=r.color;ctx.beginPath();
      r.verts.forEach((v,i)=>{const vx=r.x+v.x*Math.cos(r.rotation)-v.y*Math.sin(r.rotation),vy=r.y+v.x*Math.sin(r.rotation)+v.y*Math.cos(r.rotation);if(i===0)ctx.moveTo(vx,vy);else ctx.lineTo(vx,vy)});
      ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle='#b0bec5';ctx.globalAlpha=0.3;ctx.beginPath();ctx.arc(r.x-r.radius*0.15,r.y-r.radius*0.2,r.radius*0.3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    });
    ctx.restore()}
  // Excavator
  drawExcavator(excX,digGroundY);
  // Truck
  drawDumpTruck(truckX,digGroundY);
  // Truck indicator — bigger squares
  if(digState==='dig'||digState==='digging'){const bs=W*0.05,gap=W*0.015,tw=MAX_SCOOPS*(bs+gap)-gap,sx=truckX-tw/2,iy=digGroundY-W*0.18;
    for(let i=0;i<MAX_SCOOPS;i++){const bx=sx+i*(bs+gap);ctx.fillStyle=i<truckLoad.length?DIG_MAT[truckLoad[i]].color:'rgba(255,255,255,0.2)';drawRoundRect(bx,iy,bs,bs,4);ctx.fill();ctx.strokeStyle=i<truckLoad.length?DIG_MAT[truckLoad[i]].dark:'rgba(255,255,255,0.15)';ctx.lineWidth=2;ctx.stroke()}
    if(truckLoad.length>=MAX_SCOOPS){ctx.fillStyle='#fff';ctx.font=`bold ${W*0.04}px sans-serif`;ctx.textAlign='center';ctx.fillText('FULL!',truckX,iy-W*0.02)}
  }
  drawDumpRocks();drawParticles(0);drawConfetti();
  ctx.restore(); // screen shake
}

function drawDigMaterialFill(x,y,w,h,matType,seed){
  const m=DIG_MAT[matType],rng=seededRand(seed);ctx.fillStyle=m.color;ctx.fillRect(x,y,w,h);
  if(matType==='rocks'){
    const rc=Math.max(4,Math.floor(w*h/280));const rockCols=['#78909c','#546e7a','#5d6d7e','#455a64','#607d8b'];
    for(let i=0;i<rc;i++){
      const rx=x+rng()*(w-4)+2,ry=y+rng()*(h-2)+1,rr=Math.max(3,Math.min(w,h)*0.15+rng()*Math.min(w,h)*0.18);
      ctx.fillStyle=rockCols[Math.floor(rng()*rockCols.length)];
      // Rounded stone with quadratic curves
      const pts=6;const vxs=[],vys=[];
      for(let p=0;p<pts;p++){const a=(p/pts)*Math.PI*2+(rng()-0.5)*0.2,d=rr*(0.7+rng()*0.3);
        vxs.push(rx+Math.cos(a)*d);vys.push(ry+Math.sin(a)*d)}
      ctx.beginPath();ctx.moveTo((vxs[pts-1]+vxs[0])/2,(vys[pts-1]+vys[0])/2);
      for(let p=0;p<pts;p++){const nx=(vxs[p]+vxs[(p+1)%pts])/2,ny=(vys[p]+vys[(p+1)%pts])/2;
        ctx.quadraticCurveTo(vxs[p],vys[p],nx,ny)}
      ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=0.8;ctx.stroke();
      ctx.fillStyle=m.light;ctx.globalAlpha=0.2;ctx.beginPath();ctx.arc(rx-rr*0.12,ry-rr*0.15,rr*0.25,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    }}
  else if(matType==='water'){const grd2=ctx.createLinearGradient(x,y,x,y+h);grd2.addColorStop(0,m.light);grd2.addColorStop(1,m.dark);ctx.fillStyle=grd2;ctx.globalAlpha=0.8;ctx.fillRect(x,y,w,h);ctx.globalAlpha=1;const t=Date.now()/600;ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1.5;for(let r=0;r<2;r++){ctx.beginPath();const wy=y+h*(0.3+r*0.4);for(let i=0;i<=w;i+=4){const yy=wy+Math.sin(t+i*0.12+r*2+seed)*2;if(i===0)ctx.moveTo(x+i,yy);else ctx.lineTo(x+i,yy)}ctx.stroke()}}
  else{const gc=Math.max(5,Math.floor(w*h/100));for(let i=0;i<gc;i++){ctx.fillStyle=rng()>0.5?m.light:m.dark;ctx.globalAlpha=0.4+rng()*0.3;ctx.beginPath();ctx.arc(x+rng()*w,y+rng()*h,1+rng()*2,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
}

function drawExcavator(x,y){
  const s=W*0.0016;
  const bodyW=75*s,bodyH=35*s,cabW=42*s,cabH=34*s;
  const boomLen=55*s,boomW=12*s;
  const stickLen=50*s,stickW=10*s;
  const bucketW=26*s,bucketH=28*s;

  ctx.save();ctx.translate(x+excRecoil,y);

  // Ground shadow
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath();ctx.ellipse(0,6*s,bodyW*0.7,5*s,0,0,Math.PI*2);ctx.fill();

  // Tracks — single connected undercarriage
  const trackW=bodyW+10*s,trackH=20*s,trackY=0;
  let tg=ctx.createLinearGradient(0,trackY,0,trackY+trackH);
  tg.addColorStop(0,'#3a3a3a');tg.addColorStop(0.3,'#2a2a2a');tg.addColorStop(0.7,'#222');tg.addColorStop(1,'#1a1a1a');
  ctx.fillStyle=tg;
  drawRoundRect(-trackW/2,trackY,trackW,trackH,trackH/2);ctx.fill();
  ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.stroke();
  // Track grouser plates
  ctx.strokeStyle='#484848';ctx.lineWidth=2;
  for(let i=0;i<10;i++){const tx2=-trackW/2+6*s+i*(trackW-12*s)/9;
    ctx.beginPath();ctx.moveTo(tx2,trackY+2);ctx.lineTo(tx2,trackY+trackH-2);ctx.stroke();
    ctx.fillStyle='#3d3d3d';ctx.fillRect(tx2-1,trackY+2,3,trackH-4)}
  // Drive sprockets (large at ends)
  [[-trackW/2+trackH/2,trackH/2],[trackW/2-trackH/2,trackH/2]].forEach(([wx,wy])=>{
    const wr=trackH/2-2;
    let wg=ctx.createRadialGradient(wx-wr*0.2,trackY+wy-wr*0.2,0,wx,trackY+wy,wr);
    wg.addColorStop(0,'#606060');wg.addColorStop(0.5,'#484848');wg.addColorStop(1,'#333');
    ctx.fillStyle=wg;ctx.beginPath();ctx.arc(wx,trackY+wy,wr,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#222';ctx.lineWidth=2;ctx.stroke();
    // Hub
    ctx.fillStyle='#777';ctx.beginPath();ctx.arc(wx,trackY+wy,wr*0.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#555';ctx.beginPath();ctx.arc(wx,trackY+wy,wr*0.15,0,Math.PI*2);ctx.fill();
    // Spokes
    ctx.strokeStyle='#555';ctx.lineWidth=1.5;
    for(let sp=0;sp<6;sp++){const a=sp*Math.PI/3;ctx.beginPath();ctx.moveTo(wx+Math.cos(a)*wr*0.2,trackY+wy+Math.sin(a)*wr*0.2);ctx.lineTo(wx+Math.cos(a)*wr*0.7,trackY+wy+Math.sin(a)*wr*0.7);ctx.stroke()}
  });
  // Rollers
  for(let i=1;i<=3;i++){const rx=-trackW/2+trackH/2+i*(trackW-trackH)/4;
    ctx.fillStyle='#4a4a4a';ctx.beginPath();ctx.arc(rx,trackY+trackH/2,trackH/3.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#666';ctx.beginPath();ctx.arc(rx,trackY+trackH/2,trackH/7,0,Math.PI*2);ctx.fill()}

  // Body (house) — gradient for 3D
  let bg=ctx.createLinearGradient(-bodyW/2,-bodyH,-bodyW/2,0);
  bg.addColorStop(0,'#ffb300');bg.addColorStop(0.3,'#ffa000');bg.addColorStop(0.7,'#ff8f00');bg.addColorStop(1,'#e65100');
  ctx.fillStyle=bg;
  drawRoundRect(-bodyW/2,-bodyH,bodyW,bodyH,8*s);ctx.fill();
  ctx.strokeStyle='#bf360c';ctx.lineWidth=2;ctx.stroke();
  // Panel lines
  ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-bodyW/2+4*s,-bodyH*0.5);ctx.lineTo(bodyW/2-4*s,-bodyH*0.5);ctx.stroke();
  // Vent grille
  ctx.fillStyle='#e65100';
  for(let i=0;i<4;i++){ctx.fillRect(bodyW/2-20*s-i*5*s,-bodyH+8*s,3*s,bodyH-16*s)}
  // Safety stripe
  const stripeY=-4*s;
  ctx.fillStyle='#212121';ctx.fillRect(-bodyW/2+3*s,stripeY,bodyW-6*s,5*s);
  ctx.fillStyle='#ffd600';
  for(let i=0;i<8;i++){ctx.save();ctx.beginPath();ctx.rect(-bodyW/2+3*s,stripeY,bodyW-6*s,5*s);ctx.clip();
    const sx=-bodyW/2+i*12*s;ctx.beginPath();ctx.moveTo(sx,stripeY);ctx.lineTo(sx+6*s,stripeY);ctx.lineTo(sx+3*s,stripeY+5*s);ctx.lineTo(sx-3*s,stripeY+5*s);ctx.closePath();ctx.fill();ctx.restore()}

  // Cabin — gradient
  let cg=ctx.createLinearGradient(-bodyW/2+6*s,-bodyH-cabH+4*s,-bodyW/2+6*s,-bodyH+4*s);
  cg.addColorStop(0,'#ffcc02');cg.addColorStop(0.5,'#ffb300');cg.addColorStop(1,'#ff8f00');
  ctx.fillStyle=cg;
  drawRoundRect(-bodyW/2+6*s,-bodyH-cabH+4*s,cabW,cabH,6*s);ctx.fill();
  ctx.strokeStyle='#e65100';ctx.lineWidth=2;ctx.stroke();
  // Window with sky reflection
  const winX=-bodyW/2+12*s,winY=-bodyH-cabH+10*s,winW=cabW*0.55,winH=cabH*0.5;
  let wg=ctx.createLinearGradient(winX,winY,winX,winY+winH);
  wg.addColorStop(0,'#e1f5fe');wg.addColorStop(0.4,'#81d4fa');wg.addColorStop(1,'#4fc3f7');
  ctx.fillStyle=wg;drawRoundRect(winX,winY,winW,winH,4*s);ctx.fill();
  ctx.strokeStyle='#0277bd';ctx.lineWidth=1.5;ctx.stroke();
  // Window glare
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.beginPath();ctx.moveTo(winX+3*s,winY+2*s);ctx.lineTo(winX+winW*0.4,winY+2*s);ctx.lineTo(winX+winW*0.2,winY+winH*0.4);ctx.lineTo(winX+3*s,winY+winH*0.3);ctx.closePath();ctx.fill();

  // Exhaust pipe with cap
  let eg=ctx.createLinearGradient(-bodyW/2+cabW+10*s,0,-bodyW/2+cabW+15*s,0);
  eg.addColorStop(0,'#555');eg.addColorStop(0.5,'#888');eg.addColorStop(1,'#555');
  ctx.fillStyle=eg;ctx.fillRect(-bodyW/2+cabW+10*s,-bodyH-14*s,5*s,16*s);
  ctx.fillStyle='#666';drawRoundRect(-bodyW/2+cabW+9*s,-bodyH-16*s,7*s,3*s,1.5*s);ctx.fill();
  // Exhaust puff
  if(excAnimPhase>0){const t=Date.now()/300;
    for(let pi=0;pi<3;pi++){ctx.fillStyle=`rgba(180,180,180,${0.25-pi*0.07})`;
      ctx.beginPath();ctx.arc(-bodyW/2+cabW+12*s,-bodyH-18*s-pi*6*s-Math.sin(t+pi)*3,3*s+pi*1.5*s+Math.sin(t*2+pi)*1.5,0,Math.PI*2);ctx.fill()}}

  // === ARTICULATED ARM ===
  const pivotX=bodyW/2-8*s,pivotY=-bodyH-cabH*0.3;

  // BOOM (upper arm) — pivots from cabin
  ctx.save();ctx.translate(pivotX,pivotY);ctx.rotate(excArmAngle);
  // Hydraulic cylinder — chrome look
  let hg=ctx.createLinearGradient(0,-boomW*0.3,0,boomW*0.05);
  hg.addColorStop(0,'#ccc');hg.addColorStop(0.3,'#eee');hg.addColorStop(0.5,'#aaa');hg.addColorStop(1,'#999');
  ctx.fillStyle=hg;ctx.fillRect(8*s,-boomW*0.25,boomLen*0.55,boomW*0.3);
  ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.strokeRect(8*s,-boomW*0.25,boomLen*0.55,boomW*0.3);
  // Boom arm — gradient
  let bmg=ctx.createLinearGradient(0,-boomW/2,0,boomW/2);
  bmg.addColorStop(0,'#ffcc02');bmg.addColorStop(0.3,'#ffb300');bmg.addColorStop(0.7,'#ff8f00');bmg.addColorStop(1,'#e65100');
  ctx.fillStyle=bmg;
  ctx.fillRect(0,-boomW/2,boomLen,boomW);
  ctx.strokeStyle='#bf360c';ctx.lineWidth=2;ctx.strokeRect(0,-boomW/2,boomLen,boomW);

  // STICK (lower arm) — pivots from end of boom
  ctx.save();ctx.translate(boomLen,0);ctx.rotate(excStickAngle);
  // Stick arm — gradient
  let sg=ctx.createLinearGradient(0,-stickW/2,0,stickW/2);
  sg.addColorStop(0,'#ffcc02');sg.addColorStop(0.3,'#ffb300');sg.addColorStop(0.7,'#ff8f00');sg.addColorStop(1,'#e65100');
  ctx.fillStyle=sg;
  ctx.fillRect(0,-stickW/2,stickLen,stickW);
  ctx.strokeStyle='#bf360c';ctx.lineWidth=1.5;ctx.strokeRect(0,-stickW/2,stickLen,stickW);
  // Hydraulic cylinder on stick — chrome
  let hg2=ctx.createLinearGradient(0,stickW*0.1,0,stickW*0.4);
  hg2.addColorStop(0,'#ccc');hg2.addColorStop(0.3,'#eee');hg2.addColorStop(0.5,'#bbb');hg2.addColorStop(1,'#999');
  ctx.fillStyle=hg2;ctx.fillRect(3*s,stickW*0.1,stickLen*0.45,stickW*0.28);

  // BUCKET — curved scoop shape, pivots from end of stick
  ctx.save();ctx.translate(stickLen,0);ctx.rotate(excBucketAngle);
  const bkW=bucketW,bkH=bucketH;
  // Mounting ears/lugs — two plates with pin hole connecting to stick
  ctx.fillStyle='#555';
  ctx.fillRect(-4*s,-10*s,3.5*s,12*s); // left ear
  ctx.fillRect(1*s,-10*s,3.5*s,12*s);  // right ear
  ctx.fillStyle='#777';
  ctx.beginPath();ctx.arc(-2.5*s,-4*s,2.5*s,0,Math.PI*2);ctx.fill(); // left pin hole
  ctx.beginPath();ctx.arc(2.5*s,-4*s,2.5*s,0,Math.PI*2);ctx.fill();  // right pin hole
  ctx.fillStyle='#444';
  ctx.beginPath();ctx.arc(-2.5*s,-4*s,1.2*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(2.5*s,-4*s,1.2*s,0,Math.PI*2);ctx.fill();

  // Back plate — flat, connects mounting ears to the scoop curve
  ctx.fillStyle='#505050';
  ctx.beginPath();
  ctx.moveTo(-bkW*0.3,-6*s);    // top-left of back plate
  ctx.lineTo(bkW*0.3,-6*s);     // top-right
  ctx.lineTo(bkW*0.45,bkH*0.15);// angled out to side plate
  ctx.lineTo(-bkW*0.45,bkH*0.15);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#3a3a3a';ctx.lineWidth=1.5;ctx.stroke();

  // Side plates — tall trapezoidal walls forming the scoop sides
  // Left side plate
  ctx.fillStyle='#484848';
  ctx.beginPath();
  ctx.moveTo(-bkW*0.45,bkH*0.15);
  ctx.lineTo(-bkW*0.5,bkH*0.85);   // widens toward mouth
  ctx.lineTo(-bkW*0.42,bkH);        // bottom corner
  ctx.lineTo(-bkW*0.3,-6*s);        // back to top
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#3a3a3a';ctx.lineWidth=1.5;ctx.stroke();
  // Right side plate
  ctx.fillStyle='#484848';
  ctx.beginPath();
  ctx.moveTo(bkW*0.45,bkH*0.15);
  ctx.lineTo(bkW*0.5,bkH*0.85);
  ctx.lineTo(bkW*0.42,bkH);
  ctx.lineTo(bkW*0.3,-6*s);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#3a3a3a';ctx.lineWidth=1.5;ctx.stroke();

  // Scoop floor — curves from back plate down and forward
  ctx.fillStyle='#555';
  ctx.beginPath();
  ctx.moveTo(-bkW*0.45,bkH*0.15);
  ctx.quadraticCurveTo(-bkW*0.48,bkH*0.6,-bkW*0.42,bkH); // left curve
  ctx.lineTo(bkW*0.42,bkH);                                  // bottom edge
  ctx.quadraticCurveTo(bkW*0.48,bkH*0.6,bkW*0.45,bkH*0.15);// right curve
  ctx.closePath();ctx.fill();
  // Wear plate highlight
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.moveTo(-bkW*0.35,bkH*0.3);
  ctx.quadraticCurveTo(0,bkH*0.2,bkW*0.35,bkH*0.3);
  ctx.quadraticCurveTo(bkW*0.38,bkH*0.5,bkW*0.3,bkH*0.7);
  ctx.lineTo(-bkW*0.3,bkH*0.7);
  ctx.quadraticCurveTo(-bkW*0.38,bkH*0.5,-bkW*0.35,bkH*0.3);
  ctx.fill();

  // Cutting edge — thick reinforced lip at the mouth
  ctx.fillStyle='#666';
  ctx.beginPath();
  ctx.moveTo(-bkW*0.48,bkH-2*s);ctx.lineTo(bkW*0.48,bkH-2*s);
  ctx.lineTo(bkW*0.45,bkH+2*s);ctx.lineTo(-bkW*0.45,bkH+2*s);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.stroke();

  // Teeth — chunky rectangular with pointed tips
  ctx.fillStyle='#777';
  const teethCount=5,teethW=bkW*0.08,teethH=8*s;
  const teethSpan=bkW*0.7;
  for(let i=0;i<teethCount;i++){
    const tx=-teethSpan/2+i*(teethSpan/(teethCount-1));
    // Tooth body — rectangular base
    ctx.fillStyle='#777';
    ctx.fillRect(tx-teethW/2,bkH+1*s,teethW,teethH*0.6);
    // Pointed tip
    ctx.beginPath();
    ctx.moveTo(tx-teethW/2,bkH+1*s+teethH*0.6);
    ctx.lineTo(tx,bkH+1*s+teethH);
    ctx.lineTo(tx+teethW/2,bkH+1*s+teethH*0.6);
    ctx.closePath();ctx.fill();
    // Tooth outline
    ctx.strokeStyle='#555';ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(tx-teethW/2,bkH+1*s);ctx.lineTo(tx-teethW/2,bkH+1*s+teethH*0.6);
    ctx.lineTo(tx,bkH+1*s+teethH);ctx.lineTo(tx+teethW/2,bkH+1*s+teethH*0.6);
    ctx.lineTo(tx+teethW/2,bkH+1*s);ctx.stroke();
  }

  // Material in bucket
  if(excBucketMat){const m=DIG_MAT[excBucketMat];
    ctx.save();
    // Clip to scoop interior
    ctx.beginPath();
    ctx.moveTo(-bkW*0.38,bkH*0.25);
    ctx.quadraticCurveTo(-bkW*0.42,bkH*0.6,-bkW*0.36,bkH-3*s);
    ctx.lineTo(bkW*0.36,bkH-3*s);
    ctx.quadraticCurveTo(bkW*0.42,bkH*0.6,bkW*0.38,bkH*0.25);
    ctx.closePath();ctx.clip();
    // Fill
    ctx.fillStyle=m.color;ctx.fillRect(-bkW/2,bkH*0.2,bkW,bkH);
    if(excBucketMat==='rocks'){
      // Draw boulders in bucket
      const brng=seededRand(42);const rockCols=['#78909c','#546e7a','#5d6d7e','#455a64'];
      for(let bi=0;bi<4;bi++){
        const bx=-bkW*0.3+brng()*bkW*0.6,by=bkH*0.35+brng()*bkH*0.45,br=bkW*0.12+brng()*bkW*0.1;
        ctx.fillStyle=rockCols[Math.floor(brng()*rockCols.length)];
        ctx.beginPath();const pts=5+Math.floor(brng()*2);
        for(let p=0;p<pts;p++){const a=(p/pts)*Math.PI*2,d=br*(0.6+brng()*0.4);if(p===0)ctx.moveTo(bx+Math.cos(a)*d,by+Math.sin(a)*d);else ctx.lineTo(bx+Math.cos(a)*d,by+Math.sin(a)*d)}
        ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;ctx.stroke();
        ctx.fillStyle='#b0bec5';ctx.globalAlpha=0.3;ctx.beginPath();ctx.arc(bx-br*0.2,by-br*0.2,br*0.3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
      }
    }else{
      // Mound heaped above the rim
      ctx.fillStyle=m.dark;ctx.globalAlpha=0.6;
      ctx.beginPath();
      ctx.moveTo(-bkW*0.38,bkH*0.25);
      ctx.quadraticCurveTo(-bkW*0.15,bkH*0.05,0,bkH*0.1);
      ctx.quadraticCurveTo(bkW*0.15,bkH*0.05,bkW*0.38,bkH*0.25);
      ctx.fill();
      ctx.globalAlpha=1;
    }
    ctx.restore()}

  ctx.restore(); // bucket
  ctx.restore(); // stick
  // Joint bolt at boom-stick — chrome pin
  let jg1=ctx.createRadialGradient(boomLen-1*s,-1*s,0,boomLen,0,3.5*s);
  jg1.addColorStop(0,'#eee');jg1.addColorStop(0.5,'#bbb');jg1.addColorStop(1,'#888');
  ctx.fillStyle=jg1;ctx.beginPath();ctx.arc(boomLen,0,3.5*s,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.stroke();
  ctx.restore(); // boom
  // Joint bolt at pivot — chrome pin
  let jg2=ctx.createRadialGradient(pivotX-1*s,pivotY-1*s,0,pivotX,pivotY,4*s);
  jg2.addColorStop(0,'#eee');jg2.addColorStop(0.5,'#bbb');jg2.addColorStop(1,'#888');
  ctx.fillStyle=jg2;ctx.beginPath();ctx.arc(pivotX,pivotY,4*s,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.stroke();

  ctx.restore(); // main
}

function drawDumpTruck(x,y){
  const s=W*0.002,cw=42*s,ch=42*s,bedW=75*s,bedH=45*s,wr=13*s;
  ctx.save();ctx.translate(x,y);

  // Ground shadow
  ctx.fillStyle='rgba(0,0,0,0.12)';
  ctx.beginPath();ctx.ellipse(bedW*0.2,8*s,bedW*0.65,5*s,0,0,Math.PI*2);ctx.fill();

  // Wheels — gradient tires with hubs
  [[-cw*0.3,4*s],[bedW*0.4,4*s]].forEach(([wx,wy])=>{
    let tg=ctx.createRadialGradient(wx-wr*0.2,wy-wr*0.2,0,wx,wy,wr);
    tg.addColorStop(0,'#4a4a4a');tg.addColorStop(0.7,'#333');tg.addColorStop(1,'#222');
    ctx.fillStyle=tg;ctx.beginPath();ctx.arc(wx,wy,wr,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#111';ctx.lineWidth=2.5;ctx.stroke();
    // Tire tread marks
    ctx.strokeStyle='#3a3a3a';ctx.lineWidth=1.5;
    for(let ti=0;ti<8;ti++){const a=ti*Math.PI/4;
      ctx.beginPath();ctx.moveTo(wx+Math.cos(a)*wr*0.75,wy+Math.sin(a)*wr*0.75);
      ctx.lineTo(wx+Math.cos(a)*wr*0.95,wy+Math.sin(a)*wr*0.95);ctx.stroke()}
    // Hub cap — chrome
    let hg=ctx.createRadialGradient(wx-wr*0.08,wy-wr*0.08,0,wx,wy,wr*0.4);
    hg.addColorStop(0,'#eee');hg.addColorStop(0.5,'#bbb');hg.addColorStop(1,'#888');
    ctx.fillStyle=hg;ctx.beginPath();ctx.arc(wx,wy,wr*0.35,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.stroke();
    // Lug nuts
    for(let li=0;li<5;li++){const a=li*Math.PI*2/5;ctx.fillStyle='#777';ctx.beginPath();ctx.arc(wx+Math.cos(a)*wr*0.2,wy+Math.sin(a)*wr*0.2,1.5*s,0,Math.PI*2);ctx.fill()}
  });

  // Cab — gradient
  let cg=ctx.createLinearGradient(-cw-2*s,-ch,-cw-2*s,0);
  cg.addColorStop(0,'#ef5350');cg.addColorStop(0.4,'#e53935');cg.addColorStop(0.7,'#d32f2f');cg.addColorStop(1,'#c62828');
  ctx.fillStyle=cg;drawRoundRect(-cw-2*s,-ch,cw,ch,6*s);ctx.fill();
  ctx.strokeStyle='#b71c1c';ctx.lineWidth=2.5;ctx.stroke();
  // Cab panel line
  ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-cw+2*s,-ch*0.3);ctx.lineTo(-4*s,-ch*0.3);ctx.stroke();
  // Door handle
  ctx.fillStyle='#bbb';ctx.fillRect(-cw*0.4,-ch*0.4,6*s,2*s);
  // Window — sky reflection
  let wg=ctx.createLinearGradient(0,-ch+6*s,0,-ch+6*s+ch*0.5);
  wg.addColorStop(0,'#e1f5fe');wg.addColorStop(0.4,'#81d4fa');wg.addColorStop(1,'#4fc3f7');
  ctx.fillStyle=wg;drawRoundRect(-cw+4*s,-ch+6*s,cw*0.6,ch*0.5,4*s);ctx.fill();
  ctx.strokeStyle='#0277bd';ctx.lineWidth=1.5;ctx.stroke();
  // Window glare
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.beginPath();ctx.moveTo(-cw+6*s,-ch+8*s);ctx.lineTo(-cw+cw*0.35,-ch+8*s);ctx.lineTo(-cw+cw*0.2,-ch+6*s+ch*0.25);ctx.lineTo(-cw+6*s,-ch+6*s+ch*0.2);ctx.closePath();ctx.fill();
  // Headlight
  let hlg=ctx.createRadialGradient(-cw-1*s,-ch*0.6,0,-cw-1*s,-ch*0.6,4*s);
  hlg.addColorStop(0,'#fff9c4');hlg.addColorStop(0.5,'#ffee58');hlg.addColorStop(1,'#fbc02d');
  ctx.fillStyle=hlg;ctx.beginPath();ctx.arc(-cw-1*s,-ch*0.6,4*s,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#f57f17';ctx.lineWidth=1;ctx.stroke();
  // Bed — pivots at left (cab side), right end tilts up
  ctx.save();ctx.rotate(truckBedAngle);
  // Bed body — gradient
  let bdg=ctx.createLinearGradient(0,-bedH,0,0);
  bdg.addColorStop(0,'#e53935');bdg.addColorStop(0.3,'#d32f2f');bdg.addColorStop(0.7,'#c62828');bdg.addColorStop(1,'#b71c1c');
  ctx.fillStyle=bdg;ctx.fillRect(-2*s,-bedH,bedW,bedH);
  ctx.strokeStyle='#8e0000';ctx.lineWidth=2.5;ctx.strokeRect(-2*s,-bedH,bedW,bedH);
  // Bed side ribs
  ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=1.5;
  for(let ri=0;ri<3;ri++){const rx=-2*s+12*s+ri*(bedW-24*s)/2;
    ctx.beginPath();ctx.moveTo(rx,-bedH+3*s);ctx.lineTo(rx,-3*s);ctx.stroke()}
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(-2*s,-bedH,bedW,3*s);
  // Reinforced front wall (cab side)
  let fwg=ctx.createLinearGradient(-2*s,0,6*s,0);
  fwg.addColorStop(0,'#c62828');fwg.addColorStop(0.5,'#b71c1c');fwg.addColorStop(1,'#a31515');
  ctx.fillStyle=fwg;ctx.fillRect(-2*s,-bedH,8*s,bedH);
  ctx.strokeStyle='#8e0000';ctx.lineWidth=1;ctx.strokeRect(-2*s,-bedH,8*s,bedH);
  // Hydraulic ram
  let hrg=ctx.createLinearGradient(0,-bedH*0.3,0,-bedH*0.3+5*s);
  hrg.addColorStop(0,'#ddd');hrg.addColorStop(0.3,'#fff');hrg.addColorStop(0.7,'#bbb');hrg.addColorStop(1,'#999');
  ctx.fillStyle=hrg;ctx.fillRect(10*s,-bedH*0.3,bedW*0.2,4*s);
  ctx.strokeStyle='#888';ctx.lineWidth=0.5;ctx.strokeRect(10*s,-bedH*0.3,bedW*0.2,4*s);
  // Tailgate — hinges at BOTTOM of right wall, drops open
  ctx.save();
  ctx.translate(bedW-2*s,0); // hinge at bottom-right
  if(truckBedAngle>0.1){
    const gateAngle=Math.min(1.2,truckBedAngle*2.5);
    ctx.rotate(gateAngle); // swings top outward (clockwise from bottom hinge)
  }
  let gtg=ctx.createLinearGradient(-4*s,-bedH,2*s,-bedH);
  gtg.addColorStop(0,'#c62828');gtg.addColorStop(0.5,'#b71c1c');gtg.addColorStop(1,'#a31515');
  ctx.fillStyle=gtg;ctx.fillRect(-4*s,-bedH,6*s,bedH); // extends UPWARD from hinge
  ctx.strokeStyle='#8e0000';ctx.lineWidth=1.5;ctx.strokeRect(-4*s,-bedH,6*s,bedH);
  // Hinge bolts at bottom
  ctx.fillStyle='#aaa';ctx.beginPath();ctx.arc(-1*s,-3*s,2*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#888';ctx.beginPath();ctx.arc(-1*s,-3*s,1*s,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Load inside bed — sorted: rocks bottom, sand middle, water top
  if(truckLoad.length>0){const lh=(bedH-4*s)/MAX_SCOOPS;
    ctx.save();ctx.beginPath();ctx.rect(6*s,-bedH+2*s,bedW-14*s,bedH-4*s);ctx.clip();
    const wt={rocks:0,sand:1,water:2};
    const sorted=[...truckLoad].map((mat,i)=>({mat,i})).sort((a,b)=>wt[a.mat]-wt[b.mat]);
    sorted.forEach((s2,di)=>{drawDigMaterialFill(6*s,-4*s-(di+1)*lh,bedW-14*s,lh,s2.mat,1000+s2.i*137)});
    ctx.restore()}
  ctx.restore();ctx.restore();
}

function playSound_dig(type){
  if(!audioCtx)return;
  if(type==='sand'){
    // Satisfying scoop swoosh + thud
    playTone(300,0.15,'triangle',0.25);playTone(100,0.2,'sine',0.3);
    setTimeout(()=>{playTone(500,0.2,'sine',0.15);playTone(200,0.15,'triangle',0.1)},60);
  }else if(type==='rocks'){
    // Crunchy impact — multiple sharp hits
    playTone(80,0.15,'square',0.3);
    for(let i=0;i<4;i++)setTimeout(()=>playTone(100+Math.random()*120,0.12,'square',0.2),40+i*50);
    setTimeout(()=>playTone(60,0.2,'triangle',0.2),30); // bass thud
  }else if(type==='water'){
    // Big splash
    playTone(800,0.08,'sine',0.2);playTone(600,0.4,'sine',0.15);
    for(let i=0;i<6;i++)setTimeout(()=>playTone(400+Math.random()*600,0.1,'sine',0.08),50+i*60);
    setTimeout(()=>playTone(200,0.3,'triangle',0.1),80);
  }else if(type==='honk'){
    playTone(280,0.25,'square',0.15);setTimeout(()=>playTone(350,0.25,'square',0.15),250);
  }else if(type==='dump'){
    for(let i=0;i<10;i++)setTimeout(()=>{playTone(60+Math.random()*50,0.12,'triangle',0.18);playTone(100+Math.random()*60,0.08,'square',0.05)},i*80);
  }
}

// =============================================
// HAMBURGER GAME
// =============================================
const BURGER_ITEMS = [
  {id:'patty',  emoji:'🥩', label:'Patty',   color:'#6d4c41', dark:'#4e342e', h:26, shape:'patty',  pitch:150, react:'💪'},
  {id:'cheese', emoji:'🧀', label:'Cheese',  color:'#ffca28', dark:'#f9a825', h:14, shape:'cheese', pitch:250, react:'❤️'},
  {id:'lettuce',emoji:'🥬', label:'Lettuce', color:'#66bb6a', dark:'#43a047', h:18, shape:'lettuce',pitch:300, react:'🥗'},
  {id:'tomato', emoji:'🍅', label:'Tomato',  color:'#ef5350', dark:'#c62828', h:16, shape:'tomato', pitch:280, react:'😊'},
  {id:'onion',  emoji:'🧅', label:'Onion',   color:'#e0c8ff', dark:'#b39ddb', h:12, shape:'onion',  pitch:180, react:'😭'},
  {id:'bacon',  emoji:'🥓', label:'Bacon',   color:'#d84315', dark:'#bf360c', h:12, shape:'bacon',  pitch:200, react:'🤩'},
  {id:'bread',  emoji:'🍞', label:'Bread',   color:'#d7a86e', dark:'#c49556', h:20, shape:'bread',  pitch:220, react:'😋'},
];
let burgerStack, burgerState, burgerCustomerX, burgerCustomerPhase, burgerEatTimer, burgerBounceTimer;
let burgerCamY, burgerEatCount, burgerTotalLayers;

function startBurgerGame(){
  currentMode='burger';particles=[];confetti=[];
  burgerStack=['bun_bottom'];burgerState='building';burgerCustomerX=W+80;burgerCustomerPhase=0;burgerEatTimer=0;burgerBounceTimer=0;
  burgerCamY=0;burgerEatCount=0;burgerTotalLayers=0;
  updateBurgerButtons();
}

function updateBurgerButtons(){
  buttonsArea.innerHTML='';
  if(burgerState==='building'){

    instruction.textContent=burgerStack.length<=1?'Build a burger!':'Keep stacking!';
    BURGER_ITEMS.forEach(item=>addBtn('btn-food',item.emoji,item.label,()=>{initAudio();addBurgerItem(item.id)}));
    addBtn('btn-done','🍞','Done!',()=>{initAudio();finishBurger()},burgerStack.length<=1);
  }else if(burgerState==='pick_char'){

    instruction.textContent='Who eats it?';
    CHARACTERS.forEach(c=>addBtn('btn-char',c.emoji,c.label,()=>{initAudio();currentChar=c.id;playPop();burgerState='customer_walking';burgerCustomerX=W+80;updateBurgerButtons()}));
  }else if(burgerState==='eating'){

    instruction.textContent='Tap NOM!';
    addBtn('btn-nom','😋','NOM!',()=>{initAudio();stopAutoEat();burgerDoEat()});
    addBtn('btn-go','🍽️','Auto',()=>{initAudio();startAutoEat(()=>burgerDoEat())});
  }else if(burgerState==='done'){

    instruction.textContent='Delicious! 🎉';
    addBtn('btn-again','🔄','Again!',()=>{initAudio();startBurgerGame()});
  }else{
    // customer_walking — no buttons
    instruction.textContent='Here they come!';
  }
}

function addBurgerItem(id){
  burgerStack.push(id);burgerBounceTimer=0.3;
  wobbleVel+=(Math.random()-0.5)*0.08;
  const item=BURGER_ITEMS.find(b=>b.id===id);
  // Unique placement sound per item
  if(id==='patty')playSplat();
  else if(id==='cheese'){playTone(500,0.12,'sine',0.15);playTone(600,0.1,'sine',0.1)}
  else if(id==='lettuce'){playTone(800,0.08,'sine',0.1);playTone(700,0.06,'sine',0.08)}
  else if(id==='bacon'){playTone(300,0.1,'sawtooth',0.1);playTone(200,0.08,'square',0.08)}
  else playPop();
  // Say the item name
  sayWord(item?item.label:id);
  const totalH=getBurgerHeight();
  const visibleH=H*0.7-30; // counter top to top of screen
  burgerCamY=Math.max(0,totalH-visibleH+60);
  spawnParticles(W*0.35,H*0.7-15-totalH,8,['#ffca28','#ff9800','#66bb6a','#ef5350'],{vyRange:5,spread:30});
  updateBurgerButtons();
}

function finishBurger(){
  burgerStack.push('bun_top');burgerState='pick_char';burgerBounceTimer=0.3;
  burgerTotalLayers=burgerStack.length;burgerEatCount=0;
  playSplat();updateBurgerButtons();
}

function burgerDoEat(){
  if(burgerState!=='eating'||burgerStack.length===0||mouthOpenTimer>0.15)return;
  burgerCustomerPhase++;burgerEatCount++;mouthOpenTimer=0.3;
  const removed=burgerStack.pop();
  const item=BURGER_ITEMS.find(b=>b.id===removed);
  playChomp(item?item.pitch:200);
  // Flying food from stack top to character mouth
  const foodEmoji=item?item.emoji:(removed==='bun_top'?'🍞':'🍞');
  const mouthY=H*0.7-45*1.7; // character mouth position (scaled)
  spawnFlyingFood(W*0.35,H*0.55,burgerCustomerX,mouthY,foodEmoji,item?item.color:null);
  spawnParticles(W*0.35,H*0.55,6,item?[item.color,item.dark]:['#d7a86e','#c49556'],{vyRange:4,spread:20});
  if(item&&item.react)spawnFloatingEmoji(burgerCustomerX,H*0.7-80,item.react);
  else spawnFloatingEmoji(burgerCustomerX,H*0.7-80,'😋');
  if(burgerStack.length===0){stopAutoEat();burgerState='done';playJingle();spawnConfetti();sayNumber(burgerEatCount);setTimeout(()=>playTaDa(),600);updateBurgerButtons()}
}

function getBurgerHeight(){
  let h=35; // bun bottom
  burgerStack.forEach(id=>{if(id==='bun_bottom')return;if(id==='bun_top'){h+=55;return}const item=BURGER_ITEMS.find(b=>b.id===id);if(item)h+=item.h});
  return h;
}

function updateBurgerGame(dt){
  updateAutoEat(dt);
  if(burgerBounceTimer>0)burgerBounceTimer=Math.max(0,burgerBounceTimer-dt);
  // Wobbly stack physics
  wobbleVel+=-wobbleAngle*2.5*dt; // spring
  wobbleVel*=0.95; // damping
  wobbleAngle+=wobbleVel;
  if(burgerState==='customer_walking'){
    burgerCustomerX=lerp(burgerCustomerX,W*0.72,dt*4);
    if(Math.abs(burgerCustomerX-W*0.72)<5){burgerCustomerX=W*0.72;burgerState='eating';burgerEatTimer=0;burgerCustomerPhase=0;updateBurgerButtons()}
  }
  if(mouthOpenTimer>0)mouthOpenTimer=Math.max(0,mouthOpenTimer-dt);
  updateParticles(dt);updateConfetti();updateFloatingEmojis(dt);updateFlyingFoods(dt);
}

function drawBurgerGame(){
  // Background — kitchen
  ctx.fillStyle='#fff9c4';ctx.fillRect(0,0,W,H);
  // Checkerboard floor
  const floorY=H*0.7;
  ctx.fillStyle='#ffe0b2';ctx.fillRect(0,floorY,W,H-floorY);
  const ts=30;for(let x=0;x<W;x+=ts)for(let y=floorY;y<H;y+=ts){if((Math.floor(x/ts)+Math.floor(y/ts))%2===0){ctx.fillStyle='#ffcc80';ctx.fillRect(x,y,ts,ts)}}
  // Counter
  ctx.fillStyle='#8d6e63';ctx.fillRect(0,floorY-8,W,12);
  ctx.fillStyle='#a1887f';ctx.fillRect(0,floorY-8,W,4);
  // Plate
  const plateX=W*0.35,plateY=floorY-8;
  ctx.fillStyle='#f5f5f5';ctx.beginPath();ctx.ellipse(plateX,plateY,W*0.15,12,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#e0e0e0';ctx.lineWidth=2;ctx.stroke();

  // Draw burger stack — bun stays on plate, camera shifts down to keep top visible
  const stackX=plateX;
  const bunBase=plateY-15;
  const totalBH=getBurgerHeight();
  const topBY=bunBase-totalBH;
  const minVisB=50;
  const camShiftB=Math.max(0,minVisB-topBY);

  ctx.save();
  ctx.translate(0,camShiftB);
  // Wobble pivot at base
  ctx.translate(stackX,bunBase);
  ctx.rotate(wobbleAngle*(burgerStack.length*0.03)); // more wobble when taller
  ctx.translate(-stackX,-bunBase);
  let curY=bunBase;
  const bounce=burgerBounceTimer>0?Math.sin(burgerBounceTimer*20)*3:0;

  burgerStack.forEach((id,idx)=>{
    const isTop=idx===burgerStack.length-1;
    const layerWobble=wobbleAngle*idx*0.3; // each layer wobbles more
    const bY=curY+(isTop?bounce:0);
    const bX=stackX+layerWobble;
    if(id==='bun_bottom'){drawBunBottom(bX,bY);curY-=35}
    else if(id==='bun_top'){drawBunTop(bX,bY);curY-=55}
    else{
      const item=BURGER_ITEMS.find(b=>b.id===id);
      if(item){drawBurgerLayer(bX,bY,item);curY-=item.h}
    }
  });
  ctx.restore();

  // Customer
  if(burgerState==='customer_walking'||burgerState==='eating'||burgerState==='done'){
    drawCustomer(burgerCustomerX,floorY,mouthOpenTimer>0);
  }
  // Eat counter
  if((burgerState==='eating'||burgerState==='done')&&burgerEatCount>0){
    drawEatCounter(burgerEatCount,burgerTotalLayers);
  }

  drawParticles(0);drawConfetti();drawFloatingEmojis();drawFlyingFoods();
}

function drawBunBottom(x,y){
  ctx.fillStyle='#d7a86e';
  ctx.beginPath();ctx.moveTo(x-75,y);ctx.lineTo(x-68,y-28);ctx.quadraticCurveTo(x,y-38,x+68,y-28);ctx.lineTo(x+75,y);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#c49556';ctx.lineWidth=2.5;ctx.stroke();
}
function drawBunTop(x,y){
  ctx.fillStyle='#d7a86e';
  ctx.beginPath();ctx.moveTo(x-72,y);ctx.quadraticCurveTo(x-72,y-50,x,y-60);ctx.quadraticCurveTo(x+72,y-50,x+72,y);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#c49556';ctx.lineWidth=2.5;ctx.stroke();
  // Sesame seeds
  ctx.fillStyle='#fff9c4';
  [[-30,-32],[0,-45],[28,-35],[15,-25],[-18,-22],[35,-20],[-35,-25]].forEach(([dx,dy])=>{
    ctx.beginPath();ctx.ellipse(x+dx,y+dy,5,3,dx*0.05,0,Math.PI*2);ctx.fill()});
}
function drawBurgerLayer(x,y,item){
  const hw=70; // half width
  ctx.fillStyle=item.color;
  if(item.shape==='patty'){
    drawRoundRect(x-hw,y-item.h,hw*2,item.h,6);ctx.fill();
    ctx.strokeStyle=item.dark;ctx.lineWidth=2;ctx.stroke();
    // Grill marks
    ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=2;
    for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(x-30+i*20,y-item.h+3);ctx.lineTo(x-30+i*20+15,y-3);ctx.stroke()}
  }else if(item.shape==='cheese'){
    ctx.beginPath();ctx.moveTo(x-hw-5,y);ctx.lineTo(x-hw,y-item.h);ctx.lineTo(x+hw,y-item.h);ctx.lineTo(x+hw+5,y);
    // Drippy edges
    ctx.lineTo(x+hw+2,y+8);ctx.lineTo(x+hw-5,y);ctx.lineTo(x+hw-15,y+5);ctx.lineTo(x+hw-25,y);
    ctx.closePath();ctx.fill();ctx.strokeStyle=item.dark;ctx.lineWidth=1.5;ctx.stroke();
  }else if(item.shape==='lettuce'){
    ctx.beginPath();ctx.moveTo(x-hw-3,y);
    // Wavy top
    for(let i=0;i<=8;i++){const lx=x-hw+i*(hw*2/8);ctx.quadraticCurveTo(lx+hw/8,y-item.h-(i%2?6:0),lx+hw*2/8,y-item.h+2)}
    ctx.lineTo(x+hw+3,y);ctx.closePath();ctx.fill();
    ctx.strokeStyle=item.dark;ctx.lineWidth=1.5;ctx.stroke();
  }else if(item.shape==='tomato'){
    drawRoundRect(x-hw,y-item.h,hw*2,item.h,3);ctx.fill();
    ctx.strokeStyle=item.dark;ctx.lineWidth=1.5;ctx.stroke();
    // Seeds
    ctx.fillStyle='rgba(255,255,200,0.4)';
    for(let i=-2;i<=2;i++){ctx.beginPath();ctx.ellipse(x+i*16,y-item.h/2,2,3,0,0,Math.PI*2);ctx.fill()}
  }else if(item.shape==='onion'){
    drawRoundRect(x-hw+5,y-item.h,hw*2-10,item.h,2);ctx.fill();
    ctx.strokeStyle=item.dark;ctx.lineWidth=1;ctx.stroke();
    // Rings
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5;
    for(let i=0;i<4;i++){ctx.beginPath();ctx.arc(x-30+i*20,y-item.h/2,6,0,Math.PI*2);ctx.stroke()}
  }else if(item.shape==='bacon'){
    ctx.beginPath();ctx.moveTo(x-hw,y);
    // Wavy bacon strip
    for(let i=0;i<=6;i++){const bx=x-hw+i*(hw*2/6);ctx.quadraticCurveTo(bx+hw/6,y-item.h-(i%2?5:-2),bx+hw*2/6,y-item.h+1)}
    ctx.lineTo(x+hw,y);ctx.closePath();ctx.fill();
    ctx.strokeStyle=item.dark;ctx.lineWidth=1.5;ctx.stroke();
    // Fat streaks
    ctx.strokeStyle='rgba(255,200,150,0.5)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(x-30,y-2);ctx.lineTo(x-10,y-item.h+2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+10,y-2);ctx.lineTo(x+30,y-item.h+2);ctx.stroke();
  }else if(item.shape==='bread'){
    // Mid-bun like a Big Mac
    drawRoundRect(x-hw,y-item.h,hw*2,item.h,5);ctx.fill();
    ctx.strokeStyle=item.dark;ctx.lineWidth=2;ctx.stroke();
    // Slight shine on top
    ctx.fillStyle='rgba(255,255,255,0.2)';
    drawRoundRect(x-hw+6,y-item.h+2,hw*2-12,4,2);ctx.fill();
  }
}

const ICE_FLAVORS = [
  {id:'vanilla',   emoji:'🍨', label:'Vanilla',   color:'#fff9c4', dark:'#fff176', h:35, outline:'#f0e68c'},
  {id:'chocolate', emoji:'🍫', label:'Choco',     color:'#795548', dark:'#5d4037', h:35, outline:'#6d4c41'},
  {id:'strawberry',emoji:'🍓', label:'Berry',     color:'#f48fb1', dark:'#ec407a', h:35, outline:'#e91e63'},
  {id:'mint',      emoji:'🌿', label:'Mint',      color:'#a5d6a7', dark:'#66bb6a', h:35, outline:'#4caf50'},
  {id:'blueberry', emoji:'🫐', label:'Blue',      color:'#90caf9', dark:'#42a5f5', h:35, outline:'#1e88e5'},
];
const ICE_TOPPINGS = [
  {id:'sprinkles', emoji:'✨', label:'Sprinkle',color:'rainbow', h:0},
  {id:'cherry',    emoji:'🍒', label:'Cherry',  color:'#c62828', h:15},
];
let iceStack, iceState, iceCustomerX, iceCustomerPhase, iceEatTimer, iceBounceTimer, iceCamY, iceEatCount, iceTotalLayers;
let iceSprinkleSeeds; // so sprinkles stay consistent

function startIceCreamGame(){
  currentMode='icecream';particles=[];confetti=[];
  iceStack=['cone'];iceState='building';iceCustomerX=W+80;iceEatTimer=0;iceBounceTimer=0;
  iceCamY=0;iceSprinkleSeeds=[];iceEatCount=0;iceTotalLayers=0;
  updateIceButtons();
}

function updateIceButtons(){
  buttonsArea.innerHTML='';
  if(iceState==='building'){

    instruction.textContent=iceStack.length<=1?'Build ice cream!':'Add more!';
    ICE_FLAVORS.forEach(f=>addBtn('btn-icecream',f.emoji,f.label,()=>{initAudio();addIceItem(f.id)}));
    const hasScoops=iceStack.some(id=>id!=='cone'&&id!=='sprinkles'&&id!=='cherry');
    const lastIsSprinkles=iceStack[iceStack.length-1]==='sprinkles';
    ICE_TOPPINGS.forEach(t=>{
      const dis=!hasScoops||(t.id==='sprinkles'&&lastIsSprinkles);
      addBtn('btn-food',t.emoji,t.label,()=>{initAudio();addIceItem(t.id)},dis);
    });
    addBtn('btn-done','✅','Done!',()=>{initAudio();finishIceCream()},iceStack.length<=1);
  }else if(iceState==='pick_char'){

    instruction.textContent='Who eats it?';
    CHARACTERS.forEach(c=>addBtn('btn-char',c.emoji,c.label,()=>{initAudio();currentChar=c.id;playPop();iceState='customer_walking';iceCustomerX=W+80;updateIceButtons()}));
  }else if(iceState==='eating'){

    instruction.textContent='Tap NOM!';
    addBtn('btn-nom','😋','NOM!',()=>{initAudio();stopAutoEat();iceDoEat()});
    addBtn('btn-go','🍽️','Auto',()=>{initAudio();startAutoEat(()=>iceDoEat())});
  }else if(iceState==='done'){

    instruction.textContent='Yummy! 🎉';addBtn('btn-again','🔄','Again!',()=>{initAudio();startIceCreamGame()});
  }else{
    // customer_walking — no buttons
    instruction.textContent='Here they come!';
  }
}

function addIceItem(id){
  iceStack.push(id);iceBounceTimer=0.3;wobbleVel+=(Math.random()-0.5)*0.08;
  if(id==='sprinkles')iceSprinkleSeeds.push(Math.floor(Math.random()*10000));
  // Placement sound
  if(id==='sprinkles'){for(let i=0;i<4;i++)setTimeout(()=>playTone(600+Math.random()*400,0.05,'sine',0.08),i*40)}
  else if(id==='cherry'){playTone(800,0.1,'sine',0.15);setTimeout(()=>playTone(1000,0.08,'sine',0.1),80)}
  else playPop();
  // Say item name
  const flav=ICE_FLAVORS.find(f=>f.id===id);
  sayWord(flav?flav.label:id);
  const totalH=getIceHeight();
  const visH=H*0.7-30;
  iceCamY=Math.max(0,totalH-visH+60);
  const cols=id==='sprinkles'?['#f44336','#4caf50','#2196f3','#ffeb3b','#e91e63']:id==='cherry'?['#c62828','#e53935']:(ICE_FLAVORS.find(f=>f.id===id)||{color:'#fff',dark:'#eee'});
  spawnParticles(W*0.35,H*0.7-10-totalH,10,Array.isArray(cols)?cols:[cols.color,cols.dark],{vyRange:5,spread:30});
  updateIceButtons();
}

function finishIceCream(){
  iceState='pick_char';iceBounceTimer=0.3;
  iceTotalLayers=iceStack.length-1;iceEatCount=0;
  playSplat();updateIceButtons();
}

const ICE_REACTS={vanilla:'😊',chocolate:'🤎',strawberry:'❤️',mint:'💚',blueberry:'💙',sprinkles:'🌈',cherry:'🍒'};
function iceDoEat(){
  if(iceState!=='eating'||iceStack.length<=1||mouthOpenTimer>0.15)return;
  iceEatCount++;mouthOpenTimer=0.3;
  const removed=iceStack.pop();
  if(removed==='sprinkles')iceSprinkleSeeds.pop();
  const flav=ICE_FLAVORS.find(f=>f.id===removed);
  const pitches={vanilla:400,chocolate:300,strawberry:450,mint:500,blueberry:350,sprinkles:600,cherry:550};
  playSlurp(pitches[removed]||400);
  // Flying food from stack top to character mouth
  const foodEmoji=flav?flav.emoji:(removed==='sprinkles'?'✨':'🍒');
  const mouthY=H*0.7-45*1.7;
  spawnFlyingFood(W*0.35,H*0.5,iceCustomerX,mouthY,foodEmoji,flav?flav.color:null);
  spawnParticles(W*0.35,H*0.5,8,flav?[flav.color,flav.dark]:['#fff','#f8bbd0'],{vyRange:4,spread:25});
  spawnFloatingEmoji(iceCustomerX,H*0.7-80,ICE_REACTS[removed]||'😋');
  if(iceStack.length<=1){stopAutoEat();iceState='done';playJingle();spawnConfetti();sayNumber(iceEatCount);setTimeout(()=>playTaDa(),600);updateIceButtons()}
}

function getIceHeight(){
  let h=90; // cone
  iceStack.forEach(id=>{if(id==='cone')return;if(id==='sprinkles')return;if(id==='cherry'){h+=20;return}h+=42});
  return h;
}

function updateIceCreamGame(dt){
  updateAutoEat(dt);
  if(iceBounceTimer>0)iceBounceTimer=Math.max(0,iceBounceTimer-dt);
  wobbleVel+=-wobbleAngle*2.5*dt;wobbleVel*=0.95;wobbleAngle+=wobbleVel;
  if(iceState==='customer_walking'){
    iceCustomerX=lerp(iceCustomerX,W*0.72,dt*4);
    if(Math.abs(iceCustomerX-W*0.72)<5){iceCustomerX=W*0.72;iceState='eating';iceEatTimer=0;updateIceButtons()}
  }
  if(mouthOpenTimer>0)mouthOpenTimer=Math.max(0,mouthOpenTimer-dt);
  updateParticles(dt);updateConfetti();updateFloatingEmojis(dt);updateFlyingFoods(dt);
}

function drawIceCreamGame(){
  // Background — ice cream shop
  const grd=ctx.createLinearGradient(0,0,0,H);grd.addColorStop(0,'#fce4ec');grd.addColorStop(0.5,'#f8bbd0');grd.addColorStop(1,'#f48fb1');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  // Striped wall
  for(let i=0;i<W;i+=40){ctx.fillStyle=i%80===0?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.02)';ctx.fillRect(i,0,20,H*0.7)}
  // Counter
  const floorY=H*0.7;
  ctx.fillStyle='#f8bbd0';ctx.fillRect(0,floorY-8,W,H-floorY+8);
  ctx.fillStyle='#ad1457';ctx.fillRect(0,floorY-8,W,8);
  ctx.fillStyle='#c2185b';ctx.fillRect(0,floorY-4,W,4);

  // Napkin/plate
  const plateX=W*0.35;
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(plateX,floorY-6,50,8,0,0,Math.PI*2);ctx.fill();

  // Draw ice cream stack — cone stays on counter, camera shifts down to keep top visible
  const coneBase=floorY-10;
  const totalH=getIceHeight();
  const topY=coneBase-totalH; // where the top of the stack would be in world space
  const minVisible=50; // keep the top at least this far from screen top
  const camShift=Math.max(0, minVisible-topY); // how much to push everything down

  ctx.save();
  ctx.translate(0,camShift);
  ctx.translate(plateX,coneBase);
  ctx.rotate(wobbleAngle*(iceStack.length*0.025));
  ctx.translate(-plateX,-coneBase);
  let curY=coneBase;
  const bounce=iceBounceTimer>0?Math.sin(iceBounceTimer*20)*4:0;
  let sprinkleIdx=0;

  iceStack.forEach((id,idx)=>{
    const isTop=idx===iceStack.length-1;
    const iY=curY+(isTop?bounce:0);
    const lw=wobbleAngle*idx*0.4; // per-layer sway
    if(id==='cone'){drawCone(plateX+lw*0.2,iY);curY-=90}
    else if(id==='cherry'){drawCherry(plateX+lw,iY);curY-=20}
    else if(id==='sprinkles'){drawSprinkles(plateX+lw,iY+5,iceSprinkleSeeds[sprinkleIdx]||0);sprinkleIdx++}
    else{const flav=ICE_FLAVORS.find(f=>f.id===id);if(flav){drawScoop(plateX+lw,iY,flav);curY-=42}}
  });
  ctx.restore();

  // Customer
  if(iceState==='customer_walking'||iceState==='eating'||iceState==='done'){
    drawCustomer(iceCustomerX,floorY,mouthOpenTimer>0);
  }
  // Eat counter
  if((iceState==='eating'||iceState==='done')&&iceEatCount>0){
    drawEatCounter(iceEatCount,iceTotalLayers);
  }

  drawParticles(0);drawConfetti();drawFloatingEmojis();drawFlyingFoods();
}

function drawCone(x,y){
  // Waffle cone — bigger
  ctx.fillStyle='#d7a86e';
  ctx.beginPath();ctx.moveTo(x-45,y-95);ctx.lineTo(x+45,y-95);ctx.lineTo(x+6,y);ctx.lineTo(x-6,y);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#c49556';ctx.lineWidth=2.5;ctx.stroke();
  // Waffle pattern
  ctx.strokeStyle='#c49556';ctx.lineWidth=1.5;
  for(let i=0;i<6;i++){const ly=y-i*16-5;const hw=6+i*7;ctx.beginPath();ctx.moveTo(x-hw,ly);ctx.lineTo(x+hw,ly);ctx.stroke()}
  for(let i=-3;i<=3;i++){ctx.beginPath();ctx.moveTo(x+i*4,y);ctx.lineTo(x+i*14,y-95);ctx.stroke()}
}

function drawScoop(x,y,flav){
  const r=48;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.08)';ctx.beginPath();ctx.ellipse(x,y-r+5,r+2,r+2,0,0,Math.PI*2);ctx.fill();
  // Main scoop
  ctx.fillStyle=flav.color;
  ctx.beginPath();ctx.arc(x,y-r-2,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=flav.outline||flav.dark;ctx.lineWidth=2.5;ctx.stroke();
  // Highlight
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.beginPath();ctx.ellipse(x-8,y-r-12,12,8,-0.3,0,Math.PI*2);ctx.fill();
  // Texture dots
  ctx.fillStyle=flav.dark;ctx.globalAlpha=0.15;
  const rng=seededRand(flav.id.length*1000);
  for(let i=0;i<8;i++){const dx=(rng()-0.5)*r*1.4,dy=(rng()-0.5)*r*1.4;if(dx*dx+dy*dy<r*r*0.8){ctx.beginPath();ctx.arc(x+dx,y-r-2+dy,2+rng()*3,0,Math.PI*2);ctx.fill()}}
  ctx.globalAlpha=1;
}

function drawSprinkles(x,y,seed){
  const rng=seededRand(seed||1234);
  const cols=['#f44336','#e91e63','#4caf50','#2196f3','#ffeb3b','#ff9800','#9c27b0'];
  for(let i=0;i<30;i++){
    const sx=x-42+rng()*84,sy=y-75+rng()*55,ang=rng()*Math.PI;
    ctx.save();ctx.translate(sx,sy);ctx.rotate(ang);
    ctx.fillStyle=cols[Math.floor(rng()*cols.length)];
    drawRoundRect(-4,-1.5,8,3,1.5);ctx.fill();
    ctx.restore();
  }
}

function drawCherry(x,y){
  // Stem
  ctx.strokeStyle='#388e3c';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(x,y-25);ctx.quadraticCurveTo(x+12,y-40,x+4,y-52);ctx.stroke();
  // Cherry
  ctx.fillStyle='#c62828';ctx.beginPath();ctx.arc(x,y-20,14,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#b71c1c';ctx.lineWidth=2.5;ctx.stroke();
  // Shine
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.arc(x-4,y-24,5,0,Math.PI*2);ctx.fill();
}
