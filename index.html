  handlePaintEnd();handleCatchEnd();handleTraceEnd();handleMazeEnd();handleBuildEnd();handleSkewEnd();
  if(currentMode==='chop'){const t=e.changedTouches[0];handleChopDragEnd(t.clientX,t.clientY)}
});
// Block ALL browser gestures (pull-to-refresh, swipe navigation, minimize)
document.addEventListener('touchmove',e=>{e.preventDefault()},{passive:false});
document.addEventListener('gesturestart',e=>{e.preventDefault()});
document.addEventListener('gesturechange',e=>{e.preventDefault()});

function handleDigTap(tx,ty){
  if(digState!=='dig'||truckLoad.length>=MAX_SCOOPS)return;
  for(const mat of Object.keys(PILES)){
    if(pileSizes[mat]<=0.35)continue;
    const cx=W*PILES[mat].xFrac,gy=digGroundY;
    const bw=W*0.11*pileSizes[mat];
    if(tx>cx-bw-W*0.03&&tx<cx+bw+W*0.03&&ty>gy-W*0.12&&ty<gy+10){
      initAudio();digStartDig(mat);return;
    }
  }
}

function handleMatchTap(tx,ty){
  if(!matchCards)return;
  const cols=matchCols||4,rows=matchRows||4,gap=10;
  const cw=(W-gap*(cols+1))/cols;
  const ch=Math.min(cw*1.3,(H*0.7-gap*(rows+1))/rows);
  const topOfs=50;
  for(let i=0;i<matchCards.length;i++){
    const cx=gap+(i%cols)*(cw+gap);
    const cy=topOfs+gap+Math.floor(i/cols)*(ch+gap);
    if(tx>=cx&&tx<=cx+cw&&ty>=cy&&ty<=cy+ch){matchTapCard(i);return}
  }
}

// =============================================
// WRECKING BALL GAME
// =============================================
const WRECK_BLOCKS=[
  {id:'brick', emoji:'🏠',label:'Red',   color:'#c62828',dark:'#8e0000',light:'#ef5350',w:110,h:32},
  {id:'wood',  emoji:'🏡',label:'Wood',  color:'#8d6e63',dark:'#5d4037',light:'#bcaaa4',w:110,h:28},
  {id:'glass', emoji:'🏢',label:'Glass', color:'#90caf9',dark:'#42a5f5',light:'#e3f2fd',w:110,h:30},
  {id:'stone', emoji:'🏤',label:'Stone', color:'#78909c',dark:'#455a64',light:'#b0bec5',w:110,h:34},
];
let wreckState,wreckTower,wreckFlyingBlocks,wreckBallAngle,wreckBallVel,wreckBallReleased;
let wreckBallX,wreckBallY,wreckBallVX,wreckBallVY,wreckGroundY;
let wreckShakeTimer=0,wreckShakeX=0,wreckShakeY=0;
let wreckDebris=[],wreckDozerX,wreckDozerActive;
let wreckSmashed=false;

function startWreckGame(){
  currentMode='wreck';particles=[];confetti=[];wobbleAngle=0;wobbleVel=0;
  wreckState='building';wreckTower=[];wreckFlyingBlocks=[];wreckDebris=[];
  wreckBallAngle=0.8;wreckBallVel=0;wreckBallReleased=false;
  wreckSmashed=false;wreckShakeTimer=0;wreckDozerX=-100;wreckDozerActive=false;
  wreckGroundY=H*0.65;
  updateWreckButtons();
}

function updateWreckButtons(){
  buttonsArea.innerHTML='';
  if(wreckState==='building'){

    instruction.textContent=wreckTower.length===0?'Build a tower!':'Stack higher!';
    WRECK_BLOCKS.forEach(b=>addBtn('btn-food',b.emoji,b.label,()=>{initAudio();addWreckBlock(b.id)}));
    addBtn('btn-dump','💥','Smash!',()=>{initAudio();startSmashing()},wreckTower.length===0);
  }else if(wreckState==='swinging'){

    instruction.textContent='Tap to SMASH!';
    addBtn('btn-dump','💥','SMASH!',()=>{initAudio();releaseWreckBall()});
  }else if(wreckState==='smashing'){
    // No buttons during destruction — nothing to accidentally tap
    instruction.textContent='BOOM! 💥';
  }else if(wreckState==='done'){

    instruction.textContent='Destroyed! 🎉';
    addBtn('btn-dump','🚜','Bulldoze!',()=>{initAudio();wreckDozerActive=true;wreckDozerX=-W*0.15;playTone(80,0.5,'sawtooth',0.1);playTone(100,0.3,'triangle',0.08);updateWreckButtons()});
  }
}

function addWreckBlock(id){
  const block=WRECK_BLOCKS.find(b=>b.id===id);
  wreckTower.push({...block,wobble:0});
  wobbleVel+=(Math.random()-0.5)*0.06;
  // Placement sound per block type
  if(id==='brick'){playTone(150,0.12,'square',0.1);playTone(120,0.1,'triangle',0.08)}
  else if(id==='glass'){playTone(900,0.15,'sine',0.1);playTone(1100,0.1,'sine',0.08)}
  else if(id==='stone'){playTone(100,0.15,'triangle',0.12);playTone(80,0.1,'square',0.06)}
  else playPop();
  sayWord(block?block.label:id);
  updateWreckButtons();
}

function startSmashing(){
  if(wreckTower.length===0)return;
  wreckState='swinging';
  wreckBallAngle=0.8;wreckBallVel=0;wreckBallReleased=false;wreckSmashed=false;
  updateWreckButtons();
}

function releaseWreckBall(){
  if(wreckBallReleased)return;
  wreckBallReleased=true;
  // Ball velocity from pendulum — boom tip is pivot
  let tH=0;wreckTower.forEach(b=>tH+=b.h);const tTopY=wreckGroundY-tH;
  const boomTipX=W*0.82-W*0.12,boomTipY=Math.min(tTopY-30,H*0.1);
  const craneX=boomTipX,craneY=boomTipY,ropeLen=H*0.3;
  wreckBallX=craneX+Math.sin(wreckBallAngle)*ropeLen;
  wreckBallY=craneY+Math.cos(wreckBallAngle)*ropeLen;
  // Tangential velocity from pendulum — should fly leftward toward tower
  const tangentSpeed=wreckBallVel*ropeLen;
  wreckBallVX=tangentSpeed*Math.cos(wreckBallAngle);
  wreckBallVY=tangentSpeed*Math.sin(wreckBallAngle);
  // If ball isn't heading toward tower, force it left
  if(wreckBallVX>-50){wreckBallVX=-300;wreckBallVY=-50}
  playTone(100,0.3,'square',0.12);
}

function smashTower(){
  if(wreckSmashed)return;
  wreckSmashed=true;wreckState='smashing';if(navigator.vibrate)navigator.vibrate([50,30,50]);
  // Convert tower blocks to flying physics objects
  const towerX=W*0.38;
  let by=wreckGroundY;
  wreckTower.forEach((block,i)=>{
    by-=block.h;
    const impactForce=1.5+i*0.3; // higher blocks fly further
    const dir=wreckBallVX>0?1:-1;
    wreckFlyingBlocks.push({
      x:towerX+(Math.random()-0.5)*20,y:by,
      w:block.w,h:block.h,color:block.color,dark:block.dark,light:block.light,id:block.id,
      vx:dir*(2+Math.random()*3)*impactForce,
      vy:-(3+Math.random()*6+i*1),
      rot:0,rotV:(Math.random()-0.5)*0.4,
      life:1,decay:0.02+Math.random()*0.01
    });
    // Shatter particles per block
    const cols=block.id==='glass'?['#e3f2fd','#90caf9','#42a5f5','#fff']:
               block.id==='wood'?['#8d6e63','#a1887f','#d7ccc8','#5d4037']:
               block.id==='brick'?['#c62828','#ef5350','#e57373','#8e0000']:
               ['#78909c','#455a64','#b0bec5','#546e7a'];
    spawnParticles(towerX,by+block.h/2,8,cols,{vyRange:10,vxRange:8,spread:30,maxSize:block.id==='glass'?4:6,shape:block.id==='glass'?'circle':'square',gravity:0.3});
  });
  wreckTower=[];
  // Big impact effects
  wreckShakeTimer=0.5;
  spawnParticles(towerX,wreckGroundY-20,30,['#8d6e63','#a1887f','#6d4c41','#d7ccc8'],{vyRange:12,spread:50,maxSize:5,gravity:0.35}); // dust cloud
  // Big satisfying crash sound
  playTone(40,0.5,'sawtooth',0.1);
  playTone(60,0.4,'square',0.12);
  playTone(30,0.6,'triangle',0.1);
  for(let i=0;i<8;i++){
    playTone(80+Math.random()*100,0.15,'square',0.08,i*0.06);
    playTone(200+Math.random()*400,0.08,'sawtooth',0.05,i*0.06);
  }
  playTone(100,0.3,'triangle',0.08,0.1);
  playTone(50,0.4,'sawtooth',0.08,0.3);
  for(let i=0;i<4;i++)playTone(150+Math.random()*200,0.1,'square',0.05,0.5+i*0.1);
  // Transition to 'done' after blocks settle (handled in update)
  updateWreckButtons();
}

function updateWreckGame(dt){
  wreckGroundY=H*0.65;
  // Wobble
  wobbleVel+=-wobbleAngle*2.5*dt;wobbleVel*=0.95;wobbleAngle+=wobbleVel;
  // Screen shake
  if(wreckShakeTimer>0){wreckShakeTimer-=dt;wreckShakeX=(Math.random()-0.5)*wreckShakeTimer*60;wreckShakeY=(Math.random()-0.5)*wreckShakeTimer*40}else{wreckShakeX=0;wreckShakeY=0}
  // Pendulum swing
  if(wreckState==='swinging'&&!wreckBallReleased){
    const gravity=4.5;
    wreckBallVel-=gravity*Math.sin(wreckBallAngle)*dt;
    wreckBallVel*=0.998; // slight damping
    wreckBallAngle+=wreckBallVel*dt;
  }
  // Released ball physics — keeps moving even after smash
  if(wreckBallReleased){
    wreckBallVY+=600*dt; // gravity
    wreckBallX+=wreckBallVX*dt;
    wreckBallY+=wreckBallVY*dt;
    // Check collision with tower (only before smash)
    if(!wreckSmashed){
      const towerX=W*0.38,towerW=65;
      if(wreckBallX>towerX-towerW&&wreckBallX<towerX+towerW&&wreckBallY>wreckGroundY-wreckTower.length*25-30){
        smashTower();wreckBallVX*=0.3;wreckBallVY=-100; // bounce off impact
      }
    }
    // Ball hit ground — bounce, but DON'T auto-smash on miss
    if(wreckBallY>wreckGroundY){
      wreckBallY=wreckGroundY;wreckBallVY*=-0.3;wreckBallVX*=0.5;
    }
    // Snap back to rope after settling (hit or miss)
    if(Math.abs(wreckBallVX)<5&&Math.abs(wreckBallVY)<5&&wreckBallY>=wreckGroundY-5){
      wreckBallReleased=false;wreckBallAngle=0.8;wreckBallVel=0;
      if(!wreckSmashed&&wreckTower.length>0){wreckState='swinging';updateWreckButtons()}
    }
  }
  // Flying blocks
  for(let i=wreckFlyingBlocks.length-1;i>=0;i--){
    const b=wreckFlyingBlocks[i];
    b.vy+=500*dt;b.x+=b.vx*dt*60;b.y+=b.vy*dt;b.rot+=b.rotV;b.life-=b.decay;
    // Keep on screen
    if(b.x<b.w)b.x=b.w;if(b.x>W-b.w)b.x=W-b.w;
    // Bounce off ground
    if(b.y>wreckGroundY-b.h/2){
      b.y=wreckGroundY-b.h/2;b.vy*=-0.3;b.vx*=0.6;b.rotV*=0.5;
      if(Math.abs(b.vy)>2)playTone(100+Math.random()*80,0.06,'triangle',0.05);
    }
    // Settle into debris when slowed OR life runs out — always create debris
    if((b.life<=0.4&&Math.abs(b.vy)<3&&Math.abs(b.vx)<2)||b.life<=0){
      // Place at ground if still airborne
      if(b.y<wreckGroundY-b.h)b.y=wreckGroundY-b.h/2;
      // Split into 7-12 varied debris chunks per block
      const chunks=7+Math.floor(Math.random()*6);
      for(let c=0;c<chunks;c++){
        const sizeVar=0.15+Math.random()*1.0;
        const cw=b.w*sizeVar*0.4+3;
        const ch=b.h*sizeVar*0.5+3;
        const isWin=c===0; // exactly one window: the first chunk
        const shape=Math.random();
        const pw=isWin?b.w*0.18:cw;
        const ph=isWin?b.h*0.5:ch;
        const dy=wreckGroundY-ph/2-Math.random()*3; // on ground, not floating
        wreckDebris.push({x:b.x+(Math.random()-0.5)*b.w*0.9,y:dy,
          w:pw,h:isWin?ph:(shape<0.5?ph:(shape<0.75?Math.min(pw,ph):ph)),
          color:b.color,dark:b.dark,light:b.light,id:b.id,detail:isWin?0:1+Math.floor(Math.random()*5),
          shape:isWin?'rect':(shape<0.5?'rect':shape<0.75?'sq':'tri'),
          zTop:isWin,rot:(isWin?(Math.random()-0.5)*0.6:b.rot+(Math.random()-0.5)*1.5)});
      }
      wreckFlyingBlocks.splice(i,1);
    }
  }
  // Transition to done when all blocks settled
  if(wreckSmashed&&wreckFlyingBlocks.length===0&&wreckState==='smashing'){
    wreckState='done';playJingle();spawnConfetti();playTaDa();updateWreckButtons();
  }
  // Bulldozer animation
  if(wreckDozerActive){
    wreckDozerX+=W*0.4*dt;
    // Push debris to the right
    const bladeEdge=wreckDozerX+W*0.003*38;
    wreckDebris.forEach(d=>{if(bladeEdge>d.x-d.w/2){d.x=bladeEdge+d.w/2+Math.random()*8;d.y=wreckGroundY-d.h/2-Math.random()*5;d.rot+=(Math.random()-0.5)*0.2}});
    if(wreckDozerX>W+50){wreckDozerActive=false;wreckDebris=[];startWreckGame()}
  }
  updateParticles(dt);updateConfetti();
}

function drawWreckGame(){
  wreckGroundY=H*0.65;
  // Camera pan — shift down if tower is too tall
  let towerH=0;wreckTower.forEach(b=>towerH+=b.h);
  const towerTopY=wreckGroundY-towerH;
  const camPan=Math.max(0,40-towerTopY);

  ctx.save();ctx.translate(wreckShakeX,wreckShakeY+camPan);
  // Sky
  let grd=ctx.createLinearGradient(0,-camPan,0,wreckGroundY);
  grd.addColorStop(0,'#4fc3f7');grd.addColorStop(1,'#b3e5fc');
  ctx.fillStyle=grd;ctx.fillRect(0,-camPan,W,wreckGroundY+camPan);
  ctx.fillStyle='#ffeb3b';ctx.beginPath();ctx.arc(W*0.12,H*0.08-camPan,30,0,Math.PI*2);ctx.fill();
  drawCloud(W*0.3,H*0.05-camPan,0.6);drawCloud(W*0.6,H*0.09-camPan,0.5);
  // Ground
  ctx.fillStyle='#8bc34a';ctx.fillRect(0,wreckGroundY-4,W,8);
  grd=ctx.createLinearGradient(0,wreckGroundY+4,0,H+camPan);grd.addColorStop(0,'#8d6e63');grd.addColorStop(1,'#5d4037');
  ctx.fillStyle=grd;ctx.fillRect(0,wreckGroundY+4,W,H);

  // Tower
  const towerX=W*0.38;
  let ty=wreckGroundY;
  ctx.save();
  ctx.translate(towerX,wreckGroundY);
  ctx.rotate(wobbleAngle*(wreckTower.length*0.02));
  ctx.translate(-towerX,-wreckGroundY);
  wreckTower.forEach((block,idx)=>{
    ty-=block.h;
    const lw=wobbleAngle*idx*0.5;
    const bx=towerX-block.w/2+lw,by2=ty;
    const bw=block.w,bh=block.h;
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.1)';drawRoundRect(bx+3,by2+3,bw,bh,2);ctx.fill();
    // Wall
    ctx.fillStyle=block.color;drawRoundRect(bx,by2,bw,bh,2);ctx.fill();
    ctx.strokeStyle=block.dark;ctx.lineWidth=1.5;ctx.stroke();
    // Floor line at bottom
    ctx.fillStyle=block.dark;ctx.fillRect(bx,by2+bh-3,bw,3);
    // Windows — 3 evenly spaced
    const winW=bw*0.18,winH=bh*0.5,winY=by2+bh*0.15,winGap=(bw-winW*3)/4;
    for(let wi=0;wi<3;wi++){
      const wx=bx+winGap+wi*(winW+winGap);
      if(block.id==='glass'){
        // Glass tower: big blue windows
        ctx.fillStyle='#e3f2fd';ctx.fillRect(wx,winY,winW,winH);
        ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillRect(wx+1,winY+1,winW*0.4,winH*0.5);
      }else{
        // Regular windows: light yellow (lit up)
        ctx.fillStyle='#fff9c4';ctx.fillRect(wx,winY,winW,winH);
        // Window frame
        ctx.strokeStyle=block.dark;ctx.lineWidth=1;ctx.strokeRect(wx,winY,winW,winH);
        // Cross pane
        ctx.beginPath();ctx.moveTo(wx+winW/2,winY);ctx.lineTo(wx+winW/2,winY+winH);ctx.stroke();
        ctx.beginPath();ctx.moveTo(wx,winY+winH/2);ctx.lineTo(wx+winW,winY+winH/2);ctx.stroke();
      }
    }
    // Roof detail on top floor
    if(idx===wreckTower.length-1){
      ctx.fillStyle=block.dark;
      ctx.beginPath();ctx.moveTo(bx-3,by2);ctx.lineTo(bx+bw/2,by2-8);ctx.lineTo(bx+bw+3,by2);ctx.closePath();ctx.fill();
    }
  });
  ctx.restore();

  // Debris pile — window pieces drawn on top
  const sortedDebris=wreckDebris.slice().sort((a,b)=>(a.zTop?1:0)-(b.zTop?1:0));
  sortedDebris.forEach(d=>{
    ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.rot);
    const hw=d.w/2,hh=d.h/2;
    // Chunk shape — rect, square, or triangle with shade variation
    const shade=d.detail*0.08-0.15;
    ctx.fillStyle=d.color;ctx.globalAlpha=1;
    if(d.shape==='tri'){
      ctx.beginPath();ctx.moveTo(-hw,-hh);ctx.lineTo(hw,-hh*0.3);ctx.lineTo(hw*0.2,hh);ctx.closePath();ctx.fill();
      ctx.strokeStyle=d.dark;ctx.lineWidth=1.2;ctx.stroke();
    }else{
      drawRoundRect(-hw,-hh,d.w,d.h,d.shape==='sq'?1:2);ctx.fill();
      ctx.strokeStyle=d.dark;ctx.lineWidth=1.2;ctx.stroke();
    }
    // Tint lighter or darker
    if(shade>0){ctx.fillStyle=`rgba(255,255,255,${shade})`;if(d.shape==='tri'){ctx.fill()}else{drawRoundRect(-hw,-hh,d.w,d.h,2);ctx.fill()}}
    else if(shade<0){ctx.fillStyle=`rgba(0,0,0,${-shade})`;if(d.shape==='tri'){ctx.fill()}else{drawRoundRect(-hw,-hh,d.w,d.h,2);ctx.fill()}}

    // Material-appropriate details — window pieces ARE the window (full chunk)
    if(d.detail===0){
      // WINDOW PIECE — the entire chunk is a window pane
      if(d.id==='glass'){
        // Glass: light blue pane, glare, no cross
        ctx.fillStyle='#e3f2fd';ctx.fillRect(-hw,-hh,d.w,d.h);
        ctx.strokeStyle='#42a5f5';ctx.lineWidth=1.5;ctx.strokeRect(-hw,-hh,d.w,d.h);
        ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fillRect(-hw+2,-hh+2,d.w*0.35,d.h*0.4);
      }else{
        // Brick/stone/wood: yellow lit window with cross panes
        ctx.fillStyle='#fff176';ctx.fillRect(-hw,-hh,d.w,d.h);
        ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.strokeRect(-hw,-hh,d.w,d.h);
        ctx.beginPath();ctx.moveTo(0,-hh);ctx.lineTo(0,hh);ctx.stroke();
        ctx.beginPath();ctx.moveTo(-hw,0);ctx.lineTo(hw,0);ctx.stroke();
      }
    }else if(d.id==='glass'){
      // Non-window glass: glare or spider cracks
      if(d.detail<4){ctx.fillStyle='rgba(255,255,255,0.25)';ctx.fillRect(-hw+2,-hh+2,d.w*0.3,d.h*0.35);}
      else{ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-hw*0.8,-hh*0.7);ctx.moveTo(0,0);ctx.lineTo(hw*0.6,hh*0.5);
        ctx.moveTo(0,0);ctx.lineTo(hw*0.3,-hh*0.8);ctx.stroke();}
    }else if(d.id==='wood'){
      ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=0.8;
      for(let g=0;g<3;g++){const gx=-hw*0.5+g*hw*0.5;ctx.beginPath();ctx.moveTo(gx,-hh);ctx.lineTo(gx+hw*0.1,hh);ctx.stroke()}
    }else if(d.id==='brick'){
      ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(-hw,0);ctx.lineTo(hw,0);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,-hh);ctx.lineTo(0,hh);ctx.stroke();
    }else if(d.id==='stone'){
      if(d.detail<3){ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(-hw*0.7,-hh*0.8);ctx.lineTo(hw*0.5,hh*0.6);ctx.stroke();}
      else{ctx.fillStyle='rgba(0,0,0,0.1)';ctx.beginPath();ctx.arc(hw*0.2,-hh*0.3,d.w*0.15,0,Math.PI*2);ctx.fill();}
    }
    ctx.restore();
  });
  // Flying blocks
  wreckFlyingBlocks.forEach(b=>{
    ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.rot);ctx.globalAlpha=Math.max(0.3,b.life);
    ctx.fillStyle=b.color;
    drawRoundRect(-b.w/2,-b.h/2,b.w,b.h,3);ctx.fill();
    ctx.strokeStyle=b.dark;ctx.lineWidth=1.5;ctx.stroke();
    ctx.globalAlpha=1;ctx.restore();
  });
  // Bulldozer
  if(wreckDozerActive){
    const dx=wreckDozerX,dy=wreckGroundY,ds=W*0.003;
    // Tracks
    ctx.fillStyle='#2a2a2a';drawRoundRect(dx-30*ds,dy-2*ds,65*ds,16*ds,8*ds);ctx.fill();
    ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.stroke();
    for(let i=0;i<7;i++){const gx=dx-26*ds+i*8.5*ds;ctx.strokeStyle='#444';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(gx,dy);ctx.lineTo(gx,dy+12*ds);ctx.stroke()}
    // Drive wheels
    [[-22*ds,7*ds],[26*ds,7*ds]].forEach(([wx,wy])=>{ctx.fillStyle='#444';ctx.beginPath();ctx.arc(dx+wx,dy+wy,7*ds,0,Math.PI*2);ctx.fill();ctx.fillStyle='#666';ctx.beginPath();ctx.arc(dx+wx,dy+wy,3*ds,0,Math.PI*2);ctx.fill()});
    // Body
    let bg=ctx.createLinearGradient(0,dy-32*ds,0,dy);bg.addColorStop(0,'#ffcc02');bg.addColorStop(0.5,'#ffb300');bg.addColorStop(1,'#ff8f00');
    ctx.fillStyle=bg;drawRoundRect(dx-22*ds,dy-30*ds,48*ds,30*ds,5*ds);ctx.fill();
    ctx.strokeStyle='#e65100';ctx.lineWidth=2;ctx.stroke();
    // Safety stripe
    ctx.fillStyle='#212121';ctx.fillRect(dx-20*ds,dy-6*ds,44*ds,4*ds);
    ctx.fillStyle='#ffd600';
    for(let i=0;i<6;i++){ctx.save();ctx.beginPath();ctx.rect(dx-20*ds,dy-6*ds,44*ds,4*ds);ctx.clip();
      const sx=dx-20*ds+i*10*ds;ctx.beginPath();ctx.moveTo(sx,dy-6*ds);ctx.lineTo(sx+5*ds,dy-6*ds);ctx.lineTo(sx+2*ds,dy-2*ds);ctx.lineTo(sx-3*ds,dy-2*ds);ctx.closePath();ctx.fill();ctx.restore()}
    // Cab
    ctx.fillStyle='#ffb300';drawRoundRect(dx-18*ds,dy-28*ds,24*ds,20*ds,4*ds);ctx.fill();
    ctx.strokeStyle='#e65100';ctx.lineWidth=1.5;ctx.stroke();
    // Window
    let wg=ctx.createLinearGradient(0,dy-26*ds,0,dy-16*ds);wg.addColorStop(0,'#e1f5fe');wg.addColorStop(1,'#4fc3f7');
    ctx.fillStyle=wg;drawRoundRect(dx-14*ds,dy-26*ds,16*ds,10*ds,3*ds);ctx.fill();
    // === BIG FRONT BLADE ===
    const bladeX=dx+28*ds,bladeW=10*ds,bladeH=30*ds;
    let blg=ctx.createLinearGradient(bladeX,0,bladeX+bladeW,0);
    blg.addColorStop(0,'#9e9e9e');blg.addColorStop(0.3,'#bdbdbd');blg.addColorStop(0.7,'#8a8a8a');blg.addColorStop(1,'#757575');
    ctx.fillStyle=blg;
    // Blade shape — tall curved front
    ctx.beginPath();
    ctx.moveTo(bladeX,dy-bladeH+5*ds);
    ctx.quadraticCurveTo(bladeX+bladeW*1.2,dy-bladeH,bladeX+bladeW,dy-bladeH+8*ds);
    ctx.lineTo(bladeX+bladeW,dy+2*ds);
    ctx.lineTo(bladeX,dy+2*ds);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='#555';ctx.lineWidth=2.5;ctx.stroke();
    // Blade edge — reinforced bottom
    ctx.fillStyle='#666';ctx.fillRect(bladeX,dy-2*ds,bladeW,4*ds);
    // Push arm connecting body to blade
    ctx.fillStyle='#e65100';ctx.fillRect(dx+24*ds,dy-14*ds,8*ds,4*ds);
    ctx.fillRect(dx+24*ds,dy-22*ds,8*ds,4*ds);
    // Exhaust puff
    const puffs=[0,1,2];
    puffs.forEach(p=>{ctx.fillStyle=`rgba(150,150,150,${0.25-p*0.07})`;
      ctx.beginPath();ctx.arc(dx-8*ds,dy-34*ds-p*7*ds-Math.sin(Date.now()/200+p)*3,3*ds+p*2*ds,0,Math.PI*2);ctx.fill()});
  }

  // Wrecking crane vehicle
  const craneX=W*0.82,gy=wreckGroundY;
  const cs=W*0.0022; // crane scale
  // Tracks
  const trW=50*cs,trH=14*cs;
  ctx.fillStyle='#333';drawRoundRect(craneX-trW/2,gy,trW,trH,trH/2);ctx.fill();
  ctx.strokeStyle='#222';ctx.lineWidth=2;ctx.stroke();
  for(let i=0;i<5;i++){const tx2=craneX-trW/2+6*cs+i*(trW-12*cs)/4;ctx.strokeStyle='#444';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(tx2,gy+2);ctx.lineTo(tx2,gy+trH-2);ctx.stroke()}
  // Wheels
  [[-trW/2+trH/2,trH/2],[trW/2-trH/2,trH/2]].forEach(([wx,wy])=>{ctx.fillStyle='#4a4a4a';ctx.beginPath();ctx.arc(craneX+wx,gy+wy,trH/2-2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#666';ctx.beginPath();ctx.arc(craneX+wx,gy+wy,trH/4,0,Math.PI*2);ctx.fill()});
  // Cab body
  const cabW=35*cs,cabH=28*cs;
  let cg=ctx.createLinearGradient(0,gy-cabH,0,gy);cg.addColorStop(0,'#ffb300');cg.addColorStop(1,'#ff8f00');
  ctx.fillStyle=cg;drawRoundRect(craneX-cabW/2,gy-cabH,cabW,cabH,5*cs);ctx.fill();
  ctx.strokeStyle='#e65100';ctx.lineWidth=1.5;ctx.stroke();
  // Cab window
  ctx.fillStyle='#b3e5fc';drawRoundRect(craneX-cabW/2+4*cs,gy-cabH+4*cs,cabW*0.5,cabH*0.45,3*cs);ctx.fill();
  // Safety stripe
  ctx.fillStyle='#212121';ctx.fillRect(craneX-cabW/2+2*cs,gy-4*cs,cabW-4*cs,3*cs);
  // Boom arm — extends from cab top toward upper-left
  const boomBaseX=craneX,boomBaseY=gy-cabH+3*cs;
  const boomTipX=craneX-W*0.12,boomTipY=Math.min(towerTopY-30,H*0.1);
  const boomW=7*cs;
  ctx.save();
  const boomAngle=Math.atan2(boomTipY-boomBaseY,boomTipX-boomBaseX);
  const boomLen=Math.sqrt((boomTipX-boomBaseX)**2+(boomTipY-boomBaseY)**2);
  ctx.translate(boomBaseX,boomBaseY);ctx.rotate(boomAngle);
  // Boom lattice
  ctx.fillStyle='#ffa726';ctx.fillRect(0,-boomW/2,boomLen,boomW);
  ctx.strokeStyle='#e65100';ctx.lineWidth=1.5;ctx.strokeRect(0,-boomW/2,boomLen,boomW);
  // Cross-bracing
  ctx.strokeStyle='#e65100';ctx.lineWidth=1;
  for(let i=0;i<Math.floor(boomLen/15);i++){const bx2=8+i*15;ctx.beginPath();ctx.moveTo(bx2,-boomW/2);ctx.lineTo(bx2+10,boomW/2);ctx.stroke();ctx.beginPath();ctx.moveTo(bx2+10,-boomW/2);ctx.lineTo(bx2,boomW/2);ctx.stroke()}
  ctx.restore();
  // Pivot bolt
  ctx.fillStyle='#888';ctx.beginPath();ctx.arc(boomBaseX,boomBaseY,4*cs,0,Math.PI*2);ctx.fill();

  // Wrecking ball from boom tip
  const ropeLen=H*0.3,ballR=W*0.04;
  const craneTopY=boomTipY; // pendulum pivot at boom tip
  let ballX,ballY;
  if(!wreckBallReleased){
    ballX=boomTipX+Math.sin(wreckBallAngle)*ropeLen;
    ballY=craneTopY+Math.cos(wreckBallAngle)*ropeLen;
  }else{
    ballX=wreckBallX;ballY=wreckBallY;
  }
  // Rope/chain
  ctx.strokeStyle='#616161';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(boomTipX,craneTopY);ctx.lineTo(ballX,ballY);ctx.stroke();
  const links=8;
  for(let i=1;i<links;i++){const t=i/links;const lx=lerp(boomTipX,ballX,t),ly=lerp(craneTopY,ballY,t);
    ctx.fillStyle=i%2?'#757575':'#616161';ctx.beginPath();ctx.arc(lx,ly,2.5,0,Math.PI*2);ctx.fill()}
  // Ball
  ctx.fillStyle='#424242';ctx.beginPath();ctx.arc(ballX,ballY,ballR,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#212121';ctx.lineWidth=3;ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.beginPath();ctx.arc(ballX-ballR*0.25,ballY-ballR*0.25,ballR*0.4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#616161';ctx.beginPath();ctx.arc(ballX,ballY-ballR+3,5,0,Math.PI*2);ctx.fill();

  drawParticles(0);drawConfetti();
  ctx.restore(); // shake
}

// Wreck game tap handler
function handleWreckTap(tx,ty){
  if(wreckState==='swinging'&&!wreckBallReleased){initAudio();releaseWreckBall()}
}

// =============================================
// MAIN LOOP
// =============================================
let lastTime=0;
function gameLoop(ts){
  const dt=Math.min(0.05,(ts-lastTime)/1000);lastTime=ts;
  resize();ctx.clearRect(0,0,W,H);

  if(currentMode==='menu'){drawMenuBg()}
  else if(currentMode==='dig'){updateDigGame(dt);drawDigGame()}
  else if(currentMode==='burger'){updateBurgerGame(dt);drawBurgerGame()}
  else if(currentMode==='icecream'){updateIceCreamGame(dt);drawIceCreamGame()}
  else if(currentMode==='match'){updateMatchGame(dt);drawMatchGame()}
  else if(currentMode==='wreck'){updateWreckGame(dt);drawWreckGame()}
  else if(currentMode==='pancake'){updatePancakeGame(dt);drawPancakeGame()}
  else if(currentMode==='pizza'){updatePizzaGame(dt);drawPizzaGame()}
  else if(currentMode==='paint'){updatePaintGame(dt);drawPaintGame()}
  else if(currentMode==='balloon'){updateBalloonGame(dt);drawBalloonGame()}
  else if(currentMode==='catch'){updateCatchGame(dt);drawCatchGame()}
  else if(currentMode==='trace'){updateTraceGame(dt);drawTraceGame()}
  else if(currentMode==='music'){updateMusicGame(dt);drawMusicGame()}
  else if(currentMode==='maze'){updateMazeGame(dt);drawMazeGame()}
  else if(currentMode==='build'){updateBuildGame(dt);drawBuildGame()}
  else if(currentMode==='carwash'){updateCarWashGame(dt);drawCarWashGame()}
  else if(currentMode==='train'){updateTrainGame(dt);drawTrainGame()}
  else if(currentMode==='hideseek'){updateHideSeekGame(dt);drawHideSeekGame()}
  else if(currentMode==='spider'){updateSpiderGame(dt);drawSpiderGame()}
  else if(currentMode==='blend'){updateBlendGame(dt);drawBlendGame()}
  else if(currentMode==='chop'){updateChopGame(dt);drawChopGame()}
  else if(currentMode==='skewer'){updateSkewGame(dt);drawSkewGame()}

  requestAnimationFrame(gameLoop);
}

showMenu();requestAnimationFrame(gameLoop);
</script>
