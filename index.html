const PANCAKE_SYRUPS=[
  {id:'maple',emoji:'🍯',label:'Maple',color:'#c49556',dark:'#8d6e63',react:'😊'},
  {id:'chocolate',emoji:'🍫',label:'Choco',voice:'Chocolate',color:'#5d4037',dark:'#3e2723',react:'🤎'},
  {id:'strawberry',emoji:'🍓',label:'Strawberry',voice:'Strawberry',color:'#f48fb1',dark:'#ec407a',react:'❤️'},
  {id:'blueberry',emoji:'🫐',label:'Blueberry',voice:'Blueberry',color:'#5c6bc0',dark:'#3949ab',react:'💙'},
];
const PANCAKE_FRUITS=[
  {id:'strawberry',emoji:'🍓',label:'Strawberry',color:'#e53935'},
  {id:'banana',emoji:'🍌',label:'Banana',color:'#fdd835'},
  {id:'blueberry',emoji:'🫐',label:'Blueberry',color:'#5c6bc0'},
  {id:'whipped',emoji:'🍦',label:'Cream',color:'#fafafa'},
  {id:'cherry',emoji:'🍒',label:'Cherry',color:'#c62828'},
];
let pancakeState,pancakeStack,pancakeFruits,pancakeFruitPos;
let pancakeCustomerX,pancakeEatCount,pancakeTotalLayers;
let pancakeBounceTimer,pancakeCamY;

function startPancakeGame(){
  currentMode='pancake';particles=[];confetti=[];floatingEmojis=[];flyingFoods=[];wobbleAngle=0;wobbleVel=0;mouthOpenTimer=0;
  pancakeState='stacking';pancakeStack=['plate'];pancakeFruits=[];pancakeFruitPos={};
  pancakeCustomerX=W+80;pancakeEatCount=0;pancakeTotalLayers=0;
  pancakeBounceTimer=0;pancakeCamY=0;
  updatePancakeButtons();
}
function updatePancakeButtons(){
  buttonsArea.innerHTML='';
  if(pancakeState==='stacking'){
    instruction.textContent=pancakeStack.length<=1?'Stack pancakes!':'Add more!';
    addBtn('btn-food','🥞','Pancake',()=>{initAudio();addPancakeItem('pancake')});
    PANCAKE_SYRUPS.forEach(s=>addBtn('btn-pizza',s.emoji,s.label,()=>{initAudio();addPancakeItem('syrup_'+s.id)},
      pancakeStack[pancakeStack.length-1]==='plate'));
    addBtn('btn-done','🍓','Fruits!',()=>{initAudio();startPancakeFruits()},!pancakeStack.some(s=>s==='pancake'));
  }else if(pancakeState==='topping'){
    instruction.textContent='Add fruit toppings!';
    PANCAKE_FRUITS.forEach(f=>addBtn('btn-icecream',f.emoji,f.label,()=>{initAudio();addPancakeFruit(f.id)}));
    addBtn('btn-done','✅','Done!',()=>{initAudio();finishPancake()});
  }else if(pancakeState==='pick_char'){
    instruction.textContent='Who eats it?';
    CHARACTERS.forEach(c=>addBtn('btn-char',c.emoji,c.label,()=>{initAudio();currentChar=c.id;playPop();pancakeState='customer_walking';pancakeCustomerX=W+80;updatePancakeButtons()}));
  }else if(pancakeState==='eating'){
    instruction.textContent='Tap NOM! 🥞';
    addBtn('btn-nom','😋','NOM!',()=>{initAudio();stopAutoEat();pancakeDoEat()});
    addBtn('btn-go','🍽️','Auto',()=>{initAudio();startAutoEat(()=>pancakeDoEat())});
  }else if(pancakeState==='done'){
    instruction.textContent='Yummy! 🎉';
    addBtn('btn-again','🔄','Again!',()=>{initAudio();startPancakeGame()});
  }else{instruction.textContent='Here they come!'}
}
function addPancakeItem(id){
  pancakeStack.push(id);pancakeBounceTimer=0.3;
  wobbleVel+=(Math.random()-0.5)*0.06;
  if(id==='pancake'){playTone(200,0.15,'triangle',0.12);playTone(150,0.1,'square',0.08);sayWord('Pancake!')}
  else{const s=PANCAKE_SYRUPS.find(s=>'syrup_'+s.id===id);if(s){playTone(400,0.1,'sine',0.12);sayWord(s.voice||s.label)}}
  const totalH=getPancakeHeight();const visH=H*0.7-60;
  pancakeCamY=Math.max(0,totalH-visH+60);
  spawnParticles(W*0.35,H*0.7-15-totalH,8,['#d7a86e','#c49556','#ffca28'],{vyRange:4,spread:20});
  updatePancakeButtons();
}
function startPancakeFruits(){
  pancakeState='topping';updatePancakeButtons();
}
function addPancakeFruit(id){
  pancakeFruits.push(id);pancakeBounceTimer=0.2;
  const f=PANCAKE_FRUITS.find(f=>f.id===id);
  const rng=seededRand(id.length*333+pancakeFruits.length*77);
  if(!pancakeFruitPos[id])pancakeFruitPos[id]=[];
  // Spread evenly on oval — golden angle for even distribution
  const allFruits=[].concat.apply([],Object.values(pancakeFruitPos));
  const n=allFruits.length;
  const ga=2.399963; // golden angle
  const angle=n*ga,rad=0.35+((n*3)%7)*0.08;
  // Store as unit-circle coords (will be mapped to oval in drawing)
  pancakeFruitPos[id].push({x:Math.cos(angle)*rad,y:Math.sin(angle)*rad});
  if(f){playPop();sayWord(f.label)}
  spawnParticles(W*0.35,H*0.7-getPancakeHeight()-10,6,f?[f.color,'#fff']:['#e91e63'],{vyRange:3,spread:15});
  updatePancakeButtons();
}
function finishPancake(){
  pancakeTotalLayers=pancakeStack.filter(s=>s==='pancake').length;
  pancakeEatCount=0;pancakeState='pick_char';playPop();updatePancakeButtons();
}
function pancakeDoEat(){
  if(pancakeState!=='eating'||pancakeStack.length<=1||mouthOpenTimer>0.15)return;
  // Each NOM eats one whole pancake layer: all fruits (first time) + syrups above it + the pancake
  // Clear all fruit toppings on first eat
  if(pancakeFruits.length>0){pancakeFruits=[];pancakeFruitPos={}}
  // Pop from top until we remove a pancake (inclusive)
  let ate=false;
  while(pancakeStack.length>1&&!ate){
    const removed=pancakeStack.pop();

  }
  pancakeEatCount++;mouthOpenTimer=0.35;
  playChomp(200);

  spawnFloatingEmoji(pancakeCustomerX,H*0.7-80,'😋');

    stopAutoEat();pancakeState='done';playJingle();spawnConfetti();
    sayNumber(pancakeEatCount);setTimeout(()=>playTaDa(),600);
    updatePancakeButtons();
  }
}
function getPancakeHeight(){
  const hw=W*0.12;
  let h=0;
  pancakeStack.forEach(id=>{if(id==='plate')return;if(id==='pancake')h+=hw*0.22;else h+=hw*0.08});
  return h;
}
function updatePancakeGame(dt){
  updateAutoEat(dt);
  if(pancakeBounceTimer>0)pancakeBounceTimer=Math.max(0,pancakeBounceTimer-dt);
  wobbleVel+=-wobbleAngle*2.5*dt;wobbleVel*=0.95;wobbleAngle+=wobbleVel;
  if(pancakeState==='customer_walking'){
    pancakeCustomerX=lerp(pancakeCustomerX,W*0.72,dt*4);
    if(Math.abs(pancakeCustomerX-W*0.72)<5){pancakeCustomerX=W*0.72;pancakeState='eating';updatePancakeButtons()}
  }
  if(mouthOpenTimer>0)mouthOpenTimer=Math.max(0,mouthOpenTimer-dt);
  updateParticles(dt);updateConfetti();updateFloatingEmojis(dt);updateFlyingFoods(dt);
}
function drawPancakeGame(){
  ctx.fillStyle='#fff9c4';ctx.fillRect(0,0,W,H);
  const floorY=H*0.7;
  ctx.fillStyle='#ffe0b2';ctx.fillRect(0,floorY,W,H-floorY);
  const ts=30;for(let x=0;x<W;x+=ts)for(let y=floorY;y<H;y+=ts){if((Math.floor(x/ts)+Math.floor(y/ts))%2===0){ctx.fillStyle='#ffcc80';ctx.fillRect(x,y,ts,ts)}}
  ctx.fillStyle='#8d6e63';ctx.fillRect(0,floorY-8,W,12);
  ctx.fillStyle='#a1887f';ctx.fillRect(0,floorY-8,W,4);
  // Plate
  const plateX=W*0.35,plateY=floorY-8;
  ctx.fillStyle='#f5f5f5';ctx.beginPath();ctx.ellipse(plateX,plateY,W*0.16,12,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#e0e0e0';ctx.lineWidth=2;ctx.stroke();

  const stackX=plateX,bunBase=plateY-10;
  const totalH=getPancakeHeight();const topY=bunBase-totalH;
  const camShift=Math.max(0,50-topY);
  const hw=W*0.12; // pancake half-width

  ctx.save();ctx.translate(0,camShift);
  ctx.translate(stackX,bunBase);ctx.rotate(wobbleAngle*(pancakeStack.length*0.02));ctx.translate(-stackX,-bunBase);
  let curY=bunBase;
  const bounce=pancakeBounceTimer>0?Math.sin(pancakeBounceTimer*20)*3:0;

  pancakeStack.forEach((id,idx)=>{
    if(id==='plate')return;
    const isTop=idx===pancakeStack.length-1;
    const lw=wobbleAngle*idx*0.3;
    const bY=curY+(isTop&&pancakeFruits.length===0?bounce:0);
    const bX=stackX+lw;
    if(id==='pancake'){
      // 3D oval pancake — thin, warm, no gaps
      const ph=hw*0.22,side=hw*0.09,ry=hw*0.32;
      // Side band — single filled shape connecting top and bottom ellipses
      const sideCol='#d4a660';
      ctx.fillStyle=sideCol;
      ctx.beginPath();
      ctx.ellipse(bX,bY,hw,ry,0,0,Math.PI); // bottom half-ellipse
      ctx.ellipse(bX,bY-side,hw,ry,0,Math.PI,0,true); // top half-ellipse reversed
      ctx.closePath();ctx.fill();
      // Top surface — warm gradient, drawn on top to cover seam
      let pg=ctx.createRadialGradient(bX-hw*0.15,bY-side-ry*0.15,hw*0.08,bX,bY-side,hw*0.9);
      pg.addColorStop(0,'#f5dfa0');pg.addColorStop(0.35,'#efd48a');pg.addColorStop(0.65,'#e8c878');pg.addColorStop(1,'#dbb06e');
      ctx.fillStyle=pg;
      ctx.beginPath();ctx.ellipse(bX,bY-side,hw,ry,0,0,Math.PI*2);ctx.fill();
      // Soft edge line
      ctx.strokeStyle='rgba(180,140,70,0.25)';ctx.lineWidth=0.8;ctx.stroke();
      // Butter highlight
      ctx.fillStyle='rgba(255,255,230,0.18)';
      ctx.beginPath();ctx.ellipse(bX-hw*0.08,bY-side-ry*0.08,hw*0.35,ry*0.2,-0.15,0,Math.PI*2);ctx.fill();
      curY-=ph;
    }else{
      // Syrup layer with natural drips
      const s=PANCAKE_SYRUPS.find(s=>'syrup_'+s.id===id);
      if(s){
        const sh=hw*0.08,sry=hw*0.3;
        // Main syrup pool on top — matches pancake width
        ctx.fillStyle=s.color;ctx.globalAlpha=0.85;
        ctx.beginPath();ctx.ellipse(bX,bY-sh/2,hw*0.97,sry,0,0,Math.PI*2);ctx.fill();
        // Natural drips — drawn as paths (narrow top, rounded bottom)
        const rng=seededRand(idx*77);
        for(let i=0;i<6;i++){
          const da=-Math.PI*0.1+rng()*Math.PI*1.2;
          const edgeX=bX+Math.cos(da)*hw*0.93;
          const edgeY=bY-sh/2+Math.sin(da)*sry*0.9;
          const dLen=hw*0.1+rng()*hw*0.2;
          const dW=hw*0.025+rng()*hw*0.02;
          // Teardrop path: narrow at top, round at bottom
          ctx.beginPath();
          ctx.moveTo(edgeX-dW*0.4,edgeY);
          ctx.lineTo(edgeX+dW*0.4,edgeY);
          ctx.quadraticCurveTo(edgeX+dW,edgeY+dLen*0.6,edgeX,edgeY+dLen);
          ctx.quadraticCurveTo(edgeX-dW,edgeY+dLen*0.6,edgeX-dW*0.4,edgeY);
          ctx.closePath();ctx.fill();
        }
        ctx.globalAlpha=1;
        // Shine
        ctx.fillStyle='rgba(255,255,255,0.18)';
        ctx.beginPath();ctx.ellipse(bX-hw*0.08,bY-sh/2-sry*0.12,hw*0.3,sry*0.15,0,0,Math.PI*2);ctx.fill();
        curY-=sh;
      }
    }
  });

  // Fruit toppings on top of stack
  // End wobble transform before drawing fruits on top
  ctx.restore();

  // Fruit toppings — drawn OUTSIDE the wobble save/restore to avoid inherited alpha
  if(pancakeFruits.length>0){
    const topSurf2=plateY-10-getPancakeHeight();
    const bncF=pancakeBounceTimer>0?Math.sin(pancakeBounceTimer*20)*3:0;
    const fsz=Math.max(22,hw*0.5);
    ctx.globalAlpha=1;
    ctx.font=`${fsz}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    Object.keys(pancakeFruitPos).forEach(fid=>{
      const f=PANCAKE_FRUITS.find(f=>f.id===fid);if(!f)return;
      const positions=pancakeFruitPos[fid];if(!positions)return;
      positions.forEach(pos=>{
        // Map to pancake oval: x spans full width, y spans oval perspective height
        const fx=stackX+pos.x*hw*0.75;
        const fy=topSurf2+pos.y*hw*0.22+bncF+camShift;
        ctx.globalAlpha=1;
        ctx.fillText(f.emoji,fx,fy);
      });
    });
    ctx.globalAlpha=1;ctx.textAlign='left';ctx.textBaseline='alphabetic';
  }

  // Customer
  if(pancakeState==='customer_walking'||pancakeState==='eating'||pancakeState==='done'){
    drawCustomer(pancakeCustomerX,floorY,mouthOpenTimer>0);
  }
  if((pancakeState==='eating'||pancakeState==='done')&&pancakeEatCount>0){
    drawEatCounter(pancakeEatCount,pancakeTotalLayers);
  }
  drawParticles(0);drawConfetti();drawFloatingEmojis();drawFlyingFoods();
}

];
let pizzaState,pizzaToppings,pizzaCutAngles,pizzaSlicesLeft,pizzaTotalSlices;
let pizzaToppingPos,pizzaCustomerX,pizzaEatCount;

function startPizzaGame(){
  currentMode='pizza';particles=[];confetti=[];floatingEmojis=[];flyingFoods=[];mouthOpenTimer=0;
  pizzaState='building';pizzaToppings=['crust'];pizzaCutAngles=[];
  pizzaSlicesLeft=0;pizzaTotalSlices=0;pizzaEatCount=0;

function getPizzaSlices(){
  if(pizzaCutAngles.length===0)return[];
  // Each cut is a diameter: angle and angle+PI
  const radii=[];
  pizzaCutAngles.forEach(a=>{let a1=((a%Math.PI*2)+Math.PI*2)%(Math.PI*2);radii.push(a1);radii.push((a1+Math.PI)%(Math.PI*2))});
  radii.sort((a,b)=>a-b);
  // Remove near-duplicates
  const clean=[radii[0]];
  for(let i=1;i<radii.length;i++){if(Math.abs(radii[i]-clean[clean.length-1])>0.05)clean.push(radii[i])}
  const slices=[];
  for(let i=0;i<clean.length;i++){
    const s=clean[i],e=clean[(i+1)%clean.length];
    slices.push({start:s,end:e>s?e:e+Math.PI*2});
  }
  return slices;
}

function addPizzaTopping(id){
  pizzaToppings.push(id);
  const t=PIZZA_TOPPINGS.find(t=>t.id===id);
  if(t&&t.type==='topping'){
    // Accumulate positions (allows multiples of same topping)
    const rng=seededRand(id.length*7777+pizzaToppings.length*31);
    const existing=pizzaToppingPos[id]||[];
    const newPos=[];const count=id==='pepperoni'?8:id==='mushroom'?4:id==='olive'?6:5;
    for(let i=0;i<count;i++){
      const idx=existing.length+i;
      // Mushrooms use golden angle for even spread, others use random
      const angle=id==='mushroom'?idx*2.399+rng()*0.3:rng()*Math.PI*2;
      const rFrac=id==='mushroom'?0.25+((idx*3)%5)*0.12:0.15+rng()*0.65;
      newPos.push({angle,rFrac});
    }
    if(!pizzaToppingPos[id])pizzaToppingPos[id]=[];
    pizzaToppingPos[id]=pizzaToppingPos[id].concat(newPos);
  }
  if(id==='sauce'){playTone(200,0.15,'triangle',0.12);playTone(150,0.1,'square',0.08)}
  else if(id==='cheese'){playTone(400,0.12,'sine',0.15);playTone(500,0.1,'sine',0.1)}
  else playPop();
  sayWord(t?t.label:id);
  const cx=W*0.5,cy=H*0.4,R=Math.min(W,H)*0.35;
  spawnParticles(cx,cy,10,t?[t.color,t.dark]:['#ffca28'],{vyRange:5,spread:R*0.6});
  updatePizzaButtons();
}
function startBakePizza(){
  pizzaState='baking';pizzaBakeTimer=0;
  playTone(200,0.5,'sawtooth',0.08);sayWord('Baking!');
  updatePizzaButtons();
}
function handlePizzaTap(tx,ty){
  if(pizzaState!=='cutting')return;
  const cx=W*0.5,cy=H*0.4,R=Math.min(W,H)*0.35;
  const dx=tx-cx,dy=ty-cy,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>R*1.5)return; // too far from pizza
  const angle=Math.atan2(dy,dx);
  // Don't add if too close to existing cut
  const tooClose=pizzaCutAngles.some(a=>{const d=Math.abs(((angle-a+Math.PI*3)%(Math.PI*2))-Math.PI);return d<0.15||Math.abs(d-Math.PI)<0.15});
  if(tooClose)return;
  pizzaCutAngles.push(angle);
  pizzaCutAnim=0.35;pizzaCutAnimAngle=angle;pizzaSliceSep=0;
  playTone(800,0.1,'sine',0.15);playTone(600,0.08,'triangle',0.1);
  initAudio();
  spawnParticles(cx,cy,6,['#fff9c4','#ffca28'],{vyRange:3,spread:20});
  updatePizzaButtons();
}
function finishPizzaCutting(){
  if(pizzaCutAngles.length<1)return;
  const slices=getPizzaSlices();
  pizzaSlicesLeft=slices.length;pizzaTotalSlices=slices.length;pizzaEatCount=0;
  pizzaState='pick_char';playPop();updatePizzaButtons();
}
function pizzaDoEat(){
  if(pizzaState!=='eating'||pizzaSlicesLeft<=0||mouthOpenTimer>0.15)return;
  pizzaEatCount++;pizzaSlicesLeft--;mouthOpenTimer=0.3;
  playChomp(250);
  const cx=W*0.5,cy=H*0.4,mouthY=H*0.7-45*1.7;
  spawnFlyingFood(cx,cy,pizzaCustomerX,mouthY,'🍕',null);
  spawnParticles(cx,cy,6,['#ffca28','#c62828','#f9a825'],{vyRange:4,spread:20});
  spawnFloatingEmoji(pizzaCustomerX,H*0.7-80,'😋');
  if(pizzaSlicesLeft<=0){
    stopAutoEat();pizzaState='done';playJingle();spawnConfetti();
    sayNumber(pizzaEatCount);setTimeout(()=>playTaDa(),600);
    updatePizzaButtons();
  }
}
function updatePizzaGame(dt){
  updateAutoEat(dt);
  if(pizzaState==='baking'){
    pizzaBakeTimer+=dt;
    if(pizzaBakeTimer>=1.5){
      pizzaState='cutting';pizzaBakeTimer=0;
      playTone(523,0.2,'sine',0.15);

  if(pizzaCutAnim>0)pizzaCutAnim=Math.max(0,pizzaCutAnim-dt);
  if(pizzaCutAngles.length>0&&pizzaState!=='building'&&pizzaState!=='baking'){
    pizzaSliceSep=lerp(pizzaSliceSep,0.04,dt*3);
  }
  if(pizzaState==='customer_walking'){
    pizzaCustomerX=lerp(pizzaCustomerX,W*0.75,dt*4);
    if(Math.abs(pizzaCustomerX-W*0.75)<5){pizzaCustomerX=W*0.75;pizzaState='eating';updatePizzaButtons()}
  }
  if(mouthOpenTimer>0)mouthOpenTimer=Math.max(0,mouthOpenTimer-dt);
  updateParticles(dt);updateConfetti();updateFloatingEmojis(dt);updateFlyingFoods(dt);
}
function drawPizzaGame(){
  // Background — warm kitchen
  ctx.fillStyle='#fff9c4';ctx.fillRect(0,0,W,H);
  const floorY=H*0.7;
  ctx.fillStyle='#ffe0b2';ctx.fillRect(0,floorY,W,H-floorY);
  const ts=30;for(let x=0;x<W;x+=ts)for(let y=floorY;y<H;y+=ts){if((Math.floor(x/ts)+Math.floor(y/ts))%2===0){ctx.fillStyle='#ffcc80';ctx.fillRect(x,y,ts,ts)}}
  ctx.fillStyle='#8d6e63';ctx.fillRect(0,floorY-8,W,12);
  ctx.fillStyle='#a1887f';ctx.fillRect(0,floorY-8,W,4);

  const cx=W*0.5,cy=H*0.4,R=Math.min(W,H)*0.35,innerR=R*0.85;

  ctx.fillStyle='#f5f5f5';ctx.beginPath();ctx.arc(cx,cy,R+15,0,Math.PI*2);ctx.fill();

  const slices=getPizzaSlices();

      if(i>=pizzaSlicesLeft)continue;
      const sl=slices[i],a0=sl.start,a1=sl.end;
      const mid=(a0+a1)/2,sd=sep*R*0.5;
      const sx=cx+Math.cos(mid)*sd,sy=cy+Math.sin(mid)*sd;
      ctx.save();ctx.beginPath();ctx.moveTo(sx,sy);ctx.arc(sx,sy,R+2,a0+sep*0.3,a1-sep*0.3);ctx.closePath();ctx.clip();
      ctx.fillStyle='#d7a86e';ctx.beginPath();ctx.arc(sx,sy,R,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#c49556';ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle='#ffe0b2';ctx.beginPath();ctx.arc(sx,sy,innerR,0,Math.PI*2);ctx.fill();
      pizzaToppings.forEach(id=>{
        if(id==='crust')return;
        if(id==='sauce'){ctx.fillStyle='#c62828';ctx.beginPath();ctx.arc(sx,sy,innerR-2,0,Math.PI*2);ctx.fill()}
        else if(id==='cheese'){
          ctx.fillStyle='#ffca28';ctx.beginPath();ctx.arc(sx,sy,innerR-2,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#fff9c4';ctx.globalAlpha=0.3;const rng=seededRand(7777);
          for(let j=0;j<8;j++){const a=rng()*Math.PI*2,r=rng()*innerR*0.6;ctx.beginPath();ctx.arc(sx+Math.cos(a)*r,sy+Math.sin(a)*r,4+rng()*8,0,Math.PI*2);ctx.fill()}
          ctx.globalAlpha=1;
        }else{drawPizzaScatter(sx,sy,innerR,id)}
      });
      ctx.restore();
      ctx.strokeStyle='rgba(100,60,20,0.35)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+Math.cos(a0+sep*0.3)*R,sy+Math.sin(a0+sep*0.3)*R);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+Math.cos(a1-sep*0.3)*R,sy+Math.sin(a1-sep*0.3)*R);ctx.stroke();
    }
  }else{
    // Whole pizza
    ctx.fillStyle='rgba(0,0,0,0.08)';ctx.beginPath();ctx.arc(cx+3,cy+3,R,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#d7a86e';ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#c49556';ctx.lineWidth=3;ctx.stroke();
    ctx.fillStyle='#ffe0b2';ctx.beginPath();ctx.arc(cx,cy,innerR,0,Math.PI*2);ctx.fill();
    pizzaToppings.forEach(id=>{
      if(id==='crust')return;
      if(id==='sauce'){ctx.fillStyle='#c62828';ctx.beginPath();ctx.arc(cx,cy,innerR-2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#8e0000';ctx.globalAlpha=0.2;const rng=seededRand(4242);
        for(let j=0;j<8;j++){const a=rng()*Math.PI*2,r=rng()*innerR*0.6;ctx.beginPath();ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,4+rng()*6,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
      else if(id==='cheese'){ctx.fillStyle='#ffca28';ctx.beginPath();ctx.arc(cx,cy,innerR-2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff9c4';ctx.globalAlpha=0.3;const rng=seededRand(7777);
        for(let j=0;j<8;j++){const a=rng()*Math.PI*2,r=rng()*innerR*0.6;ctx.beginPath();ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,4+rng()*8,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
      else{drawPizzaScatter(cx,cy,innerR,id)}
    });
  }
  // Cutting state: slight white wash + dashed cut lines on full pizza
  if(pizzaState==='cutting'){
    // Light white overlay so cuts show better
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
    // Existing cut lines as dashed lines
    pizzaCutAngles.forEach(a=>{
      ctx.strokeStyle='rgba(60,30,5,0.5)';ctx.lineWidth=3;
      ctx.setLineDash([6,4]);
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(a)*R*0.05,cy+Math.sin(a)*R*0.05);
      ctx.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(a+Math.PI)*R*0.05,cy+Math.sin(a+Math.PI)*R*0.05);
      ctx.lineTo(cx+Math.cos(a+Math.PI)*R,cy+Math.sin(a+Math.PI)*R);
      ctx.stroke();
      ctx.setLineDash([]);
    });
    // Subtle pulsing ring
    const pulse=0.25+0.2*Math.sin(Date.now()/250);
    ctx.strokeStyle=`rgba(255,200,40,${pulse})`;ctx.lineWidth=3;
    ctx.setLineDash([10,6]);
    ctx.beginPath();ctx.arc(cx,cy,R+6,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    // Hint text
    ctx.fillStyle='rgba(0,0,0,0.45)';ctx.font=`bold ${Math.max(14,W*0.035)}px sans-serif`;ctx.textAlign='center';
    ctx.fillText('🔪 Tap to cut!',cx,cy+R+28);ctx.textAlign='left';
  }
  // Bake glow
  if(pizzaState==='baking'){
    const glow=0.2+0.2*Math.sin(pizzaBakeTimer*8);
    ctx.fillStyle=`rgba(255,152,0,${glow})`;ctx.beginPath();ctx.arc(cx,cy,R+20,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(22,W*0.045)}px sans-serif`;ctx.textAlign='center';
    ctx.fillText('🔥 Baking! 🔥',cx,cy+5);ctx.textAlign='left';
  }
  // Knife animation
  if(pizzaCutAnim>0){
    const p=1-pizzaCutAnim/0.4,op=1-p,kl=R*1.3;
    ctx.save();ctx.translate(cx,cy);ctx.rotate(pizzaCutAnimAngle);ctx.globalAlpha=op;
    ctx.strokeStyle='#bbb';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-kl*p,0);ctx.lineTo(kl*p,0);ctx.stroke();
    ctx.fillStyle='#5d4037';ctx.fillRect(kl*p-6,-5,12,10);
    ctx.globalAlpha=1;ctx.restore();
  }
  // Customer
  if(pizzaState==='customer_walking'||pizzaState==='eating'||pizzaState==='done'){
    drawCustomer(pizzaCustomerX,floorY,mouthOpenTimer>0);
  }
  if((pizzaState==='eating'||pizzaState==='done')&&pizzaEatCount>0){
    drawEatCounter(pizzaEatCount,pizzaTotalSlices);
  }
  drawParticles(0);drawConfetti();drawFloatingEmojis();drawFlyingFoods();
}
function drawPizzaScatter(cx,cy,innerR,id){
  const positions=pizzaToppingPos[id];if(!positions)return;
  const sz=innerR*0.09;
  positions.forEach(pos=>{
    const px=cx+Math.cos(pos.angle)*pos.rFrac*innerR;
    const py=cy+Math.sin(pos.angle)*pos.rFrac*innerR;
    if(id==='pepperoni'){
      ctx.fillStyle='#c62828';ctx.beginPath();ctx.arc(px,py,sz,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#8e0000';ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle='#8e0000';ctx.globalAlpha=0.3;ctx.beginPath();ctx.arc(px,py,sz*0.4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    }else if(id==='mushroom'){
      // Mushroom slice — fan shape with visible gills
      const ms=sz*1.8;
      ctx.save();ctx.translate(px,py);ctx.rotate(pos.angle*0.15);
      // Cap — warm cream/tan
      ctx.fillStyle='#f5e6d0';
      ctx.beginPath();ctx.moveTo(-ms*0.7,0);ctx.quadraticCurveTo(-ms*0.6,-ms*0.9,0,-ms);
      ctx.quadraticCurveTo(ms*0.6,-ms*0.9,ms*0.7,0);ctx.closePath();ctx.fill();
      ctx.strokeStyle='#c9a87c';ctx.lineWidth=1;ctx.stroke();
      // Light brown spots on cap
      ctx.fillStyle='rgba(180,140,90,0.2)';
      ctx.beginPath();ctx.arc(-ms*0.2,-ms*0.5,ms*0.15,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ms*0.15,-ms*0.35,ms*0.1,0,Math.PI*2);ctx.fill();
      // Gills
      ctx.strokeStyle='rgba(180,140,90,0.25)';ctx.lineWidth=0.6;
      for(let g=-2;g<=2;g++){ctx.beginPath();ctx.moveTo(g*ms*0.1,0);ctx.lineTo(g*ms*0.2,-ms*0.65);ctx.stroke()}
      // Stem — off-white
      ctx.fillStyle='#faf3eb';
      ctx.fillRect(-ms*0.15,0,ms*0.3,ms*0.35);
      ctx.strokeStyle='#d4b896';ctx.lineWidth=0.6;ctx.strokeRect(-ms*0.15,0,ms*0.3,ms*0.35);
      ctx.restore();
    }else if(id==='olive'){
      ctx.fillStyle='#33691e';ctx.beginPath();ctx.arc(px,py,sz*0.8,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#1b5e20';ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle='#ffca28';ctx.beginPath();ctx.arc(px,py,sz*0.3,0,Math.PI*2);ctx.fill();
    }else if(id==='pepper'){
      ctx.fillStyle='#43a047';ctx.save();ctx.translate(px,py);ctx.rotate(pos.angle);
      ctx.fillRect(-sz,-1.5,sz*2,3);ctx.restore();
    }
  });
}

let paintDragging=false;
function paintAddSplat(tx,ty,big){
  if(ty<40||ty>H-100)return;
  let c=paintColor;
  if(paintRainbow){c=PAINT_COLORS[paintRainbowIdx%PAINT_COLORS.length].color;paintRainbowIdx++}

    droplets.push({x:Math.cos(a)*d,y:Math.sin(a)*d,r:3+Math.random()*8})}}
  if(paintSplats.length>=500)paintSplats.splice(0,100);
  paintSplats.push({x:tx,y:ty,r:sz,color:c,droplets});
  if(big){spawnParticles(tx,ty,8,[c,'#ffffff'],{vyRange:6,spread:30,maxSize:6});
    playTone(120+Math.random()*80,0.15,'triangle',0.1)}
}
function handlePaintTap(tx,ty){
  initAudio();paintDragging=true;paintAddSplat(tx,ty,true);
  if(paintSplats.length===1)updatePaintButtons();
}
function handlePaintMove(tx,ty){
  if(!paintDragging||currentMode!=='paint')return;
  paintAddSplat(tx,ty,false);
}
function handlePaintEnd(){paintDragging=false}

function updatePaintGame(dt){updateParticles(dt);updateConfetti()}

function drawPaintGame(){
  // White canvas background
  ctx.fillStyle='#f5f5f5';ctx.fillRect(0,0,W,H);

  const bw=8;
  ctx.strokeStyle='#8d6e63';ctx.lineWidth=bw;
  ctx.strokeRect(bw/2,bw/2,W-bw,H-bw);
  ctx.strokeStyle='#a1887f';ctx.lineWidth=3;
  ctx.strokeRect(bw+2,bw+2,W-bw*2-4,H-bw*2-4);

  paintSplats.forEach(s=>{
    ctx.fillStyle=s.color;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();

}

let balloons=[],balloonScore=0,balloonSpawnTimer=0,balloonClouds=[];
const BALLOON_COLORS=['#f44336','#e91e63','#9c27b0','#2196f3','#4caf50','#ff9800','#ffeb3b','#00bcd4'];

function startBalloonGame(){
  currentMode='balloon';particles=[];confetti=[];
  balloons=[];balloonScore=0;balloonSpawnTimer=0;
  balloonClouds=[];
  for(let i=0;i<5;i++)balloonClouds.push({x:Math.random()*W,y:H*0.05+Math.random()*H*0.25,s:0.5+Math.random()*0.6,vx:0.2+Math.random()*0.3});
  spawnBalloon();spawnBalloon();
  updateBalloonButtons();
}

function updateBalloonButtons(){
  buttonsArea.innerHTML='';
  instruction.textContent='Pop the bubbles! 🎈';
}

function spawnBalloon(){
  if(balloons.length>=30)return;
  const r=W*0.06+Math.random()*W*0.05;
  balloons.push({
    x:r+Math.random()*(W-r*2),y:H+r+Math.random()*40,
    r,color:BALLOON_COLORS[Math.floor(Math.random()*BALLOON_COLORS.length)],
    vy:-(0.8+Math.random()*0.8),vx:(Math.random()-0.5)*0.4,
    taps:0,wobble:0,wobbleV:0,pop:false,popTimer:0
  });
}

function handleBalloonTap(tx,ty){
  for(let i=balloons.length-1;i>=0;i--){
    const b=balloons[i];if(b.pop)continue;
    const dx=tx-b.x,dy=ty-b.y;
    if(dx*dx+dy*dy<(b.r+10)*(b.r+10)){
      initAudio();
      // Pop on single tap!
      b.pop=true;b.popTimer=0.3;balloonScore++;sayNumber(balloonScore);if(navigator.vibrate)navigator.vibrate(20);
      spawnParticles(b.x,b.y,15,[b.color,'#ffffff','#e3f2fd'],{vyRange:8,spread:25,maxSize:8});
      spawnConfetti();
      playTone(800+Math.random()*400,0.12,'sine',0.18);
      playTone(1200,0.06,'sine',0.08,0.04);
      updateBalloonButtons();
      return;
    }
  }
}

function updateBalloonGame(dt){
  balloonSpawnTimer+=dt;
  if(balloonSpawnTimer>1+Math.random()){balloonSpawnTimer=0;spawnBalloon()}
  for(let i=balloons.length-1;i>=0;i--){
    const b=balloons[i];
    if(b.pop){b.popTimer-=dt;if(b.popTimer<=0)balloons.splice(i,1);continue}
    b.x+=b.vx;b.y+=b.vy;
    b.vy-=dt*0.8; // float upward
    b.vx*=0.99;
    b.wobble+=b.wobbleV;b.wobbleV*=0.92;
    // Bounce off walls
    if(b.x<b.r){b.x=b.r;b.vx=Math.abs(b.vx)}
    if(b.x>W-b.r){b.x=W-b.r;b.vx=-Math.abs(b.vx)}
    // Remove if off top
    if(b.y<-b.r*2)balloons.splice(i,1);
  }
  // Move clouds
  balloonClouds.forEach(c=>{c.x+=c.vx*dt*20;if(c.x>W+60)c.x=-60});
  updateParticles(dt);updateConfetti();
}

function drawBalloonGame(){
  // Sky gradient
  const grd=ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#4fc3f7');grd.addColorStop(0.6,'#81d4fa');grd.addColorStop(1,'#b3e5fc');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  // Sun
  ctx.fillStyle='#ffeb3b';ctx.beginPath();ctx.arc(W*0.85,H*0.08,30,0,Math.PI*2);ctx.fill();
  // Clouds
  balloonClouds.forEach(c=>drawCloud(c.x,c.y,c.s));
  // Bubbles
  balloons.forEach(b=>{
    if(b.pop)return;
    ctx.save();ctx.translate(b.x,b.y);
    // Outer glow
    ctx.fillStyle=b.color;ctx.globalAlpha=0.1;
    ctx.beginPath();ctx.arc(0,0,b.r+5,0,Math.PI*2);ctx.fill();
    // Bubble body — translucent sphere
    ctx.globalAlpha=0.3;
    let bg=ctx.createRadialGradient(-b.r*0.2,-b.r*0.25,b.r*0.1,0,0,b.r);
    bg.addColorStop(0,b.color);bg.addColorStop(0.6,b.color);bg.addColorStop(1,'rgba(255,255,255,0.05)');
    ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.fill();
    // Rim
    ctx.globalAlpha=0.4;ctx.strokeStyle=b.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.stroke();
    // Big shine highlight
    ctx.globalAlpha=0.6;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(-b.r*0.28,-b.r*0.3,b.r*0.28,0,Math.PI*2);ctx.fill();
    // Small shine
    ctx.globalAlpha=0.3;
    ctx.beginPath();ctx.arc(-b.r*0.12,-b.r*0.12,b.r*0.12,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();
  });
  drawParticles(0);drawConfetti();
}

let tracePath=[],traceHit=[],traceShapeIdx=0,traceDone=false,traceScore=0,traceDragging=false,traceSparkles=[];
const TRACE_SHAPES=[
  {name:'Circle',gen:function(cx,cy,r){const pts=[];for(let i=0;i<60;i++){const a=Math.PI*2*i/60;pts.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r})}return pts}},
  {name:'Square',gen:function(cx,cy,r){const pts=[];const s=r*0.85;const corners=[[-s,-s],[s,-s],[s,s],[-s,s]];for(let c=0;c<4;c++){const[x1,y1]=corners[c];const[x2,y2]=corners[(c+1)%4];for(let i=0;i<15;i++){const t=i/15;pts.push({x:cx+x1+(x2-x1)*t,y:cy+y1+(y2-y1)*t})}}return pts}},
  {name:'Triangle',gen:function(cx,cy,r){const pts=[];const verts=[[0,-r*1.1],[-r*0.95,r*0.7],[r*0.95,r*0.7]];for(let c=0;c<3;c++){const v1=verts[c],v2=verts[(c+1)%3];for(let i=0;i<20;i++){const t=i/20;pts.push({x:cx+v1[0]+(v2[0]-v1[0])*t,y:cy+v1[1]+(v2[1]-v1[1])*t})}}return pts}},
  {name:'Star',gen:function(cx,cy,r){const pts=[];const verts=[];for(let i=0;i<5;i++){const a=Math.PI*2*i/5-Math.PI/2;const ai=a+Math.PI/5;verts.push([Math.cos(a)*r,Math.sin(a)*r]);verts.push([Math.cos(ai)*r*0.45,Math.sin(ai)*r*0.45])}for(let c=0;c<10;c++){const v1=verts[c],v2=verts[(c+1)%10];for(let i=0;i<6;i++){const t=i/6;pts.push({x:cx+v1[0]+(v2[0]-v1[0])*t,y:cy+v1[1]+(v2[1]-v1[1])*t})}}return pts}},
  {name:'Heart',gen:function(cx,cy,r){const pts=[];for(let i=0;i<60;i++){const t=Math.PI*2*i/60;const x=16*Math.pow(Math.sin(t),3);const y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));pts.push({x:cx+x*r/17,y:cy+y*r/17-r*0.1})}return pts}}
];
const TRACE_COLORS=['#f44336','#2196f3','#4caf50','#ff9800','#e91e63'];

function startTraceGame(){

function updateTraceButtons(){

function setupTraceShape(){

  tracePath=s.gen(W/2,H*0.38,r);
  traceHit=new Array(tracePath.length).fill(false);
  traceSparkles=[];
  sayWord(s.name);updateTraceButtons();
}
function handleTraceTap(tx,ty){initAudio();traceDragging=true;traceCheck(tx,ty)}
function handleTraceMove(tx,ty){if(!traceDragging||currentMode!=='trace')return;traceCheck(tx,ty)}
function handleTraceEnd(){traceDragging=false}
function traceCheck(tx,ty){
  if(traceDone)return;
  const thresh=W*0.045;
  let any=false;
  for(let i=0;i<tracePath.length;i++){
    if(traceHit[i])continue;
    const dx=tx-tracePath[i].x,dy=ty-tracePath[i].y;
    if(dx*dx+dy*dy<thresh*thresh){
      traceHit[i]=true;any=true;
      if(Math.random()<0.3)traceSparkles.push({x:tracePath[i].x+(Math.random()-0.5)*10,y:tracePath[i].y+(Math.random()-0.5)*10,life:1,size:4+Math.random()*6});
    }
  }
  if(any)playTone(400+Math.random()*300,0.06,'sine',0.08);
  // Check completion
  const filled=traceHit.filter(Boolean).length;
  if(filled>=tracePath.length*0.85&&!traceDone){
    traceDone=true;traceScore++;
    spawnConfetti();playJingle();
    traceHit.fill(true);
    if(traceScore>=5){
      instruction.textContent='Amazing! All done! ⭐';playTaDa();
      updateTraceButtons();
    }else{
      setTimeout(()=>{traceShapeIdx++;setupTraceShape()},1200);
      updateTraceButtons();
    }
  }
}
function updateTraceGame(dt){
  for(let i=traceSparkles.length-1;i>=0;i--){traceSparkles[i].life-=dt*1.5;if(traceSparkles[i].life<=0)traceSparkles.splice(i,1)}
  updateParticles(dt);updateConfetti();
}
function drawTraceGame(){
  // Paper bg
  ctx.fillStyle='#faf3e0';ctx.fillRect(0,0,W,H);
  // Notebook lines
  ctx.strokeStyle='#e0d5c1';ctx.lineWidth=1;
  for(let y=0;y<H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  const color=TRACE_COLORS[traceShapeIdx%TRACE_COLORS.length];
  // Dotted outline
  ctx.fillStyle='#ccc';
  tracePath.forEach((p,i)=>{
    if(!traceHit[i]){ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill()}
  });
  // Filled path
  ctx.fillStyle=color;
  tracePath.forEach((p,i)=>{
    if(traceHit[i]){ctx.beginPath();ctx.arc(p.x,p.y,6,0,Math.PI*2);ctx.fill()}
  });
  // Sparkles
  traceSparkles.forEach(s=>{
    ctx.globalAlpha=s.life;ctx.fillStyle='#ffeb3b';
    ctx.font=(s.size*s.life+6)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('✨',s.x,s.y);ctx.globalAlpha=1;
  });
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  // Shape name
  ctx.fillStyle='#5d4037';ctx.font='bold '+Math.max(20,W*0.05)+'px sans-serif';ctx.textAlign='center';
  ctx.fillText(TRACE_SHAPES[traceShapeIdx%TRACE_SHAPES.length].name,W/2,H*0.08);ctx.textAlign='left';
  drawParticles(0);drawConfetti();
}

// MAZE GAME
// =============================================
let mazeGrid=[],mazeCols=5,mazeRows=5,mazeCellW,mazeCellH,mazeOfsX,mazeOfsY;
let mazeBall={x:0,y:0},mazeGoal={c:0,r:0},mazeDragging=false,mazeWon=false,mazeLevel=0;

function generateMaze(cols,rows){
  const grid=[];
  for(let r=0;r<rows;r++){grid[r]=[];for(let c=0;c<cols;c++)grid[r][c]={top:true,right:true,bottom:true,left:true,visited:false};}
  const stack=[];let cur={r:0,c:0};grid[0][0].visited=true;
  function neighbors(r,c){
    const n=[];
    if(r>0&&!grid[r-1][c].visited)n.push({r:r-1,c});
    if(r<rows-1&&!grid[r+1][c].visited)n.push({r:r+1,c});
    if(c>0&&!grid[r][c-1].visited)n.push({r,c:c-1});
    if(c<cols-1&&!grid[r][c+1].visited)n.push({r,c:c+1});
    return n;
  }
  let total=cols*rows,visited=1;
  while(visited<total){
    const nb=neighbors(cur.r,cur.c);
    if(nb.length>0){
      const next=nb[Math.floor(Math.random()*nb.length)];stack.push(cur);
      if(next.r<cur.r){grid[cur.r][cur.c].top=false;grid[next.r][next.c].bottom=false}
      else if(next.r>cur.r){grid[cur.r][cur.c].bottom=false;grid[next.r][next.c].top=false}
      else if(next.c<cur.c){grid[cur.r][cur.c].left=false;grid[next.r][next.c].right=false}
      else{grid[cur.r][cur.c].right=false;grid[next.r][next.c].left=false}
      cur=next;grid[cur.r][cur.c].visited=true;visited++;
    } else if(stack.length>0){cur=stack.pop()}
  }
  return grid;
}
function startMazeGame(){
  currentMode='maze';particles=[];confetti=[];mazeWon=false;mazeLevel=0;
  newMaze();updateMazeButtons();
}
function newMaze(){
  mazeWon=false;
  mazeGrid=generateMaze(mazeCols,mazeRows);
  const btnH=100,topY=H*0.1;
  const areaH=H-topY-btnH-20,areaW=W*0.9;
  mazeCellW=Math.min(areaW/mazeCols,areaH/mazeRows);mazeCellH=mazeCellW;
  mazeOfsX=(W-mazeCols*mazeCellW)/2;mazeOfsY=topY+(areaH-mazeRows*mazeCellH)/2;
  mazeBall={x:mazeOfsX+mazeCellW*0.5,y:mazeOfsY+mazeCellH*0.5};
  mazeGoal={c:mazeCols-1,r:mazeRows-1};
  instruction.textContent='Drag to the flag! 🏁';
}
function updateMazeButtons(){
  buttonsArea.innerHTML='';
}
function getMazeCell(px,py){
  const c=Math.floor((px-mazeOfsX)/mazeCellW),r=Math.floor((py-mazeOfsY)/mazeCellH);
  return{c:Math.max(0,Math.min(mazeCols-1,c)),r:Math.max(0,Math.min(mazeRows-1,r))};
}
function handleMazeMove(tx,ty){
  if(mazeWon)return;
  mazeDragging=true;
  const dx=tx-mazeBall.x,dy=ty-mazeBall.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<2)return;
  const br=W*0.04;
  const maxStep=br*0.7;
  const steps=Math.max(1,Math.ceil(dist/maxStep));
  const sx=dx/steps,sy=dy/steps;
  for(let i=0;i<steps;i++){
    // --- X movement: use cell at current ball position ---
    const c0=getMazeCell(mazeBall.x,mazeBall.y);
    const cell0=mazeGrid[c0.r][c0.c];
    const cL=mazeOfsX+c0.c*mazeCellW,cR=cL+mazeCellW;
    const nx=mazeBall.x+sx;
    const nc=getMazeCell(nx,mazeBall.y);
    let xOk=true;
    if(nc.c>c0.c&&cell0.right)xOk=false;        // crossing right wall
    else if(nc.c<c0.c&&cell0.left)xOk=false;    // crossing left wall
    else{if(nx<cL+br&&cell0.left)xOk=false;if(nx>cR-br&&cell0.right)xOk=false;}
    if(xOk)mazeBall.x=nx;
    // --- Y movement: re-read cell AFTER x move so column is correct ---
    const c1=getMazeCell(mazeBall.x,mazeBall.y);
    const cell1=mazeGrid[c1.r][c1.c];
    const cT=mazeOfsY+c1.r*mazeCellH,cB=cT+mazeCellH;
    const ny=mazeBall.y+sy;
    const nr=getMazeCell(mazeBall.x,ny);
    let yOk=true;
    if(nr.r>c1.r&&cell1.bottom)yOk=false;       // crossing bottom wall
    else if(nr.r<c1.r&&cell1.top)yOk=false;     // crossing top wall
    else{if(ny<cT+br&&cell1.top)yOk=false;if(ny>cB-br&&cell1.bottom)yOk=false;}
    if(yOk)mazeBall.y=ny;
    // --- Clamp ball to current cell walls (prevents any wall skip) ---
    const cc=getMazeCell(mazeBall.x,mazeBall.y);
    const cw=mazeGrid[cc.r][cc.c];
    const wL=mazeOfsX+cc.c*mazeCellW,wR=wL+mazeCellW;
    const wT=mazeOfsY+cc.r*mazeCellH,wB=wT+mazeCellH;
    if(cw.left)mazeBall.x=Math.max(mazeBall.x,wL+br);
    if(cw.right)mazeBall.x=Math.min(mazeBall.x,wR-br);
    if(cw.top)mazeBall.y=Math.max(mazeBall.y,wT+br);
    if(cw.bottom)mazeBall.y=Math.min(mazeBall.y,wB-br);
  }
  // Check win
  const gc=getMazeCell(mazeBall.x,mazeBall.y);
  if(gc.c===mazeGoal.c&&gc.r===mazeGoal.r&&!mazeWon){
    mazeWon=true;spawnConfetti();playJingle();
    instruction.textContent='You did it! 🎉';
    mazeLevel++;
    if(mazeLevel<5){setTimeout(()=>{newMaze();updateMazeButtons()},2000)}
    else{setTimeout(()=>{instruction.textContent='All mazes done! 🌟';addBtn('btn-again','🔄','Again!',()=>{initAudio();startMazeGame()})},2200)}
  }
}
function handleMazeEnd(){mazeDragging=false}
function updateMazeGame(dt){updateParticles(dt);updateConfetti()}
function drawMazeGame(){
  // Graph paper background
  ctx.fillStyle='#f5f5f0';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#d0d0c8';ctx.lineWidth=0.5;
  const gs=20;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  // Maze cells
  ctx.strokeStyle='#5d4037';ctx.lineWidth=Math.max(4,mazeCellW*0.08);ctx.lineCap='round';
  for(let r=0;r<mazeRows;r++){for(let c=0;c<mazeCols;c++){
    const x=mazeOfsX+c*mazeCellW,y=mazeOfsY+r*mazeCellH,cell=mazeGrid[r][c];
    if(cell.top){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+mazeCellW,y);ctx.stroke()}
    if(cell.left){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+mazeCellH);ctx.stroke()}
    if(c===mazeCols-1&&cell.right){ctx.beginPath();ctx.moveTo(x+mazeCellW,y);ctx.lineTo(x+mazeCellW,y+mazeCellH);ctx.stroke()}
    if(r===mazeRows-1&&cell.bottom){ctx.beginPath();ctx.moveTo(x,y+mazeCellH);ctx.lineTo(x+mazeCellW,y+mazeCellH);ctx.stroke()}
  }}
  // Start marker
  ctx.fillStyle='#4caf50';ctx.beginPath();ctx.arc(mazeOfsX+mazeCellW*0.5,mazeOfsY+mazeCellH*0.5,W*0.025,0,Math.PI*2);ctx.fill();
  // Goal flag
  const gx=mazeOfsX+(mazeGoal.c+0.5)*mazeCellW,gy=mazeOfsY+(mazeGoal.r+0.5)*mazeCellH;
  ctx.font='bold '+Math.max(22,mazeCellW*0.5)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🏁',gx,gy);
  // Ball
  const br=W*0.04;
  ctx.fillStyle='#2196f3';ctx.beginPath();ctx.arc(mazeBall.x,mazeBall.y,br,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.beginPath();ctx.arc(mazeBall.x-br*0.2,mazeBall.y-br*0.25,br*0.35,0,Math.PI*2);ctx.fill();
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  // Level
  ctx.fillStyle='#5d4037';ctx.font='bold '+Math.max(16,W*0.035)+'px sans-serif';ctx.textAlign='center';
  ctx.fillText('Maze '+(mazeLevel+1)+' of 5',W/2,mazeOfsY-10);ctx.textAlign='left';
  drawParticles(0);drawConfetti();
}

function startBuildGame(){

function setupBuildPuzzle(){

  const startY=H*0.62,gap=W/(shuffled.length+1);
  buildPieces=shuffled.map((p,i)=>({...p,cx:gap*(i+1),cy:startY+Math.random()*30-15,origX:gap*(i+1),origY:startY,placed:false,targetIdx:puzzle.pieces.indexOf(p)}));

function drawBuildShape(p,x,y,alpha){

  else if(p.type==='trap'){ctx.beginPath();ctx.moveTo(x-p.w/2,y-p.h/2);ctx.lineTo(x+p.w/2,y-p.h/2);ctx.lineTo(x+p.w*0.35,y+p.h/2);ctx.lineTo(x-p.w*0.35,y+p.h/2);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=2;ctx.stroke()}

function handleBuildTap(tx,ty){
  if(buildDone)return;
  // Check if tapping a draggable piece
  for(let i=buildPieces.length-1;i>=0;i--){

    const dx=tx-p.cx,dy=ty-p.cy;
    if(Math.abs(dx)<p.w/2+15&&Math.abs(dy)<p.h/2+15){
      initAudio();buildDrag={idx:i,ofx:dx,ofy:dy};return;
    }
  }
}
function handleBuildMove(tx,ty){
  if(!buildDrag)return;
  const p=buildPieces[buildDrag.idx];
  p.cx=tx-buildDrag.ofx;p.cy=ty-buildDrag.ofy;
}
function handleBuildEnd(){
  if(!buildDrag)return;
  const p=buildPieces[buildDrag.idx];
  const t=buildTargets[p.targetIdx];
  const dx=p.cx-t.cx,dy=p.cy-t.cy;
  // Snap if close enough
  if(dx*dx+dy*dy<(W*0.08)*(W*0.08)){
    p.cx=t.cx;p.cy=t.cy;p.placed=true;t.filled=true;
    playTone(400+buildScore*50,0.15,'sine',0.12);playPop();
    spawnParticles(t.cx,t.cy,10,[p.color,'#fff'],{vyRange:5,spread:20,maxSize:6});
    buildScore++;
    // Check if all placed
    if(buildPieces.every(pp=>pp.placed)){
      buildDone=true;spawnConfetti();playJingle();setTimeout(()=>playTaDa(),500);
      updateBuildButtons();
    }
  }else{
    // Bounce back
    p.cx=p.origX;p.cy=p.origY;
    playTone(200,0.1,'triangle',0.1);
  }
  buildDrag=null;
}
function updateBuildGame(dt){updateParticles(dt);updateConfetti()}
function drawBuildGame(){
  // Background — craft table
  ctx.fillStyle='#fff8e1';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffe0b2';ctx.fillRect(0,H*0.52,W,H*0.48);
  ctx.fillStyle='#d7ccc8';ctx.fillRect(0,H*0.52,W,4);
  // Placed pieces — draw in placement order (last placed on top)
  const placedOrder=buildPieces.filter(p=>p.placed);
  // Sort: larger pieces first (background), smaller pieces on top (details)
  placedOrder.sort((a,b)=>(b.w*b.h)-(a.w*a.h));
  placedOrder.forEach(p=>drawBuildShape(p,p.cx,p.cy,1));
  // Unfilled target outlines ON TOP of placed pieces so always visible
  buildTargets.forEach(t=>{
    if(!t.filled){ctx.setLineDash([7,5]);drawBuildShape(t,t.cx,t.cy,0.25);ctx.setLineDash([])}
  });
  // Draggable pieces (unplaced)
  buildPieces.forEach((p,i)=>{
    if(p.placed)return;
    const isDrag=buildDrag&&buildDrag.idx===i;
    ctx.save();
    if(isDrag){ctx.shadowColor='rgba(0,0,0,0.3)';ctx.shadowBlur=10;ctx.shadowOffsetY=5}
    drawBuildShape(p,p.cx,p.cy,isDrag?1:0.9);
    ctx.restore();
  });
  // Puzzle label
  const pname=BUILD_PUZZLES[buildPuzzleIdx%BUILD_PUZZLES.length].name;
  ctx.fillStyle='#5d4037';ctx.font=`bold ${Math.max(16,W*0.04)}px sans-serif`;ctx.textAlign='center';
  ctx.fillText(pname+' ('+(buildPuzzleIdx%BUILD_PUZZLES.length+1)+'/'+BUILD_PUZZLES.length+')',W/2,H*0.05+15);ctx.textAlign='left';
  drawParticles(0);drawConfetti();
}

// CAR WASH GAME
// =============================================
let cwState='spray',cwStep=0,cwTimer=0,cwAnimating=false,cwDirt=1,cwCarColor='#e53935';
let cwBubbles=[],cwDroplets=[],cwWindLines=[],cwSparkles=[];
const CW_STEPS=['spray','soap','scrub','rinse','dry'];
const CW_COLORS=['#e53935','#1e88e5','#43a047','#fdd835','#ffffff'];

function startCarWashGame(){
  currentMode='carwash';particles=[];confetti=[];
  cwState='spray';cwStep=0;cwTimer=0;cwAnimating=false;cwDirt=1;
  cwCarColor=CW_COLORS[Math.floor(Math.random()*CW_COLORS.length)];
  cwBubbles=[];cwDroplets=[];cwWindLines=[];cwSparkles=[];
  instruction.textContent='🚗 Car Wash!';
  updateCarWashButtons();
}
function updateCarWashButtons(){
  buttonsArea.innerHTML='';
  if(cwState==='done'){
    addBtn('btn-again','🚗','New Car!',()=>{initAudio();playPop();startCarWashGame()});

    return;
  }
  const labels=[['💧','Spray'],['🧼','Soap'],['🧽','Scrub'],['🚿','Rinse'],['💨','Dry']];
  labels.forEach((l,i)=>{
    addBtn('btn-wash',l[0],l[1],()=>{
      if(i===cwStep&&!cwAnimating){playPop();cwAnimating=true;cwTimer=0;}
    },i!==cwStep||cwAnimating);
  });

}
function updateCarWashGame(dt){
  updateParticles(dt);updateConfetti();
  if(!cwAnimating)return;
  cwTimer+=dt;
  const step=CW_STEPS[cwStep];
  // Spawn effects during animation
  if(step==='spray'){
    if(Math.random()<0.5){cwDroplets.push({x:W*0.3+Math.random()*W*0.4,y:H*0.2,vy:2+Math.random()*3,life:1});}
    cwDirt=Math.max(0.6,1-cwTimer*0.3);
    if(cwTimer>1.5){cwAnimating=false;cwStep++;cwState=CW_STEPS[cwStep];
      playTone(400,0.2,'sine',0.1);instruction.textContent='🧼 Soap it up!';updateCarWashButtons();}
  } else if(step==='soap'){
    if(Math.random()<0.4){cwBubbles.push({x:W*0.3+Math.random()*W*0.4,y:H*0.3+Math.random()*H*0.2,r:4+Math.random()*12,life:1,vx:(Math.random()-0.5)*0.5,vy:-0.3-Math.random()*0.5});}
    cwDirt=Math.max(0.3,cwDirt-dt*0.15);
    if(cwTimer>1.5){cwAnimating=false;cwStep++;cwState=CW_STEPS[cwStep];
      playTone(500,0.2,'sine',0.1);instruction.textContent='🧽 Scrub scrub!';updateCarWashButtons();}
  } else if(step==='scrub'){
    cwDirt=Math.max(0.1,cwDirt-dt*0.2);
    // Pop some bubbles
    if(cwBubbles.length>0&&Math.random()<0.3){cwBubbles.splice(Math.floor(Math.random()*cwBubbles.length),1);playTone(800+Math.random()*400,0.05,'sine',0.05);}
    if(cwTimer>1.5){cwAnimating=false;cwStep++;cwState=CW_STEPS[cwStep];
      playTone(600,0.2,'sine',0.1);instruction.textContent='🚿 Rinse!';cwBubbles=[];updateCarWashButtons();}
  } else if(step==='rinse'){
    if(Math.random()<0.6){cwDroplets.push({x:W*0.25+Math.random()*W*0.5,y:H*0.15,vy:3+Math.random()*4,life:1});}
    cwDirt=Math.max(0,cwDirt-dt*0.15);cwBubbles=cwBubbles.filter(b=>{b.life-=dt*0.5;return b.life>0;});
    if(cwTimer>1.5){cwAnimating=false;cwStep++;cwState=CW_STEPS[cwStep];
      playTone(700,0.2,'sine',0.1);instruction.textContent='💨 Dry it off!';updateCarWashButtons();}
  } else if(step==='dry'){
    if(Math.random()<0.3){cwWindLines.push({x:W*0.1,y:H*0.3+Math.random()*H*0.25,vx:6+Math.random()*4,life:1});}
    cwDirt=0;
    if(cwTimer>2){cwAnimating=false;cwState='done';
      instruction.textContent='✨ Clean!';sayWord('Clean!');playJingle();spawnConfetti();
      for(let i=0;i<15;i++){cwSparkles.push({x:W*0.3+Math.random()*W*0.4,y:H*0.25+Math.random()*H*0.3,life:1+Math.random(),phase:Math.random()*6.28});}
      spawnParticles(W/2,H*0.4,20,['#fff','#fffde7','#e3f2fd']);
      updateCarWashButtons();}
  }
  // Update droplets
  for(let i=cwDroplets.length-1;i>=0;i--){cwDroplets[i].y+=cwDroplets[i].vy;cwDroplets[i].life-=dt*0.7;if(cwDroplets[i].life<=0||cwDroplets[i].y>H*0.65)cwDroplets.splice(i,1);}
  // Update bubbles
  for(let i=cwBubbles.length-1;i>=0;i--){const b=cwBubbles[i];b.x+=b.vx;b.y+=b.vy;b.life-=dt*0.15;if(b.life<=0)cwBubbles.splice(i,1);}
  // Update wind lines
  for(let i=cwWindLines.length-1;i>=0;i--){cwWindLines[i].x+=cwWindLines[i].vx;cwWindLines[i].life-=dt*0.8;if(cwWindLines[i].life<=0||cwWindLines[i].x>W)cwWindLines.splice(i,1);}
  // Update sparkles
  for(let i=cwSparkles.length-1;i>=0;i--){cwSparkles[i].life-=dt*0.3;cwSparkles[i].phase+=dt*3;if(cwSparkles[i].life<=0)cwSparkles.splice(i,1);}
}
function drawCarWashGame(){
  // Background: car wash building
  const grd=ctx.createLinearGradient(0,0,0,H);grd.addColorStop(0,'#90caf9');grd.addColorStop(0.6,'#bbdefb');grd.addColorStop(1,'#e3f2fd');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  // Building walls
  const floorY=H>W*1.5?H*0.52:H*0.65;
  ctx.fillStyle='#b0bec5';ctx.fillRect(0,H*0.05,W*0.12,floorY-H*0.05);ctx.fillRect(W*0.88,H*0.05,W*0.12,floorY-H*0.05);
  // Roof
  ctx.fillStyle='#78909c';ctx.fillRect(0,H*0.03,W,H*0.06);
  // Rollers on sides
  for(let i=0;i<4;i++){
    ctx.fillStyle=i%2===0?'#e53935':'#1976d2';
    ctx.beginPath();ctx.arc(W*0.08,H*0.15+i*H*0.12,W*0.03,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(W*0.92,H*0.15+i*H*0.12,W*0.03,0,Math.PI*2);ctx.fill();
  }
  // Tile floor
  ctx.fillStyle='#e0f2f1';ctx.fillRect(0,floorY,W,H-floorY);
  for(let i=0;i<W;i+=30){ctx.strokeStyle='#b2dfdb';ctx.beginPath();ctx.moveTo(i,floorY);ctx.lineTo(i,H);ctx.stroke();}
  for(let i=floorY;i<H;i+=30){ctx.strokeStyle='#b2dfdb';ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}

  // Car
  const s=Math.min(W,H);const cx=W/2,cy=H*0.4,cw=s*0.55,ch=s*0.18;
  const wobble=cwAnimating&&CW_STEPS[cwStep]==='scrub'?Math.sin(cwTimer*20)*3:0;
  ctx.save();ctx.translate(cx,cy+wobble);
  // Body
  ctx.fillStyle=cwCarColor;drawRoundRect(-cw/2,-ch/2,cw,ch,12);ctx.fill();
  // Roof
  ctx.fillStyle=cwCarColor;drawRoundRect(-cw*0.3,-ch/2-ch*0.55,cw*0.6,ch*0.6,10);ctx.fill();
  // Windows
  ctx.fillStyle='#bbdefb';drawRoundRect(-cw*0.25,-ch/2-ch*0.45,cw*0.22,ch*0.4,6);ctx.fill();
  drawRoundRect(cw*0.05,-ch/2-ch*0.45,cw*0.22,ch*0.4,6);ctx.fill();
  // Headlights
  ctx.fillStyle='#fff9c4';ctx.beginPath();ctx.arc(cw/2-5,-ch*0.1,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ef5350';ctx.beginPath();ctx.arc(-cw/2+5,-ch*0.1,6,0,Math.PI*2);ctx.fill();
  // Bumpers
  ctx.fillStyle='#757575';drawRoundRect(-cw/2-4,-ch/2+ch*0.2,8,ch*0.6,3);ctx.fill();
  drawRoundRect(cw/2-4,-ch/2+ch*0.2,8,ch*0.6,3);ctx.fill();
  // Wheels
  ctx.fillStyle='#212121';
  ctx.beginPath();ctx.arc(-cw*0.3,ch/2,ch*0.22,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cw*0.3,ch/2,ch*0.22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#757575';
  ctx.beginPath();ctx.arc(-cw*0.3,ch/2,ch*0.1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cw*0.3,ch/2,ch*0.1,0,Math.PI*2);ctx.fill();
  // Dirt splatters
  if(cwDirt>0){
    ctx.globalAlpha=cwDirt*0.7;ctx.fillStyle='#795548';
    const dirtSeed=seededRand(42);
    for(let i=0;i<20;i++){
      const dx=(dirtSeed()-0.5)*cw*0.9,dy=(dirtSeed()-0.5)*ch*1.5-ch*0.2;
      ctx.beginPath();ctx.arc(dx,dy,3+dirtSeed()*8,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  // Shiny highlight when clean
  if(cwState==='done'){
    ctx.globalAlpha=0.3;ctx.fillStyle='#fff';
    drawRoundRect(-cw*0.4,-ch/2-ch*0.3,cw*0.3,ch*0.3,8);ctx.fill();
    ctx.globalAlpha=1;
  }
  ctx.restore();
  // Water droplets
  ctx.fillStyle='#42a5f5';
  cwDroplets.forEach(d=>{ctx.globalAlpha=d.life*0.7;ctx.beginPath();ctx.arc(d.x,d.y,3,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  // Bubbles
  cwBubbles.forEach(b=>{
    ctx.globalAlpha=b.life*0.6;ctx.strokeStyle='#e3f2fd';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fill();
    // Bubble highlight
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.25,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
  // Wind lines
  ctx.strokeStyle='#90caf9';ctx.lineWidth=2;
  cwWindLines.forEach(w=>{ctx.globalAlpha=w.life*0.6;ctx.beginPath();ctx.moveTo(w.x,w.y);ctx.lineTo(w.x+30,w.y);ctx.stroke();});
  ctx.globalAlpha=1;
  // Sparkles
  cwSparkles.forEach(s=>{
    const bright=0.5+0.5*Math.sin(s.phase);
    ctx.globalAlpha=s.life*bright;ctx.fillStyle='#fff';
    ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText('✨',s.x,s.y);
  });
  ctx.globalAlpha=1;ctx.textAlign='left';
  drawParticles(0);drawConfetti();
}

// TRAIN BUILDER GAME
